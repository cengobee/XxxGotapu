<style>
  .admin-nav { position: fixed; top: 0; left: 0; right: 0; z-index: 200; height: 56px; background: var(--bg2); border-bottom: 1px solid var(--border); display: flex; align-items: center; justify-content: space-between; padding: 0 16px; }
  .admin-logo { font-size: 18px; font-weight: 900; display: flex; align-items: center; gap: 8px; }
  .admin-badge { background: var(--rust); color: white; font-size: 10px; font-weight: 800; padding: 2px 8px; border-radius: 50px; }
  .tab-bar { display: flex; overflow-x: auto; gap: 0; background: var(--bg2); border-bottom: 1px solid var(--border); position: fixed; top: 56px; left: 0; right: 0; z-index: 199; scrollbar-width: none; }
  .tab-bar::-webkit-scrollbar { display: none; }
  .tab-btn { flex-shrink: 0; padding: 12px 16px; font-size: 13px; font-weight: 800; cursor: pointer; border: none; background: none; color: var(--text3); border-bottom: 3px solid transparent; font-family: 'Nunito', sans-serif; transition: all .2s; }
  .tab-btn.active { color: var(--gold); border-bottom-color: var(--gold); }
  .admin-page { padding: 120px 16px 40px; max-width: 600px; margin: 0 auto; }
  .stat-cards { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; margin-bottom: 24px; }
  .stat-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 16px; }
  .stat-card-num { font-size: 32px; font-weight: 900; color: var(--gold); }
  .stat-card-lbl { font-size: 12px; color: var(--text3); font-weight: 700; margin-top: 4px; }
  .stat-card-icon { font-size: 24px; margin-bottom: 8px; }
  .admin-card { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .admin-card.onay-bekliyor { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.03); }
  .admin-card-head { display: flex; align-items: flex-start; justify-content: space-between; margin-bottom: 8px; }
  .admin-card-title { font-size: 14px; font-weight: 800; }
  .admin-card-meta { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .admin-card-actions { display: flex; gap: 6px; margin-top: 10px; flex-wrap: wrap; }
  .act-btn { padding: 6px 12px; border-radius: 50px; border: none; font-family: 'Nunito', sans-serif; font-size: 12px; font-weight: 800; cursor: pointer; transition: opacity .2s; text-decoration: none; display: inline-flex; align-items: center; }
  .act-btn:active { opacity: 0.7; }
  .act-gold { background: rgba(245,200,66,0.15); color: var(--gold); }
  .act-rust { background: rgba(232,96,58,0.15); color: var(--rust); }
  .act-green { background: rgba(46,204,113,0.15); color: var(--green); }
  .act-blue { background: rgba(74,144,217,0.15); color: #4a90d9; }
  .durum-badge { padding: 3px 10px; border-radius: 50px; font-size: 11px; font-weight: 800; }
  .durum-bekliyor { background: rgba(245,200,66,0.15); color: var(--gold); }
  .durum-isleniyor { background: rgba(74,144,217,0.15); color: #4a90d9; }
  .durum-tamamlandi { background: rgba(46,204,113,0.15); color: var(--green); }
  .durum-iptal { background: rgba(232,96,58,0.15); color: var(--rust); }
  .durum-onaylandi { background: rgba(46,204,113,0.15); color: var(--green); }
  .durum-reddedildi { background: rgba(232,96,58,0.15); color: var(--rust); }
  .kullanici-item { display: flex; align-items: center; gap: 12px; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 12px; margin-bottom: 8px; cursor: pointer; }
  .kullanici-avatar { width: 44px; height: 44px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 22px; flex-shrink: 0; overflow: hidden; }
  .kullanici-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .detay-modal { position: fixed; inset: 0; z-index: 400; background: rgba(0,0,0,0.8); display: none; align-items: flex-end; }
  .detay-modal.open { display: flex; }
  .detay-sheet { background: var(--bg2); border-radius: 24px 24px 0 0; padding: 24px 20px 40px; width: 100%; max-height: 85vh; overflow-y: auto; }
  .detay-row { display: flex; justify-content: space-between; padding: 10px 0; border-bottom: 1px solid var(--border); }
  .detay-key { font-size: 13px; color: var(--text3); font-weight: 700; }
  .detay-val { font-size: 13px; font-weight: 800; text-align: right; max-width: 60%; }
  .foto-grid { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .foto-grid img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; cursor: pointer; }
  .arama-input { width: 100%; background: var(--card); border: 1.5px solid var(--border); border-radius: 50px; padding: 10px 16px; color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; outline: none; margin-bottom: 14px; }
  .rapor-kart { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .rapor-kart-head { display: flex; justify-content: space-between; align-items: flex-start; margin-bottom: 8px; }
  .onay-banner { background: rgba(245,200,66,0.08); border: 1px solid rgba(245,200,66,0.3); border-radius: var(--radius); padding: 12px 16px; margin-bottom: 16px; display: flex; align-items: center; justify-content: space-between; }
  .kurumsal-kart { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; margin-bottom: 10px; }
  .kurumsal-kart.bekliyor { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.03); }
  .kurumsal-kart.onaylandi { border-color: rgba(46,204,113,0.3); }
  .filtre-row { display: flex; gap: 8px; margin-bottom: 14px; flex-wrap: wrap; }
</style>

function sekmeAc(sekme, btn) {
  ['ozet','onay','ilanlar','teklifler','kullanicilar','kurumsal','raporlar','mesajlar','sikayetler'].forEach(s => {
    document.getElementById('sekme-'+s).style.display = s === sekme ? 'block' : 'none';
  });
  document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));
  if (btn) btn.classList.add('active');
  history.replaceState(null, '', '#' + sekme);
}

function baslangicSekmesi() {
  const hash = location.hash.replace('#','');
  const gecerli = ['ozet','onay','ilanlar','teklifler','kullanicilar','kurumsal','raporlar','mesajlar','sikayetler'];
  const sekme = gecerli.includes(hash) ? hash : 'ozet';
  const idx = gecerli.indexOf(sekme);
  const btn = document.querySelectorAll('.tab-btn')[idx];
  sekmeAc(sekme, btn || null);
}

async function tumunuYukle() {
  await Promise.all([
    ozetYukle(),
    onayBekleyenleriYukle(),
    ilanlariYukle(),
    teklifleriYukle(),
    kullanicilariYukle(),
    kurumsalUyeleriYukle(),
    raporlariYukle(),
    mesajlariYukle(),
    sikayetleriYukle()
  ]);
}

// ─── ÖZET ───
async function ozetYukle() {
  const [t, i, k, m, r, b, onay, kurumsal] = await Promise.all([
    sb.from('teklifler').select('*', { count: 'exact', head: true }),
    sb.from('ilanlar').select('*', { count: 'exact', head: true }),
    sb.from('profiles').select('*', { count: 'exact', head: true }),
    sb.from('mesajlar').select('*', { count: 'exact', head: true }),
    sb.from('degerleme_raporlari').select('*', { count: 'exact', head: true }),
    sb.from('bildirimler').select('*', { count: 'exact', head: true }).eq('okundu', false),
    sb.from('ilanlar').select('*', { count: 'exact', head: true }).eq('onay_durumu', 'bekliyor'),
    sb.from('profiles').select('*', { count: 'exact', head: true }).eq('kurumsal_onay', 'bekliyor'),
  ]);
  const { data: raporlar } = await sb.from('degerleme_raporlari').select('odeme_durumu').eq('odeme_durumu', 'odendi');
  const raporGelir = (raporlar?.length || 0) * 800;

  if (onay.count > 0) {
    const badge = document.getElementById('onayBadge');
    badge.textContent = onay.count;
    badge.style.display = 'inline';
  }
  // FIX: Badge sadece bekleyenleri göstersin
  if (kurumsal.count > 0) {
    const badge = document.getElementById('kurumsalBadge');
    badge.textContent = kurumsal.count;
    badge.style.display = 'inline';
  } else {
    document.getElementById('kurumsalBadge').style.display = 'none';
  }

  document.getElementById('istatistikler').innerHTML = `
    <div class="stat-card"><div class="stat-card-icon">⏳</div><div class="stat-card-num" style="color:var(--rust)">${onay.count||0}</div><div class="stat-card-lbl">Onay Bekleyen İlan</div></div>
    <div class="stat-card"><div class="stat-card-icon">🏢</div><div class="stat-card-num" style="color:var(--gold)">${kurumsal.count||0}</div><div class="stat-card-lbl">Kurumsal Başvuru</div></div>
    <div class="stat-card"><div class="stat-card-icon">🏠</div><div class="stat-card-num">${i.count||0}</div><div class="stat-card-lbl">Toplam İlan</div></div>
    <div class="stat-card"><div class="stat-card-icon">👥</div><div class="stat-card-num">${k.count||0}</div><div class="stat-card-lbl">Toplam Kullanıcı</div></div>
    <div class="stat-card"><div class="stat-card-icon">📋</div><div class="stat-card-num">${t.count||0}</div><div class="stat-card-lbl">Toplam Teklif</div></div>
    <div class="stat-card"><div class="stat-card-icon">💰</div><div class="stat-card-num">${raporGelir.toLocaleString('tr-TR')} ₺</div><div class="stat-card-lbl">Rapor Geliri</div></div>`;

  const { data: sonT } = await sb.from('teklifler').select('*').order('created_at', { ascending: false }).limit(3);
  document.getElementById('sonTeklifler').innerHTML = (sonT||[]).map(t => teklifKartHTML(t)).join('') || '<div class="empty" style="padding:20px"><div class="empty-icon">📋</div><div class="empty-title">Teklif yok</div></div>';
  const { data: sonI } = await sb.from('ilanlar').select('*').order('created_at', { ascending: false }).limit(3);
  document.getElementById('sonIlanlar').innerHTML = (sonI||[]).map(i => ilanKartHTML(i)).join('') || '<div class="empty" style="padding:20px"><div class="empty-icon">🏠</div><div class="empty-title">İlan yok</div></div>';
}

// ─── ONAY BEKLEYENLEr ───
async function onayBekleyenleriYukle() {
  const { data } = await sb.from('ilanlar').select('*').eq('onay_durumu', 'bekliyor').order('created_at', { ascending: true });
  const el = document.getElementById('onayListesi');

async function ilanOnayla(id) {
  await sb.from('ilanlar').update({ onay_durumu: 'onaylandi' }).eq('id', id);
  const { data: ilan } = await sb.from('ilanlar').select('user_id, baslik').eq('id', id).single();
  if (ilan) {
    await sb.from('bildirimler').insert({
      user_id: ilan.user_id, tip: 'ilan_onay',
      baslik: '✅ İlanınız Onaylandı!',
      mesaj: `"${ilan.baslik}" ilanınız incelendi ve yayına alındı.`,
      ilan_id: id, okundu: false
    });
  }
  const kart = document.getElementById(`onay-kart-${id}`);

async function hepsiniOnayla() {
  if (!confirm('Tüm bekleyen ilanları onaylamak istiyor musunuz?')) return;

    });

    <div class="detay-row"><div class="detay-key">🏙️ Şehir</div><div class="detay-val">${k.sehir||'-'}</div></div>
    <div class="detay-row"><div class="detay-key">🏠 İlan</div><div class="detay-val">${ilanlar.data?.length||0}</div></div>
    <div class="detay-row"><div class="detay-key">📋 Teklif</div><div class="detay-val">${teklifler.data?.length||0}</div></div>
    <div class="detay-row"><div class="detay-key">💬 Mesaj</div><div class="detay-val">${mesajlar.count||0}</div></div>
    <div class="detay-row"><div class="detay-key">📊 Rapor</div><div class="detay-val">${raporlar.data?.length||0}</div></div>
    <div class="detay-row"><div class="detay-key">📅 Kayıt</div><div class="detay-val">${new Date(k.created_at).toLocaleDateString('tr-TR')}</div></div>
    <div style="margin-top:16px">
      <div style="font-size:13px;font-weight:800;color:var(--text2);margin-bottom:8px">📩 Mesaj Gönder</div>
      <textarea class="input" id="kullaniciMesajMetin" rows="3" placeholder="Kullanıcıya mesaj yazın..." style="resize:none;margin-bottom:8px"></textarea>
      <button class="btn btn-gold btn-lg" onclick="kullaniciMesajGonder('${k.id}')">📩 Mesaj Gönder</button>
    </div>
    <div style="margin-top:12px">
      <button class="act-btn act-blue" style="width:100%;padding:10px;justify-content:center;margin-bottom:6px" onclick="sifreSifirlamaMailiGonder('${k.email}')">📧 Şifre Sıfırlama Maili Gönder</button>
    </div>
    <div style="display:flex;gap:8px;margin-top:6px">
      <button class="act-btn ${k.verified?'act-rust':'act-green'}" style="flex:1;padding:12px" onclick="kullaniciDogrula('${k.id}',${k.verified})">${k.verified?'✗ Doğrulamayı Kaldır':'✓ Doğrula'}</button>
      <button class="act-btn act-rust" style="flex:1;padding:12px" onclick="if(confirm('Emin misiniz?'))kullaniciSil('${k.id}')">🗑️ Sil</button>
    </div>
    <button class="btn btn-outline btn-md" style="width:100%;margin-top:8px" onclick="detayKapat()">Kapat</button>`;
  document.getElementById('detayModal').classList.add('open');
}

async function kullaniciMesajGonder(aliciId) {
  const metin = document.getElementById('kullaniciMesajMetin').value.trim();
  if (!metin) { alert('Mesaj boş olamaz!'); return; }
  await sb.from('mesajlar').insert({ gonderen_id: adminUserId, alici_id: aliciId, ilan_id: null, icerik: '📢 GoTapu: ' + metin, okundu: false });
  document.getElementById('kullaniciMesajMetin').value = '';
  alert('✅ Mesaj gönderildi!');
}

async function sifreSifirlamaMailiGonder(email) {
  if (!email) { alert('Kullanıcının e-posta adresi yok!'); return; }
  const { error } = await sb.auth.resetPasswordForEmail(email, { redirectTo: 'https://cengobee.github.io/XxxGotapu/auth.html' });
  if (error) { alert('Hata: ' + error.message); return; }
  alert(`✅ ${email} adresine şifre sıfırlama maili gönderildi!`);
}

async function kullaniciDogrula(id, mevcut) {
  await sb.from('profiles').update({ verified: !mevcut }).eq('id', id);
  await kullanicilariYukle(); detayKapat();
}

async function kullaniciSil(id) {
  await sb.from('profiles').delete().eq('id', id);
  await kullanicilariYukle(); detayKapat();
}

function kullaniciAra(q) {
  kullanicilariGoster(tumKullanicilar.filter(k =>
    (k.full_name||'').toLowerCase().includes(q.toLowerCase()) ||
    (k.email||'').toLowerCase().includes(q.toLowerCase()) ||
    (k.phone||'').includes(q)
  ));
}

// ─── KURUMSAL ÜYELER ───
async function kurumsalUyeleriYukle() {
  const { data } = await sb.from('profiles')
    .select('*')
    .in('kullanici_tipi', ['kurumsal', 'freelancer'])
    .order('created_at', { ascending: false });
  tumKurumsal = data || [];

  // FIX: Sadece bekleyenleri say
  const bekleyenSayi = tumKurumsal.filter(k => k.kurumsal_onay === 'bekliyor').length;
  const badge = document.getElementById('kurumsalBadge');
  if (bekleyenSayi > 0) { badge.textContent = bekleyenSayi; badge.style.display = 'inline'; }
  else badge.style.display = 'none';

  kurumsalListeGoster();
}

function kurumsalListeGoster() {
  let liste = [...tumKurumsal];

  if (kurumsalTipAktif !== 'tumu') liste = liste.filter(k => k.kullanici_tipi === kurumsalTipAktif);
  if (kurumsalKatAktif !== 'tumu') liste = liste.filter(k => k.kategori === kurumsalKatAktif);
  if (kurumsalOnayAktif !== 'tumu') liste = liste.filter(k => (k.kurumsal_onay||'bekliyor') === kurumsalOnayAktif);
  if (kurumsalAramaQ) {
    const q = kurumsalAramaQ.toLowerCase();
    liste = liste.filter(k =>
      (k.full_name||'').toLowerCase().includes(q) ||
      (k.firma_adi||'').toLowerCase().includes(q) ||
      (k.kurumsal_sehir||'').toLowerCase().includes(q) ||
      (k.email||'').toLowerCase().includes(q) ||
      (k.phone||'').includes(q)
    );
  }

  const el = document.getElementById('kurumsalListesi');
  if (!liste.length) {
    el.innerHTML = '<div class="empty" style="padding:30px"><div class="empty-icon">🏢</div><div class="empty-title">Kurumsal üye bulunamadı</div></div>';
    return;
  }

  const bekleyenler = liste.filter(k => (k.kurumsal_onay||'bekliyor') === 'bekliyor');

  el.innerHTML = `
    <div style="font-size:12px;color:var(--text3);font-weight:700;margin-bottom:10px">${liste.length} üye listeleniyor</div>
    ${bekleyenler.length > 0 ? `
    <div class="onay-banner" style="margin-bottom:16px">
      <div><div style="font-size:14px;font-weight:900;color:var(--gold)">⏳ ${bekleyenler.length} Kurumsal Başvuru Bekliyor</div></div>
    </div>` : ''}
    ${liste.map(k => kurumsalKartHTML(k)).join('')}`;
}

// FIX: onclick içinde tırnak çakışmasını düzelttik - data-id kullanıyoruz
function kurumsalKartHTML(k) {
  const onay = k.kurumsal_onay || 'bekliyor';
  const onayRenk = onay === 'onaylandi' ? 'durum-onaylandi' : onay === 'reddedildi' ? 'durum-reddedildi' : 'durum-bekliyor';
  const onayText = onay === 'onaylandi' ? '✅ Onaylı' : onay === 'reddedildi' ? '❌ Reddedildi' : '⏳ Onay Bekliyor';
  const tip = k.kullanici_tipi === 'kurumsal' ? '🏢 Kurumsal' : '🔧 Freelancer';
  const kat = kategoriAdlari[k.kategori] || k.kategori || '-';
  const em = kategoriEm[k.kategori] || '📋';
  const isim = k.kullanici_tipi === 'kurumsal' ? (k.firma_adi || k.full_name || 'İsimsiz') : (k.full_name || 'İsimsiz');

  return `
    <div class="kurumsal-kart ${onay}">
      <div style="display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:8px">
        <div style="flex:1">
          <div style="display:flex;align-items:center;gap:8px;margin-bottom:4px">
            <span style="font-size:18px">${em}</span>
            <div>
              <div style="font-size:14px;font-weight:900">${isim}</div>
              <div style="font-size:12px;color:var(--text3)">${tip} • ${kat}</div>
            </div>
          </div>
          <div style="font-size:12px;color:var(--text2);margin-top:4px">
            👤 ${k.full_name||'-'} &nbsp;•&nbsp;
            📞 <a href="tel:${k.phone}" style="color:var(--gold)">${k.phone||'-'}</a> &nbsp;•&nbsp;
            📍 ${k.kurumsal_sehir||'-'}
          </div>
          ${k.calisan_sayisi ? `<div style="font-size:12px;color:var(--text3);margin-top:2px">👷 Çalışan Sayısı: ${k.calisan_sayisi}</div>` : ''}
          <div style="font-size:12px;color:var(--text3);margin-top:2px">
            📧 ${k.email||'-'} &nbsp;•&nbsp; 📅 ${new Date(k.created_at).toLocaleDateString('tr-TR')}
          </div>
        </div>
        <span class="durum-badge ${onayRenk}">${onayText}</span>
      </div>
      <div style="display:flex;gap:6px;flex-wrap:wrap;margin-top:8px">
        ${k.phone ? `<a href="tel:${k.phone}" class="act-btn act-green">📞 Ara</a>` : ''}
        ${onay !== 'onaylandi' ? `<button class="act-btn act-green" data-id="${k.id}" onclick="kurumsalOnayla(this.dataset.id)">✅ Onayla</button>` : ''}
        ${onay !== 'reddedildi' ? `<button class="act-btn act-rust" data-id="${k.id}" onclick="kurumsalReddet(this.dataset.id)">❌ Reddet</button>` : ''}
        <button class="act-btn act-rust" data-id="${k.id}" onclick="kurumsalSil(this.dataset.id)">🗑️ Sil</button>
      </div>
    </div>`;
}

function kurumsalFiltrele(tip, deger, el) {
  if (tip === 'tip') {
    kurumsalTipAktif = deger;
    document.querySelectorAll('#kurumsalTipFiltre .act-btn').forEach(b => b.classList.remove('act-gold'));
  } else if (tip === 'kat') {
    kurumsalKatAktif = deger;
    document.querySelectorAll('#kurumsalKatFiltre .act-btn').forEach(b => b.classList.remove('act-gold'));
  } else {
    kurumsalOnayAktif = deger;
    document.querySelectorAll('#kurumsalOnayFiltre .act-btn').forEach(b => b.classList.remove('act-gold'));
  }
  el.classList.add('act-gold');
  kurumsalListeGoster();
}

function kurumsalAra(q) {
  kurumsalAramaQ = q;
  kurumsalListeGoster();
}

async function kurumsalOnayla(id) {
  await sb.from('profiles').update({ kurumsal_onay: 'onaylandi' }).eq('id', id);
  await sb.from('bildirimler').insert({
    user_id: id, tip: 'kurumsal_onay',
    baslik: '✅ Başvurunuz Onaylandı!',
    mesaj: 'Kurumsal üyelik başvurunuz onaylandı. Artık GoTapu\'da aktifsiniz.',
    okundu: false
  });
  await kurumsalUyeleriYukle(); await ozetYukle();
}

async function kurumsalReddet(id) {
  const sebep = prompt('Red sebebi (kullanıcıya bildirim gönderilecek):');
  if (sebep === null) return;
  await sb.from('profiles').update({ kurumsal_onay: 'reddedildi' }).eq('id', id);
  await sb.from('bildirimler').insert({
    user_id: id, tip: 'kurumsal_red',
    baslik: '❌ Başvurunuz Reddedildi',
    mesaj: `Kurumsal üyelik başvurunuz reddedildi.${sebep ? ' Sebep: ' + sebep : ''}`,
    okundu: false
  });
  await kurumsalUyeleriYukle(); await ozetYukle();
}

async function kurumsalSil(id) {
  if (!confirm('Bu üyeyi silmek istediğinizden emin misiniz?')) return;
  await sb.from('profiles').update({
    kullanici_tipi: 'normal', kurumsal_tip: null,
    firma_adi: null, kategori: null,
    kurumsal_sehir: null, kurumsal_onay: null
  }).eq('id', id);
  await kurumsalUyeleriYukle();
}

// ─── RAPORLAR ───
async function raporlariYukle() {
  const { data } = await sb.from('degerleme_raporlari').select('*, ilan:ilan_id(baslik, konum, fiyat)').order('created_at', { ascending: false });
  tumRaporlar = data || [];
  raporlariGoster(tumRaporlar);
}

function raporlariGoster(liste) {
  const el = document.getElementById('raporListesi');
  if (!liste.length) { el.innerHTML = '<div class="empty" style="padding:30px"><div class="empty-icon">📊</div><div class="empty-title">Rapor bulunamadı</div></div>'; return; }
  const toplamGelir = liste.filter(r => r.odeme_durumu === 'odendi').length * 800;
  el.innerHTML = `
    <div style="background:rgba(245,200,66,0.08);border:1px solid rgba(245,200,66,0.2);border-radius:var(--radius);padding:14px;margin-bottom:16px;display:flex;justify-content:space-between;align-items:center">
      <div><div style="font-size:12px;color:var(--text3);font-weight:700">TOPLAM RAPOR GELİRİ</div>
      <div style="font-size:22px;font-weight:900;color:var(--gold)">${toplamGelir.toLocaleString('tr-TR')} ₺</div></div>
      <div style="text-align:right"><div style="font-size:12px;color:var(--text3)">Ödenen rapor</div>
      <div style="font-size:18px;font-weight:900">${liste.filter(r=>r.odeme_durumu==='odendi').length}</div></div>
    </div>
    ${liste.map(r => {
      const ilan = r.ilan;
      const tarih = new Date(r.created_at).toLocaleDateString('tr-TR');
      const rapor = r.rapor_verisi;
      return `<div class="rapor-kart">
        <div class="rapor-kart-head">
          <div>
            <div class="admin-card-title">📊 ${ilan?.baslik||'İlan'}</div>
            <div class="admin-card-meta">📍 ${ilan?.konum||''} • 📅 ${tarih}</div>
            ${rapor?`<div style="margin-top:4px;font-size:12px;color:var(--text2)">Değer: <strong style="color:var(--gold)">${Number(rapor.deger_tahmini?.gercekci||0).toLocaleString('tr-TR')} ₺</strong></div>`:''}
          </div>
          <span class="durum-badge ${r.durum==='tamamlandi'?'durum-tamamlandi':'durum-bekliyor'}">${r.durum}</span>
        </div>
        <div class="admin-card-actions">
          <a href="rapor.html?ilan_id=${r.ilan_id}" class="act-btn act-blue">👁️ Raporu Gör</a>
          <a href="ilan-detay.html?id=${r.ilan_id}" class="act-btn act-gold">🏠 İlanı Gör</a>
          <button class="act-btn act-rust" onclick="raporSilAdmin('${r.id}')">🗑️ Sil</button>
        </div>
      </div>`;
    }).join('')}`;
}

function raporFiltrele(filtre, el) {
  document.querySelectorAll('#raporFiltreler .act-btn').forEach(b => b.classList.remove('act-gold'));
  el.classList.add('act-gold');
  raporlariGoster(filtre === 'tumu' ? tumRaporlar : tumRaporlar.filter(r => r.durum === filtre));
}

async function raporSilAdmin(id) {
  if (!confirm('Bu raporu silmek istediğinizden emin misiniz?')) return;
  await sb.from('degerleme_raporlari').delete().eq('id', id);
  await raporlariYukle(); await ozetYukle();
}

// ─── MESAJLAR ───
async function mesajlariYukle() {
  const { data } = await sb.from('mesajlar').select('*').order('created_at', { ascending: false }).limit(50);
  tumMesajlar = data || [];
  const el = document.getElementById('mesajListesi');
  if (!tumMesajlar.length) { el.innerHTML = '<div class="empty" style="padding:30px"><div class="empty-icon">💬</div><div class="empty-title">Mesaj bulunamadı</div></div>'; return; }
  el.innerHTML = tumMesajlar.map(m => `
    <div class="admin-card">
      <div class="admin-card-title" style="font-size:13px">${m.icerik}</div>
      <div class="admin-card-meta" style="margin-top:6px">📅 ${new Date(m.created_at).toLocaleString('tr-TR')} • ${m.okundu?'✅ Okundu':'🔴 Okunmadı'}</div>
    </div>`).join('');
}

// ─── ŞİKAYETLER ───
async function sikayetleriYukle() {
  const { data } = await sb.from('sikayetler').select('*').order('created_at', { ascending: false });
  tumSikayetler = data || [];
  sikayetleriGoster(tumSikayetler);
}

function sikayetleriGoster(liste) {
  const el = document.getElementById('sikayetListesi');
  if (!liste.length) { el.innerHTML = '<div class="empty" style="padding:30px"><div class="empty-icon">🚨</div><div class="empty-title">Şikayet bulunamadı</div></div>'; return; }
  el.innerHTML = liste.map(s => {
    const tarih = new Date(s.created_at).toLocaleDateString('tr-TR');
    return `<div class="admin-card">
      <div class="admin-card-head">
        <div>
          <div class="admin-card-title">${s.hedef_tip==='ilan'?'🏠':'💬'} ${s.sebep}</div>
          <div class="admin-card-meta">${s.hedef_tip==='ilan'?'İlan Şikayeti':'Kullanıcı Şikayeti'} • 📅 ${tarih}</div>
          ${s.aciklama?`<div style="font-size:12px;color:var(--text2);margin-top:4px">${s.aciklama}</div>`:''}
        </div>
        <span class="durum-badge durum-${s.durum||'bekliyor'}">${s.durum||'bekliyor'}</span>
      </div>
      <div class="admin-card-actions">
        ${s.hedef_tip==='ilan'?`<a href="ilan-detay.html?id=${s.hedef_id}" class="act-btn act-blue">👁️ İlanı Gör</a>`:''}
        <button class="act-btn act-blue" onclick="sikayetDurumGuncelle('${s.id}','inceleniyor')">🔍 İncele</button>
        <button class="act-btn act-green" onclick="sikayetDurumGuncelle('${s.id}','cozuldu')">✅ Çözüldü</button>
        <button class="act-btn act-rust" onclick="sikayetSilAdmin('${s.id}')">🗑️ Sil</button>
      </div>
    </div>`;
  }).join('');
}

function sikayetFiltrele(filtre, el) {
  document.querySelectorAll('#sikayetFiltreler .act-btn').forEach(b => b.classList.remove('act-gold'));
  el.classList.add('act-gold');
  sikayetleriGoster(filtre === 'tumu' ? tumSikayetler : tumSikayetler.filter(s => s.durum === filtre));
}

async function sikayetDurumGuncelle(id, durum) {
  await sb.from('sikayetler').update({ durum }).eq('id', id);
  await sikayetleriYukle();
}

async function sikayetSilAdmin(id) {
  if (!confirm('Bu şikayeti silmek istediğinizden emin misiniz?')) return;
  await sb.from('sikayetler').delete().eq('id', id);
  await sikayetleriYukle();
}

function detayKapat() { document.getElementById('detayModal').classList.remove('open'); }

async function cikis() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}
</script>

    navigator.serviceWorker.register("/XxxGotapu/sw.js", { scope: "/XxxGotapu/" })

  }
