<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GoTapu 3D</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
html,body{height:100%;overflow:hidden;background:#111;color:#fff;font-family:sans-serif}
body{display:flex;flex-direction:column}
#top{height:48px;background:#1e293b;border-bottom:1px solid #334155;display:flex;align-items:center;padding:0 14px;gap:10px;flex-shrink:0}
#top h1{font-size:14px;font-weight:700}
.badge{background:rgba(29,158,117,.2);color:#6ee7b7;font-size:9px;padding:2px 7px;border-radius:8px;font-weight:800;border:1px solid rgba(29,158,117,.3)}
.main{flex:1;display:flex;overflow:hidden;min-height:0}
#wrap{flex:1;position:relative;overflow:hidden;min-width:0}
#bg{position:absolute;inset:0;width:100%;height:100%;object-fit:cover;z-index:0;display:none;pointer-events:none}
#cv{position:absolute;inset:0;width:100%;height:100%;z-index:1;cursor:grab;display:block}
#cv:active{cursor:grabbing}
#loader{position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);background:rgba(0,0,0,.8);color:#fff;padding:14px 22px;border-radius:12px;font-size:12px;font-weight:600;z-index:10;display:none;align-items:center;gap:10px;backdrop-filter:blur(8px)}
.spin{width:16px;height:16px;border:2px solid rgba(29,158,117,.3);border-top-color:#1D9E75;border-radius:50%;animation:sp .7s linear infinite;flex-shrink:0}
@keyframes sp{to{transform:rotate(360deg)}}
.panel{width:240px;min-width:240px;background:#1e293b;border-left:1px solid #334155;overflow-y:auto;padding:10px;display:flex;flex-direction:column;gap:5px;flex-shrink:0}
.panel::-webkit-scrollbar{width:3px}
.panel::-webkit-scrollbar-thumb{background:#334155}
.sep{font-size:9px;color:#475569;font-weight:700;text-transform:uppercase;letter-spacing:.07em;padding:6px 2px 3px;border-top:1px solid #334155;margin-top:2px}
.sep:first-child{border-top:none;padding-top:0}
.btn{padding:9px 11px;background:#334155;border:none;color:#fff;border-radius:8px;cursor:pointer;font-size:11px;font-weight:600;text-align:left;width:100%;transition:background .12s}
.btn:hover{background:#1D9E75}
.btn.on{background:#1D9E75}
.colors{display:flex;flex-wrap:wrap;gap:4px;padding:2px 0}
.dot{width:22px;height:22px;border-radius:50%;cursor:pointer;border:2px solid transparent;transition:all .12s}
.dot:hover{transform:scale(1.15)}
.dot.on{border-color:#fff;transform:scale(1.2)}
.row{display:flex;align-items:center;gap:8px}
.row label{font-size:10px;color:#94a3b8;width:48px;flex-shrink:0}
.row span{font-size:10px;font-weight:700;width:32px;text-align:right;flex-shrink:0}
input[type=range]{flex:1;accent-color:#1D9E75;cursor:pointer}
.delbtn{padding:8px;background:rgba(239,68,68,.1);border:1px solid rgba(239,68,68,.3);color:#fca5a5;border-radius:7px;cursor:pointer;font-size:11px;width:100%;font-family:sans-serif}
#sb{height:34px;background:#0f172a;border-top:1px solid #1e293b;display:flex;align-items:center;padding:0 14px;font-size:10px;color:#475569;flex-shrink:0}
</style>
</head>
<body>

<div id="top">
  <div style="width:28px;height:28px;background:#1D9E75;border-radius:7px;display:flex;align-items:center;justify-content:center;font-weight:800;font-size:13px">G</div>
  <h1>GoTapu 3D</h1>
  <span class="badge">BETA</span>
  <div style="flex:1"></div>
  <button class="btn" style="width:auto;padding:6px 14px" onclick="document.getElementById('fi').click()">📷 Oda Yükle</button>
</div>

<div class="main">
  <div id="wrap">
    <img id="bg" src="" alt="">
    <canvas id="cv"></canvas>
    <div id="loader"><div class="spin"></div><span id="loaderTxt">Yükleniyor...</span></div>
  </div>

  <div class="panel">
    <div class="sep">Koltuk Takımları</div>
    <button class="btn" onclick="addModel('sofa3',this)">🛋 Atlas 3'lü — 12.900₺</button>
    <button class="btn" onclick="addModel('sofa2',this)">🛋 Atlas 2'li — 9.400₺</button>
    <button class="btn" onclick="addModel('sofa1',this)">💺 Atlas Tekli — 5.800₺</button>

    <div class="sep">Oturma Odası</div>
    <button class="btn" onclick="addModel('table',this)">☕ Neva Sehpa — 2.200₺</button>
    <button class="btn" onclick="addModel('tv',this)">📺 Flex TV Ünitesi — 8.900₺</button>
    <button class="btn" onclick="addModel('shelf',this)">📚 Kitaplık — 4.800₺</button>

    <div class="sep">Yatak Odası</div>
    <button class="btn" onclick="addModel('bed',this)">🛏 Luna Yatak — 14.500₺</button>
    <button class="btn" onclick="addModel('wardrobe',this)">🚪 Flex Gardrop — 11.200₺</button>

    <div class="sep">Renk</div>
    <div class="colors" id="colorPalette">
      <div class="dot on" style="background:#C8A882" onclick="setClr(0xC8A882,this)"></div>
      <div class="dot" style="background:#8B7355" onclick="setClr(0x8B7355,this)"></div>
      <div class="dot" style="background:#4A3728" onclick="setClr(0x4A3728,this)"></div>
      <div class="dot" style="background:#1a1a1a" onclick="setClr(0x1a1a1a,this)"></div>
      <div class="dot" style="background:#F5F0E8;border:1px solid #555" onclick="setClr(0xF5F0E8,this)"></div>
      <div class="dot" style="background:#1B5E38" onclick="setClr(0x1B5E38,this)"></div>
      <div class="dot" style="background:#1B3A6E" onclick="setClr(0x1B3A6E,this)"></div>
      <div class="dot" style="background:#8B1A1A" onclick="setClr(0x8B1A1A,this)"></div>
      <div class="dot" style="background:#D4AF37" onclick="setClr(0xD4AF37,this)"></div>
      <div class="dot" style="background:#607D8B" onclick="setClr(0x607D8B,this)"></div>
    </div>

    <div class="sep">Kontrol</div>
    <div class="row">
      <label>Boyut</label>
      <input type="range" id="scSlider" min="0.3" max="3" step="0.05" value="1" oninput="doScale(this.value)">
      <span id="scVal">×1.0</span>
    </div>
    <div class="row">
      <label>Döndür</label>
      <input type="range" id="rotSlider" min="0" max="360" step="5" value="0" oninput="doRot(this.value)">
      <span id="rotVal">0°</span>
    </div>
    <button class="delbtn" onclick="delModel()">✕ Kaldır</button>
  </div>
</div>

<div id="sb">Oda fotoğrafı yükle — sağdan mobilya seç — sol tık: taşı • sağ tık: kamerayı döndür • scroll: zoom</div>

<input type="file" id="fi" accept="image/*" style="display:none" onchange="loadRoomPhoto(this)">

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/loaders/GLTFLoader.js"></script>
<script>
(function() {
'use strict';

var cv = document.getElementById('cv');
var wrap = document.getElementById('wrap');
var W = function() { return wrap.clientWidth || window.innerWidth - 240; };
var H = function() { return wrap.clientHeight || window.innerHeight - 82; };

var renderer = new THREE.WebGLRenderer({ canvas: cv, antialias: true, alpha: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.shadowMap.enabled = true;
renderer.shadowMap.type = THREE.PCFSoftShadowMap;
renderer.setClearColor(0x000000, 0);
renderer.setSize(W(), H());

var scene = new THREE.Scene();
var camera = new THREE.PerspectiveCamera(45, W() / H(), 0.01, 200);
camera.position.set(0, 2, 6);
camera.lookAt(0, 1, 0);

scene.add(new THREE.AmbientLight(0xffffff, 1.0));
var sun = new THREE.DirectionalLight(0xfff8e0, 1.2);
sun.position.set(5, 10, 5);
sun.castShadow = true;
sun.shadow.mapSize.width = sun.shadow.mapSize.height = 1024;
scene.add(sun);
var fill = new THREE.DirectionalLight(0xaaccff, 0.5);
fill.position.set(-3, 4, -2);
scene.add(fill);

var gnd = new THREE.Mesh(
  new THREE.PlaneGeometry(50, 50),
  new THREE.ShadowMaterial({ opacity: 0.25 })
);
gnd.rotation.x = -Math.PI / 2;
gnd.receiveShadow = true;
scene.add(gnd);

window.addEventListener('resize', function() {
  renderer.setSize(W(), H());
  camera.aspect = W() / H();
  camera.updateProjectionMatrix();
});

(function loop() { requestAnimationFrame(loop); renderer.render(scene, camera); })();

var cam = { theta: 0.5, phi: 1.1, r: 6, tx: 0, ty: 0.8 };

function applyCam() {
  var t = cam.theta, p = cam.phi, r = cam.r;
  camera.position.set(
    cam.tx + r * Math.sin(p) * Math.sin(t),
    cam.ty + r * Math.cos(p),
    r * Math.sin(p) * Math.cos(t)
  );
  camera.lookAt(cam.tx, cam.ty * 0.6, 0);
}
applyCam();

var model = null;
var curColor = 0xC8A882;
var floorPlane = new THREE.Plane(new THREE.Vector3(0, 1, 0), 0);
var ray = new THREE.Raycaster();
var ndc = new THREE.Vector2();

function floorHit(cx, cy) {
  var r = cv.getBoundingClientRect();
  ndc.x = ((cx - r.left) / r.width) * 2 - 1;
  ndc.y = -((cy - r.top) / r.height) * 2 + 1;
  ray.setFromCamera(ndc, camera);
  var pt = new THREE.Vector3();
  return ray.ray.intersectPlane(floorPlane, pt) ? pt.clone() : null;
}

var dragging = false, orbiting = false;
var dragOff = new THREE.Vector3();
var lastXY = { x: 0, y: 0 };

cv.addEventListener('mousedown', function(e) {
  e.preventDefault();
  lastXY = { x: e.clientX, y: e.clientY };
  if (e.button === 0 && model) {
    var pt = floorHit(e.clientX, e.clientY);
    if (pt) { dragging = true; dragOff.subVectors(model.position, pt); }
  } else { orbiting = true; }
});
cv.addEventListener('mousemove', function(e) {
  if (dragging && model) {
    var pt = floorHit(e.clientX, e.clientY);
    if (pt) { model.position.x = pt.x + dragOff.x; model.position.z = pt.z + dragOff.z; }
  } else if (orbiting) {
    cam.theta -= (e.clientX - lastXY.x) * 0.008;
    cam.phi = Math.max(0.1, Math.min(1.45, cam.phi + (e.clientY - lastXY.y) * 0.008));
    lastXY = { x: e.clientX, y: e.clientY };
    applyCam();
  }
});
cv.addEventListener('mouseup', function() { dragging = false; orbiting = false; });
cv.addEventListener('mouseleave', function() { dragging = false; orbiting = false; });
cv.addEventListener('contextmenu', function(e) { e.preventDefault(); });
cv.addEventListener('wheel', function(e) {
  e.preventDefault();
  cam.r = Math.max(1, Math.min(20, cam.r + e.deltaY * 0.015));
  applyCam();
}, { passive: false });

var tdrag = false, torbit = false, toff = new THREE.Vector3(), tlast = {x:0,y:0};
cv.addEventListener('touchstart', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  if (e.touches.length === 1 && model) {
    var pt = floorHit(t.clientX, t.clientY);
    if (pt) { tdrag = true; toff.subVectors(model.position, pt); return; }
  }
  torbit = true; tlast = {x:t.clientX, y:t.clientY};
}, { passive: false });
cv.addEventListener('touchmove', function(e) {
  e.preventDefault();
  var t = e.touches[0];
  if (tdrag && model) {
    var pt = floorHit(t.clientX, t.clientY);
    if (pt) { model.position.x = pt.x + toff.x; model.position.z = pt.z + toff.z; }
  } else if (torbit) {
    cam.theta -= (t.clientX - tlast.x) * 0.008;
    cam.phi = Math.max(0.1, Math.min(1.45, cam.phi + (t.clientY - tlast.y) * 0.008));
    tlast = {x:t.clientX, y:t.clientY};
    applyCam();
  }
}, { passive: false });
cv.addEventListener('touchend', function() { tdrag = false; torbit = false; });

var LEG = 0x5c3d1e, GREY = 0xdddddd;

function box(w, h, d, col, x, y, z) {
  var m = new THREE.Mesh(new THREE.BoxGeometry(w, h, d), new THREE.MeshLambertMaterial({ color: col }));
  m.position.set(x||0, y||0, z||0); m.castShadow = true; m.receiveShadow = true; return m;
}
function cyl(rt, rb, h, col, x, y, z) {
  var m = new THREE.Mesh(new THREE.CylinderGeometry(rt, rb, h, 16), new THREE.MeshLambertMaterial({ color: col }));
  m.position.set(x||0, y||0, z||0); m.castShadow = true; m.receiveShadow = true; return m;
}

function makeSofa(w) {
  var g = new THREE.Group(), c = curColor;
  g.add(box(w, 0.20, 0.90, c, 0, 0.40, 0));
  g.add(box(w, 0.58, 0.14, c, 0, 0.74, -0.38));
  g.add(box(0.14, 0.32, 0.90, c, -w/2+0.07, 0.56, 0));
  g.add(box(0.14, 0.32, 0.90, c,  w/2-0.07, 0.56, 0));
  var lx = w/2-0.12, lz = 0.34;
  [[-lx,lz],[lx,lz],[lx,-lz],[-lx,-lz]].forEach(function(p) {
    g.add(cyl(0.04, 0.04, 0.30, LEG, p[0], 0.15, p[1]));
  });
  var n = Math.max(1, Math.round(w / 0.72));
  for (var i = 0; i < n; i++) {
    var ox = (i - (n-1)/2) * (w/n);
    g.add(box(w/n-0.06, 0.28, 0.38, GREY, ox, 0.64, -0.22));
  }
  return g;
}

function makeTable() {
  var g = new THREE.Group();
  g.add(cyl(0.44, 0.44, 0.06, 0x111111, 0, 0.46, 0));
  g.add(cyl(0.05, 0.09, 0.43, LEG, 0, 0.22, 0));
  g.add(cyl(0.28, 0.28, 0.04, LEG, 0, 0.02, 0));
  return g;
}

function makeTV() {
  var g = new THREE.Group(), c = curColor;
  g.add(box(1.90, 0.48, 0.42, c, 0, 0.24, 0));
  g.add(box(0.60, 0.38, 0.02, 0xaaaaaa, -0.63, 0.24, 0.22));
  g.add(box(0.60, 0.38, 0.02, 0xaaaaaa, 0, 0.24, 0.22));
  g.add(box(0.60, 0.38, 0.02, 0xaaaaaa, 0.63, 0.24, 0.22));
  g.add(box(1.30, 0.75, 0.05, 0x050505, 0, 0.96, 0.19));
  g.add(box(1.90, 0.04, 0.38, c, 0, 0.02, 0));
  return g;
}

function makeShelf() {
  var g = new THREE.Group(), c = curColor;
  g.add(box(0.04, 1.80, 0.32, c, -0.44, 0.90, 0));
  g.add(box(0.04, 1.80, 0.32, c,  0.44, 0.90, 0));
  [0.08, 0.52, 0.96, 1.40, 1.75].forEach(function(y) { g.add(box(0.88, 0.04, 0.32, c, 0, y, 0)); });
  g.add(box(0.88, 1.80, 0.02, 0x888888, 0, 0.90, -0.15));
  return g;
}

function makeBed() {
  var g = new THREE.Group(), c = curColor;
  g.add(box(1.65, 0.25, 2.05, 0x8B7355, 0, 0.125, 0));
  g.add(box(1.55, 0.22, 1.90, c, 0, 0.36, 0));
  g.add(box(1.65, 0.65, 0.14, 0x8B7355, 0, 0.575, -0.955));
  g.add(box(0.55, 0.14, 0.38, GREY, -0.35, 0.54, 0.82));
  g.add(box(0.55, 0.14, 0.38, GREY,  0.35, 0.54, 0.82));
  return g;
}

function makeWardrobe() {
  var g = new THREE.Group(), c = curColor;
  g.add(box(2.00, 2.10, 0.60, c, 0, 1.05, 0));
  g.add(box(0.95, 2.00, 0.03, 0xcccccc, -0.50, 1.05, 0.315));
  g.add(box(0.95, 2.00, 0.03, 0xcccccc,  0.50, 1.05, 0.315));
  var sp = new THREE.Mesh(new THREE.SphereGeometry(0.03,8,8), new THREE.MeshLambertMaterial({color:0xD4AF37}));
  sp.position.set(-0.20, 1.05, 0.345); sp.castShadow=true; g.add(sp);
  var sp2 = sp.clone(); sp2.position.set(0.20, 1.05, 0.345); g.add(sp2);
  return g;
}

var BUILDERS = {
  sofa3: function() { return makeSofa(2.10); },
  sofa2: function() { return makeSofa(1.60); },
  sofa1: function() { return makeSofa(0.90); },
  table: function() { return makeTable(); },
  tv:    function() { return makeTV(); },
  shelf: function() { return makeShelf(); },
  bed:   function() { return makeBed(); },
  wardrobe: function() { return makeWardrobe(); },
};

var GLB = {
  sofa3: { url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/GlamVelvetSofa/glTF-Binary/GlamVelvetSofa.glb', size: 2.1 },
  sofa2: { url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/GlamVelvetSofa/glTF-Binary/GlamVelvetSofa.glb', size: 1.6 },
  sofa1: { url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/SheenChair/glTF-Binary/SheenChair.glb', size: 0.9 },
  bed:   { url: 'https://raw.githubusercontent.com/KhronosGroup/glTF-Sample-Assets/main/Models/GlamVelvetSofa/glTF-Binary/GlamVelvetSofa.glb', size: 1.7 },
};

function showLoader(txt) {
  document.getElementById('loaderTxt').textContent = txt || 'Yükleniyor...';
  document.getElementById('loader').style.display = 'flex';
}
function hideLoader() { document.getElementById('loader').style.display = 'none'; }

function tryGLB(key, onOk, onFail) {
  var info = GLB[key];
  if (!info || !THREE.GLTFLoader) { onFail(); return; }
  showLoader('3D model yükleniyor...');
  var loader = new THREE.GLTFLoader();
  loader.load(info.url,
    function(gltf) {
      hideLoader();
      var m = gltf.scene;
      var b = new THREE.Box3().setFromObject(m);
      var s = new THREE.Vector3(); b.getSize(s);
      var sc = info.size / Math.max(s.x, s.y, s.z);
      m.scale.setScalar(sc);
      m.traverse(function(c) { if (c.isMesh) { c.castShadow=true; c.receiveShadow=true; }});
      onOk(m);
    },
    function(p) { showLoader('Yükleniyor %' + Math.round(p.loaded/(p.total||1)*100) + '...'); },
    function() { hideLoader(); onFail(); }
  );
}

function placeModel(m) {
  model = m;
  model.position.set(0, 0, 0);
  scene.add(model);
  var b = new THREE.Box3().setFromObject(model);
  var s = new THREE.Vector3(); b.getSize(s);
  model.position.y = -b.min.y;
  var md = Math.max(s.x, s.y, s.z);
  cam.r = md * 3.5; cam.theta = 0.5; cam.phi = 1.1;
  cam.tx = 0; cam.ty = s.y * 0.5;
  applyCam();
  document.getElementById('scSlider').value = 1;
  document.getElementById('scVal').textContent = '×1.0';
  document.getElementById('rotSlider').value = 0;
  document.getElementById('rotVal').textContent = '0°';
  sb('Mobilya eklendi ✓ — Sol tık: taşı | Sağ tık: döndür | Scroll: zoom');
}

window.addModel = function(key, btn) {
  if (model) { scene.remove(model); model = null; }
  document.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('on'); });
  if (btn) btn.classList.add('on');
  if (GLB[key]) {
    tryGLB(key, function(m) { placeModel(m); }, function() { placeModel(BUILDERS[key]()); });
  } else {
    placeModel(BUILDERS[key]());
  }
};

window.setClr = function(hex, el) {
  curColor = hex;
  document.querySelectorAll('.dot').forEach(function(d) { d.classList.remove('on'); });
  if (el) el.classList.add('on');
  if (!model) return;
  var col = new THREE.Color(hex);
  model.traverse(function(c) {
    if (c.isMesh && c.material && c.material.color) {
      var mc = c.material.color;
      if (mc.r > 0.25 || mc.g > 0.2 || mc.b > 0.35) { c.material.color.set(col); }
    }
  });
};

window.doScale = function(v) {
  document.getElementById('scVal').textContent = '×' + parseFloat(v).toFixed(1);
  if (model) model.scale.setScalar(parseFloat(v));
};

window.doRot = function(v) {
  document.getElementById('rotVal').textContent = v + '°';
  if (model) model.rotation.y = v * Math.PI / 180;
};

window.delModel = function() {
  if (model) { scene.remove(model); model = null; }
  document.querySelectorAll('.btn').forEach(function(b) { b.classList.remove('on'); });
  sb('Model kaldırıldı');
};

// ─── ODA FOTOĞRAFI — DÜZELTİLDİ ─────────────────────────────────
// ÖNEMLİ: Cloudflare URL değişirse sadece bu satırı güncelle!
const API_URL = 'https://deck-locking-tribal-shareware.trycloudflare.com';
const MAX_SIZE = 800; // Fotoğrafı 800px'e küçült — timeout önler

// Fotoğrafı canvas ile yeniden boyutlandır ve blob döndür
function resizeImage(file, maxPx) {
  return new Promise(function(resolve) {
    var img = new Image();
    var url = URL.createObjectURL(file);
    img.onload = function() {
      var w = img.width, h = img.height;
      var scale = Math.min(1, maxPx / Math.max(w, h));
      var nw = Math.round(w * scale), nh = Math.round(h * scale);
      var c = document.createElement('canvas');
      c.width = nw; c.height = nh;
      c.getContext('2d').drawImage(img, 0, 0, nw, nh);
      URL.revokeObjectURL(url);
      c.toBlob(resolve, 'image/jpeg', 0.92);
    };
    img.src = url;
  });
}

window.loadRoomPhoto = async function(inp) {
  var f = inp.files[0]; if (!f) return;
  inp.value = ''; // Aynı dosyayı tekrar seçebilmek için sıfırla

  showLoader('Fotoğraf hazırlanıyor...');

  try {
    // 1. Fotoğrafı küçült (800px max)
    var resized = await resizeImage(f, MAX_SIZE);

    showLoader('Mobilyalar siliniyor... (20-30 sn)');

    // 2. API'ye gönder
    var formData = new FormData();
    formData.append('file', resized, 'room.jpg');

    var res = await fetch(API_URL + '/clean-room', {
      method: 'POST',
      body: formData
    });

    if (!res.ok) throw new Error('API ' + res.status);

    var blob = await res.blob();
    var cleanUrl = URL.createObjectURL(blob);

    // 3. Temizlenmiş fotoğrafı göster
    var bgImg = document.getElementById('bg');
    bgImg.onload = function() {
      bgImg.style.display = 'block';
      hideLoader();
      sb('Oda hazır ✓ — sağdan mobilya seç ve yerleştir');
    };
    bgImg.onerror = function() { hideLoader(); sb('Görüntü yüklenemedi'); };
    bgImg.style.display = 'none';
    bgImg.src = cleanUrl;

  } catch(e) {
    console.error('API hatası:', e);
    // Fallback: orijinal fotoğrafı göster
    var fallbackUrl = URL.createObjectURL(f);
    var bgImg = document.getElementById('bg');
    bgImg.onload = function() { bgImg.style.display = 'block'; hideLoader(); };
    bgImg.src = fallbackUrl;
    sb('⚠ API bağlanamadı — orijinal gösteriliyor');
  }
};

// Demo oda
window.addEventListener('load', function() {

    document.getElementById('wrap').style.background = 'linear-gradient(135deg,#1e293b 0%,#0f172a 100%)';
  };
});

function sb(msg) { document.getElementById('sb').textContent = msg; }

})();
