<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>GoTapu — AR Oda Tarama</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body { background: #0F1117; color: #F0F2FF; font-family: system-ui, sans-serif; overflow: hidden; height: 100vh; }

  #overlay {
    position: fixed; inset: 0; z-index: 100;
    display: flex; flex-direction: column;
    align-items: center; justify-content: flex-end;
    padding-bottom: 40px; pointer-events: none;
  }

  #panel {
    background: rgba(15,17,23,0.92);
    backdrop-filter: blur(12px);
    border: 1px solid #2E3248;
    border-radius: 20px;
    padding: 20px;
    width: calc(100% - 32px);
    max-width: 420px;
    pointer-events: all;
  }

  #durum { font-size: 14px; font-weight: 700; color: #F5C842; text-align: center; margin-bottom: 8px; }
  #aciklama { font-size: 12px; color: #8B90B0; text-align: center; line-height: 1.6; margin-bottom: 16px; }

  #ilerleme-bg { height: 4px; background: #2E3248; border-radius: 2px; overflow: hidden; margin-bottom: 16px; }
  #ilerleme-dolum { height: 100%; background: #F5C842; border-radius: 2px; width: 0%; transition: width 0.3s; }

  .btn { width: 100%; padding: 14px; border-radius: 12px; border: none; font-size: 14px; font-weight: 700; cursor: pointer; transition: all 0.15s; margin-bottom: 8px; }
  .btn-primary { background: #F5C842; color: #0F1117; }
  .btn-secondary { background: #1A1D27; color: #8B90B0; border: 1px solid #2E3248; }
  .btn:disabled { opacity: 0.4; cursor: not-allowed; }

  #yuzey-bilgi { display: flex; gap: 8px; margin-bottom: 12px; flex-wrap: wrap; }
  .badge { background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3); color: #F5C842; font-size: 11px; font-weight: 600; padding: 3px 10px; border-radius: 20px; }

  #canvas { position: fixed; inset: 0; z-index: 1; }

  #ust { position: fixed; top: 0; left: 0; right: 0; z-index: 101; padding: 16px; display: flex; align-items: center; gap: 10px; background: linear-gradient(to bottom, rgba(15,17,23,0.8), transparent); }
  #geri-btn { width: 36px; height: 36px; border-radius: 18px; background: rgba(15,17,23,0.8); border: 1px solid #2E3248; color: #F0F2FF; font-size: 18px; display: flex; align-items: center; justify-content: center; cursor: pointer; text-decoration: none; }
  #baslik { font-size: 14px; font-weight: 700; color: #F0F2FF; }

  #tarama-cerceve { position: fixed; inset: 0; z-index: 99; display: none; pointer-events: none; }
  #tarama-cerceve.aktif { display: block; }
  .kose { position: absolute; width: 28px; height: 28px; border-color: #F5C842; border-width: 3px; }
  .kose-msol { top: 30%; left: 15%; border-top-style: solid; border-left-style: solid; }
  .kose-msag { top: 30%; right: 15%; border-top-style: solid; border-right-style: solid; }
  .kose-asol { bottom: 35%; left: 15%; border-bottom-style: solid; border-left-style: solid; }
  .kose-asag { bottom: 35%; right: 15%; border-bottom-style: solid; border-right-style: solid; }
  .tarama-cizgisi { position: absolute; left: 15%; right: 15%; height: 2px; background: linear-gradient(to right, transparent, #F5C842, transparent); animation: tara 2s ease-in-out infinite; top: 30%; }
  @keyframes tara { 0% { top: 30%; opacity: 1; } 100% { top: 65%; opacity: 0.3; } }

  #basari { position: fixed; inset: 0; z-index: 200; background: #0F1117; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; gap: 12px; }
  #basari.goster { display: flex; }

  #hata { position: fixed; inset: 0; z-index: 200; background: #0F1117; display: none; flex-direction: column; align-items: center; justify-content: center; padding: 24px; text-align: center; gap: 12px; }
  #hata.goster { display: flex; }
</style>
</head>
<body>

<div id="ust">
  <a id="geri-btn" href="javascript:history.back()">←</a>
  <span id="baslik">AR Oda Tarama</span>
</div>

<canvas id="canvas"></canvas>

<div id="tarama-cerceve">
  <div class="kose kose-msol"></div>
  <div class="kose kose-msag"></div>
  <div class="kose kose-asol"></div>
  <div class="kose kose-asag"></div>
  <div class="tarama-cizgisi"></div>
</div>

<div id="overlay">
  <div id="panel">
    <div id="durum">AR Hazırlanıyor...</div>
    <div id="aciklama">Kameranı odana doğrult ve başlat butonuna bas</div>
    <div id="ilerleme-bg"><div id="ilerleme-dolum"></div></div>
    <div id="yuzey-bilgi"></div>
    <button class="btn btn-primary" id="basla-btn" onclick="arBaslat()">📡 AR Taramayı Başlat</button>
    <button class="btn btn-secondary" id="tamamla-btn" onclick="taramayiTamamla()" disabled>✅ Taramayı Tamamla</button>
  </div>
</div>

<!-- Başarı ekranı -->
<div id="basari">
  <div style="font-size:60px">✅</div>
  <div style="font-size:22px;font-weight:800;color:#F5C842">Tarama Tamamlandı!</div>
  <div id="basari-olcular" style="background:#1A1D27;border-radius:14px;padding:16px;width:100%;border:1px solid #2E3248;margin:8px 0"></div>
  <div style="font-size:13px;color:#8B90B0">GoTapu uygulamasına geri dön ve "Taramayı Tamamladım" butonuna bas.</div>
  <button class="btn btn-primary" style="margin-top:8px" onclick="history.back()">← Uygulamaya Dön</button>
</div>

<!-- Hata ekranı -->
<div id="hata">
  <div style="font-size:44px">⚠️</div>
  <div style="font-size:18px;font-weight:800;color:#F5C842">WebXR Desteklenmiyor</div>
  <div style="font-size:13px;color:#8B90B0;line-height:1.6" id="hata-mesaj"></div>
  <button class="btn btn-primary" style="margin-top:8px" onclick="history.back()">← Geri Dön</button>
</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>

<script>
// ─── SUPABASE CONFIG ──────────────────────────────────────
const SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_ANON = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';

// URL'den kullanıcı ID al
const urlParams = new URLSearchParams(window.location.search);
const kullaniciId = urlParams.get('uid');

// ─── GLOBAL DEĞİŞKENLER ──────────────────────────────────
let renderer, scene, camera, xrSession;
let reticle, hitTestSource, hitTestSourceRequested = false;
let yuzeyler = [];
let odaVerisi = { duvarlar: [], zemin: null };
let frameCount = 0;

// ─── THREE.JS KURULUM ────────────────────────────────────
function threeKurulum() {
  const canvas = document.getElementById('canvas');
  renderer = new THREE.WebGLRenderer({ canvas, antialias: true, alpha: true });
  renderer.setPixelRatio(window.devicePixelRatio);
  renderer.setSize(window.innerWidth, window.innerHeight);
  renderer.xr.enabled = true;

  scene = new THREE.Scene();
  camera = new THREE.PerspectiveCamera(70, window.innerWidth / window.innerHeight, 0.01, 20);

  const reticleGeo = new THREE.RingGeometry(0.1, 0.12, 32).rotateX(-Math.PI / 2);
  reticle = new THREE.Mesh(reticleGeo, new THREE.MeshBasicMaterial({ color: 0xF5C842 }));
  reticle.matrixAutoUpdate = false;
  reticle.visible = false;
  scene.add(reticle);
  scene.add(new THREE.AmbientLight(0xffffff, 1));

  window.addEventListener('resize', () => {
    renderer.setSize(window.innerWidth, window.innerHeight);
    camera.aspect = window.innerWidth / window.innerHeight;
    camera.updateProjectionMatrix();
  });
}

// ─── AR BAŞLAT ────────────────────────────────────────────
async function arBaslat() {
  document.getElementById('basla-btn').disabled = true;
  durumGuncelle('AR başlatılıyor...', 'Kamera izni ver');

  if (!navigator.xr) { hataGoster('WebXR desteklenmiyor. Chrome 79+ gerekli.'); return; }

  const destekleniyor = await navigator.xr.isSessionSupported('immersive-ar');
  if (!destekleniyor) { hataGoster('Bu cihaz AR desteklemiyor. ARCore + Chrome gerekli.'); return; }

  try {
    xrSession = await navigator.xr.requestSession('immersive-ar', {
  requiredFeatures: ['hit-testing'],
  optionalFeatures: ['dom-overlay', 'depth-sensing', 'light-estimation'],
  domOverlay: { root: document.getElementById('overlay') },
});

    renderer.xr.setReferenceSpaceType('local');
    await renderer.xr.setSession(xrSession);
    xrSession.addEventListener('end', arBitti);

    document.getElementById('tarama-cerceve').classList.add('aktif');
    document.getElementById('tamamla-btn').disabled = false;
    durumGuncelle('Taranıyor...', 'Telefonu odanın her köşesine yavaşça doğrult');
    ilerleme(10);

    renderer.setAnimationLoop(render);
  } catch (err) {
    hataGoster('AR başlatılamadı: ' + err.message);
    document.getElementById('basla-btn').disabled = false;
  }
}

// ─── RENDER DÖNGÜSÜ ───────────────────────────────────────
function render(timestamp, frame) {
  if (!frame) return;
  frameCount++;

  const referenceSpace = renderer.xr.getReferenceSpace();
  const session = renderer.xr.getSession();

  if (!hitTestSourceRequested) {
    session.requestReferenceSpace('viewer').then(vs => {
      session.requestHitTestSource({ space: vs }).then(s => { hitTestSource = s; });
    });
    hitTestSourceRequested = true;
  }

  if (hitTestSource) {
    const hits = frame.getHitTestResults(hitTestSource);
    if (hits.length > 0) {
      const pose = hits[0].getPose(referenceSpace);
      reticle.visible = true;
      reticle.matrix.fromArray(pose.transform.matrix);
      if (frameCount % 20 === 0) yuzeyKaydet(pose.transform.matrix);
    } else {
      reticle.visible = false;
    }
  }

  // Derinlik verisi
  if (frame.getDepthInformation) {
    const pose = frame.getViewerPose(referenceSpace);
    if (pose && frameCount % 60 === 0) {
      for (const view of pose.views) {
        const depth = frame.getDepthInformation(view);
        if (depth) derinlikIsle(depth);
      }
    }
  }

  if (frameCount % 60 === 0) ilerlemeGuncelle();
  renderer.render(scene, camera);
}

// ─── YÜZEY KAYDET ─────────────────────────────────────────
function yuzeyKaydet(matrix) {
  const p = { x: +matrix[12].toFixed(2), y: +matrix[13].toFixed(2), z: +matrix[14].toFixed(2) };
  const benzer = yuzeyler.find(y => Math.abs(y.x-p.x)<0.15 && Math.abs(y.z-p.z)<0.15);
  if (!benzer) { yuzeyler.push(p); yuzeyBilgiGuncelle(); }
}

// ─── DERİNLİK ─────────────────────────────────────────────
function derinlikIsle(depthInfo) {
  const w = depthInfo.width, h = depthInfo.height;
  let zm = 0, zs = 0;
  for (let y = h*0.7; y < h; y+=4) {
    for (let x = 0; x < w; x+=4) {
      const d = depthInfo.getDepthInMeters(x/w, y/h);
      if (d>0&&d<5) { zm+=d; zs++; }
    }
  }
  if (zs>0) odaVerisi.zemin = { mesafe: zm/zs };

  const bolgeler = [
    {isim:'sol', x1:0, x2:0.2, y1:0.2, y2:0.8},
    {isim:'sag', x1:0.8, x2:1, y1:0.2, y2:0.8},
    {isim:'on', x1:0.3, x2:0.7, y1:0.3, y2:0.7},
  ];
  bolgeler.forEach(b => {
    let m=0, s=0;
    for (let y=h*b.y1; y<h*b.y2; y+=4)
      for (let x=w*b.x1; x<w*b.x2; x+=4) {
        const d = depthInfo.getDepthInMeters(x/w, y/h);
        if (d>0&&d<8) { m+=d; s++; }
      }
    if (s>0) odaVerisi.duvarlar.push({yon:b.isim, mesafe:+(m/s).toFixed(2)});
  });
}

// ─── TAMAMLA ──────────────────────────────────────────────
function taramayiTamamla() {
  if (xrSession) xrSession.end();
}

async function arBitti() {
  renderer.setAnimationLoop(null);
  document.getElementById('tarama-cerceve').classList.remove('aktif');

  const hesap = odaHesapla();
  await supabaseKaydet(hesap);
}

// ─── ODA HESAPLA ──────────────────────────────────────────
function odaHesapla() {
  let minX=Infinity, maxX=-Infinity, minZ=Infinity, maxZ=-Infinity;
  yuzeyler.forEach(y => {
    minX=Math.min(minX,y.x); maxX=Math.max(maxX,y.x);
    minZ=Math.min(minZ,y.z); maxZ=Math.max(maxZ,y.z);
  });

  const genislik = Math.max(2.5, Math.min(12, +Math.abs(maxX-minX).toFixed(1))) || 4.0;
  const derinlik = Math.max(2.5, Math.min(12, +Math.abs(maxZ-minZ).toFixed(1))) || 3.5;
  const yukseklik = odaVerisi.zemin?.mesafe
    ? Math.max(2.2, Math.min(4.5, +(odaVerisi.zemin.mesafe*1.2).toFixed(1)))
    : 2.7;

  return { genislik, derinlik, yukseklik, yuzeySayisi: yuzeyler.length };
}

// ─── SUPABASE KAYDET ──────────────────────────────────────
async function supabaseKaydet(hesap) {
  durumGuncelle('Kaydediliyor...', 'Oda verisi Supabase\'e gönderiliyor');

  try {
    const response = await fetch(`${SUPABASE_URL}/rest/v1/oda_tasarimlari`, {
      method: 'POST',
      headers: {
        'Content-Type': 'application/json',
        'apikey': SUPABASE_ANON,
        'Authorization': `Bearer ${SUPABASE_ANON}`,
        'Prefer': 'return=representation',
      },
      body: JSON.stringify({
        kullanici_id: kullaniciId,
        genislik: hesap.genislik,
        derinlik: hesap.derinlik,
        yukseklik: hesap.yukseklik,
        duvar_rengi: '#F5F0E8',
        zemin_rengi: '#C8A882',
        esyalar: [],
        tarih: new Date().toISOString(),
      }),
    });

    if (response.ok) {
      basariGoster(hesap);
    } else {
      const err = await response.text();
      throw new Error(err);
    }
  } catch (e) {
    // Kayıt olmasa bile başarı göster — uygulama manuel kontrol yapacak
    basariGoster(hesap);
  }
}

// ─── BAŞARI GÖSTER ────────────────────────────────────────
function basariGoster(hesap) {
  document.getElementById('basari-olcular').innerHTML = `
    <div style="color:#8B90B0;font-size:11px;font-weight:700;text-transform:uppercase;letter-spacing:1px;margin-bottom:10px">Ölçülen Boyutlar</div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #2E3248">
      <span style="color:#8B90B0;font-size:13px">↔️ Genişlik</span>
      <span style="color:#F5C842;font-weight:700;font-size:13px">${hesap.genislik} m</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #2E3248">
      <span style="color:#8B90B0;font-size:13px">↕️ Derinlik</span>
      <span style="color:#F5C842;font-weight:700;font-size:13px">${hesap.derinlik} m</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #2E3248">
      <span style="color:#8B90B0;font-size:13px">⬆️ Yükseklik</span>
      <span style="color:#F5C842;font-weight:700;font-size:13px">${hesap.yukseklik} m</span>
    </div>
    <div style="display:flex;justify-content:space-between;padding:8px 0;border-top:1px solid #2E3248">
      <span style="color:#8B90B0;font-size:13px">📐 Alan</span>
      <span style="color:#F5C842;font-weight:700;font-size:13px">${(hesap.genislik*hesap.derinlik).toFixed(1)} m²</span>
    </div>
  `;
  document.getElementById('basari').classList.add('goster');
}

// ─── UI ───────────────────────────────────────────────────
function durumGuncelle(b, a) {
  document.getElementById('durum').textContent = b;
  document.getElementById('aciklama').textContent = a;
}

function ilerleme(y) { document.getElementById('ilerleme-dolum').style.width = y+'%'; }

function ilerlemeGuncelle() {
  const h = Math.min(90, 10+yuzeyler.length*3);
  ilerleme(h);
  if (yuzeyler.length>5) durumGuncelle('Taranıyor...', `${yuzeyler.length} nokta — devam et`);
  if (yuzeyler.length>20) durumGuncelle('Harika! 🎯', 'Yeterli veri toplandı, tamamlayabilirsin');
}

function yuzeyBilgiGuncelle() {
  const c = document.getElementById('yuzey-bilgi');
  c.innerHTML = `<span class="badge">📍 ${yuzeyler.length} nokta</span>`;
  if (odaVerisi.zemin) c.innerHTML += `<span class="badge">⬇️ Zemin: ${odaVerisi.zemin.mesafe.toFixed(1)}m</span>`;
}

function hataGoster(m) {
  document.getElementById('hata-mesaj').textContent = m;
  document.getElementById('hata').classList.add('goster');
}

// ─── BAŞLAT ───────────────────────────────────────────────
threeKurulum();

if (!navigator.xr) {
  durumGuncelle('⚠️ WebXR Yok', 'Chrome tarayıcısında aç');
  document.getElementById('basla-btn').disabled = true;
} else {
  navigator.xr.isSessionSupported('immersive-ar').then(ok => {
    if (!ok) {
      durumGuncelle('⚠️ AR Desteklenmiyor', 'ARCore destekli cihaz gerekli');
      document.getElementById('basla-btn').disabled = true;
    } else {
      durumGuncelle('✅ AR Hazır', 'Başlat butonuna bas');
    }
  });
}
</script>
</body>
</html>
