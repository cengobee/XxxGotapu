<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gotapu — Giriş / Kayıt</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: var(--bg); }
  .auth-box { width: 100%; max-width: 400px; }
  .auth-logo { text-align: center; margin-bottom: 36px; }
  .auth-logo .logo-icon { width: 64px; height: 64px; border-radius: 18px; font-size: 36px; margin: 0 auto 12px; display:flex;align-items:center;justify-content:center; }
  .auth-logo h1 { font-size: 32px; font-weight: 900; }
  .auth-logo p { font-size: 14px; color: var(--text3); margin-top: 4px; }
  .tabs { display: flex; background: var(--card); border-radius: 50px; padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; transition: all .2s; color: var(--text3); border: none; background: none; font-family: 'Nunito', sans-serif; }
  .tab.active { background: var(--gold); color: var(--bg); }
  .form { display: none; flex-direction: column; gap: 14px; }
  .form.active { display: flex; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 13px; margin: 4px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-google { background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; border: none; font-family: 'Nunito', sans-serif; width: 100%; }
  .error-msg { background: rgba(232,96,58,0.1); color: var(--rust); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: none; }
  .success-msg { background: rgba(46,204,113,0.1); color: var(--green); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: none; }
  .loading { display: none; text-align: center; padding: 12px; color: var(--text3); font-size: 14px; font-weight: 700; }
  .forgot-link { text-align: right; font-size: 13px; color: var(--gold); cursor: pointer; font-weight: 700; margin-top: -6px; }
  .forgot-link:active { opacity: 0.7; }
</style>
  <link rel="manifest" href="manifest.json">
  <meta name="theme-color" content="#f5c518">
  <meta name="mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <meta name="apple-mobile-web-app-title" content="GoTapu">
  <link rel="apple-touch-icon" href="icons/icon-192.png">
</head>
<body>
<div class="auth-box fade-up">
  <div class="auth-logo">
    <div class="logo-icon" style="background:var(--gold);">🏠</div>
    <h1>GoTapu</h1>
    <p>Evin Her Şeyi Burada</p>
  </div>

  <div class="tabs" id="tabBar">
    <button class="tab active" onclick="switchTab('giris')">Giriş Yap</button>
    <button class="tab" onclick="switchTab('kayit')">Kayıt Ol</button>
  </div>

  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  <div class="loading" id="loading">⏳ Lütfen bekleyin...</div>

  <div class="form active" id="girisForm">
    <input class="input" type="email" id="girisEmail" placeholder="E-posta adresiniz">
    <input class="input" type="password" id="girisPassword" placeholder="Şifreniz">
    <div class="forgot-link" onclick="switchTab('sifre')">Şifremi Unuttum →</div>
    <button class="btn btn-gold btn-lg" onclick="girisYap()">Giriş Yap →</button>
    <div class="divider">veya</div>
    <button class="btn-google" onclick="googleGiris()">🌐 Google ile Devam Et</button>
  </div>

  <div class="form" id="kayitForm">
    <input class="input" type="text" id="kayitAd" placeholder="Ad Soyad">
    <input class="input" type="tel" id="kayitTel" placeholder="Telefon (05XX XXX XX XX)">
    <input class="input" type="email" id="kayitEmail" placeholder="E-posta adresiniz">
    <input class="input" type="password" id="kayitPassword" placeholder="Şifre (min 6 karakter)">
    <button class="btn btn-gold btn-lg" onclick="kayitOl()">Kayıt Ol →</button>
    <div class="divider">veya</div>
    <button class="btn-google" onclick="googleGiris()">🌐 Google ile Devam Et</button>
  </div>

  <div class="form" id="yenisifreForm">
    <div style="text-align:center;font-size:40px;margin-bottom:4px">🔐</div>
    <div style="text-align:center;font-size:16px;font-weight:900;margin-bottom:4px">Yeni Şifre Belirle</div>
    <div style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:8px">Güvenli bir şifre seçin</div>
    <input class="input" type="password" id="yeniSifre" placeholder="Yeni şifre (min 6 karakter)">
    <input class="input" type="password" id="yeniSifreTekrar" placeholder="Yeni şifre tekrar">
    <button class="btn btn-gold btn-lg" onclick="yeniSifreKaydet()">✅ Şifremi Güncelle</button>
  </div>

  <div class="form" id="sifreForm">
    <div style="text-align:center;font-size:40px;margin-bottom:4px">🔑</div>
    <div style="text-align:center;font-size:16px;font-weight:900;margin-bottom:4px">Şifreni Sıfırla</div>
    <div style="text-align:center;font-size:13px;color:var(--text3);margin-bottom:8px">E-posta adresine sıfırlama bağlantısı göndereceğiz</div>
    <input class="input" type="email" id="sifreEmail" placeholder="E-posta adresiniz">
    <button class="btn btn-gold btn-lg" onclick="sifreSifirla()">📧 Sıfırlama Bağlantısı Gönder</button>
    <button class="btn btn-outline btn-md" onclick="switchTab('giris')" style="text-align:center">← Giriş Ekranına Dön</button>
  </div>
</div>

<script>
const SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

// Şifre sıfırlama linki mi? Bunu en başta sakla
const urlParams = new URLSearchParams(window.location.search);
const isPasswordReset = urlParams.get('code') !== null;

// Auth state değişikliğini dinle
sb.auth.onAuthStateChange((event, session) => {
  if (event === 'PASSWORD_RECOVERY') {
    switchTab('yenisifre');
    hideMessages();
  } else if (event === 'SIGNED_IN' && session) {
    if (isPasswordReset) {
      // Şifre sıfırlama linkinden gelindi — yeni şifre ekranını aç
      switchTab('yenisifre');
      hideMessages();
    } else {
      // Normal giriş — ana sayfaya git
      window.location.href = 'index.html';
    }
  }
});

// Sayfa yüklenince kontrol et
(async () => {
  // ?code= varsa PKCE flow — onAuthStateChange halleder, bekle
  if (isPasswordReset) return;

  // Eski implicit flow: #access_token + type=recovery
  const hash = window.location.hash;
  if (hash.includes('access_token') && hash.includes('type=recovery')) {
    const params = new URLSearchParams(hash.substring(1));
    const accessToken = params.get('access_token');
    const refreshToken = params.get('refresh_token') || '';
    try {
      const { error } = await sb.auth.setSession({ access_token: accessToken, refresh_token: refreshToken });
      if (error) throw error;
      switchTab('yenisifre');
    } catch(e) {
      showError('Link geçersiz veya süresi dolmuş. Yeni sıfırlama talebi gönderin.');
      switchTab('sifre');
    }
    return;
  }

  // Normal session kontrolü — giriş yapmışsa ana sayfaya
  const { data } = await sb.auth.getSession();
  if (data.session) window.location.href = 'index.html';
})();

function switchTab(tab) {
  document.getElementById('tabBar').style.display = (tab === 'sifre' || tab === 'yenisifre') ? 'none' : 'flex';
  document.querySelectorAll('.tab').forEach((t, i) => {
    t.classList.toggle('active', (i===0&&tab==='giris')||(i===1&&tab==='kayit'));
  });
  document.getElementById('girisForm').classList.toggle('active', tab==='giris');
  document.getElementById('kayitForm').classList.toggle('active', tab==='kayit');
  document.getElementById('sifreForm').classList.toggle('active', tab==='sifre');
  document.getElementById('yenisifreForm').classList.toggle('active', tab==='yenisifre');
  hideMessages();
}

function showError(msg) {
  const e = document.getElementById('errorMsg');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('successMsg').style.display = 'none';
}
function showSuccess(msg) {
  const e = document.getElementById('successMsg');
  e.textContent = msg; e.style.display = 'block';
  document.getElementById('errorMsg').style.display = 'none';
}
function hideMessages() {
  document.getElementById('errorMsg').style.display = 'none';
  document.getElementById('successMsg').style.display = 'none';
}
function setLoading(v) {
  document.getElementById('loading').style.display = v ? 'block' : 'none';
}

async function girisYap() {
  const email = document.getElementById('girisEmail').value.trim();
  const password = document.getElementById('girisPassword').value;
  if (!email || !password) return showError('E-posta ve şifre boş bırakılamaz!');
  setLoading(true);
  const { error } = await sb.auth.signInWithPassword({ email, password });
  setLoading(false);
  if (error) return showError('Giriş başarısız: ' + error.message);
  window.location.href = 'index.html';
}

async function kayitOl() {
  const ad = document.getElementById('kayitAd').value.trim();
  const tel = document.getElementById('kayitTel').value.trim();
  const email = document.getElementById('kayitEmail').value.trim();
  const password = document.getElementById('kayitPassword').value;
  if (!ad || !email || !password) return showError('Lütfen tüm alanları doldurun!');
  if (password.length < 6) return showError('Şifre en az 6 karakter olmalı!');
  setLoading(true);
  const { data, error } = await sb.auth.signUp({ email, password });
  if (error) { setLoading(false); return showError('Kayıt başarısız: ' + error.message); }
  if (data.user) {
    await sb.from('profiles').insert({ id: data.user.id, full_name: ad, phone: tel, email });
  }
  setLoading(false);
  showSuccess('✅ Kayıt başarılı! E-postanızı doğrulayın, ardından giriş yapabilirsiniz.');
}

async function yeniSifreKaydet() {
  const sifre = document.getElementById('yeniSifre').value;
  const tekrar = document.getElementById('yeniSifreTekrar').value;
  if (!sifre || !tekrar) return showError('Lütfen tüm alanları doldurun!');
  if (sifre.length < 6) return showError('Şifre en az 6 karakter olmalı!');
  if (sifre !== tekrar) return showError('Şifreler eşleşmiyor!');
  setLoading(true);
  const { error } = await sb.auth.updateUser({ password: sifre });
  setLoading(false);
  if (error) return showError('Hata: ' + error.message);
  showSuccess('✅ Şifreniz güncellendi!');
  setTimeout(() => { switchTab('giris'); }, 2000);
}

async function sifreSifirla() {
  const email = document.getElementById('sifreEmail').value.trim();
  if (!email) return showError('Lütfen e-posta adresinizi girin!');
  setLoading(true);
  const { error } = await sb.auth.resetPasswordForEmail(email, {
    redirectTo: 'https://cengobee.github.io/XxxGotapu/auth.html'
  });
  setLoading(false);
  if (error) return showError('Hata: ' + error.message);
  showSuccess('✅ Sıfırlama bağlantısı e-posta adresinize gönderildi!');
}

async function googleGiris() {
  const { error } = await sb.auth.signInWithOAuth({
    provider: 'google',
    options: { redirectTo: 'https://cengobee.github.io/XxxGotapu/index.html' }
  });
  if (error) showError('Google girişi başarısız: ' + error.message);
}
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/XxxGotapu/sw.js", { scope: "/XxxGotapu/" })
      .catch(e => console.log("SW error:", e));
  }
</script>
</body>
</html>
