<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gotapu — Giriş / Kayıt</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  body { display: flex; align-items: center; justify-content: center; min-height: 100vh; padding: 24px; background: var(--bg); }
  .auth-box { width: 100%; max-width: 400px; }
  .auth-logo { text-align: center; margin-bottom: 36px; }
  .auth-logo .logo-icon { width: 64px; height: 64px; border-radius: 18px; font-size: 36px; margin: 0 auto 12px; display:flex;align-items:center;justify-content:center; }
  .auth-logo h1 { font-size: 32px; font-weight: 900; }
  .auth-logo p { font-size: 14px; color: var(--text3); margin-top: 4px; }
  .tabs { display: flex; background: var(--card); border-radius: 50px; padding: 4px; margin-bottom: 28px; }
  .tab { flex: 1; padding: 10px; text-align: center; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; transition: all .2s; color: var(--text3); border: none; background: none; font-family: 'Nunito', sans-serif; }
  .tab.active { background: var(--gold); color: var(--bg); }
  .form { display: none; flex-direction: column; gap: 14px; }
  .form.active { display: flex; }
  .divider { display: flex; align-items: center; gap: 12px; color: var(--text3); font-size: 13px; margin: 4px 0; }
  .divider::before, .divider::after { content: ''; flex: 1; height: 1px; background: var(--border); }
  .btn-google { background: white; color: #333; display: flex; align-items: center; justify-content: center; gap: 10px; padding: 14px; border-radius: 50px; font-size: 15px; font-weight: 800; cursor: pointer; border: none; font-family: 'Nunito', sans-serif; width: 100%; }
  .error-msg { background: rgba(232,96,58,0.1); color: var(--rust); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: none; }
  .success-msg { background: rgba(46,204,113,0.1); color: var(--green); border-radius: 10px; padding: 12px 14px; font-size: 14px; font-weight: 700; display: none; }
  .loading { display: none; text-align: center; padding: 12px; color: var(--text3); font-size: 14px; font-weight: 700; }
</style>
</head>
<body>
<div class="auth-box fade-up">
  <div class="auth-logo">
    <div class="logo-icon" style="background:var(--gold);">🏠</div>
    <h1>GoTapu</h1>
    <p>Evin Her Şeyi Burada</p>
  </div>
  <div class="tabs">
    <button class="tab active" onclick="switchTab('giris')">Giriş Yap</button>
    <button class="tab" onclick="switchTab('kayit')">Kayıt Ol</button>
  </div>
  <div class="error-msg" id="errorMsg"></div>
  <div class="success-msg" id="successMsg"></div>
  <div class="loading" id="loading">⏳ Lütfen bekleyin...</div>

  <!-- GİRİŞ -->
  <div class="form active" id="girisForm">
    <input class="input" type="email" id="girisEmail" placeholder="E-posta adresiniz">
    <input class="input" type="password" id="girisPassword" placeholder="Şifreniz">
    <button class="btn btn-gold btn-lg" onclick="girisYap()">Giriş Yap →</button>
    <div class="divider">veya</div>
    <button class="btn-google" onclick="googleGiris()">🌐 Google ile Devam Et</button>
  </div>

  <!-- KAYIT -->
  <div class="form" id="kayitForm">
    <input class="input" type="text" id="kayitAd" placeholder="Ad Soyad">
    <input class="input" type="tel" id="kayitTel" placeholder="Telefon (05XX XXX XX XX)">
    <input class="input" type="email" id="kayitEmail" placeholder="E-posta adresiniz">
    <input class="input" type="password" id="kayitPassword" placeholder="Şifre (min 6 karakter)">
    <button class="btn btn-gold btn-lg" onclick="kayitOl()">Kayıt Ol →</button>
    <div class="divider">veya</div>
    <button class="btn-google" onclick="googleGiris()">🌐 Google ile Devam Et</button>
  </div>
</div>

<script>
  const SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
  const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
  const { createClient } = supabase;
  const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

  sb.auth.getSession().then(({ data }) => {
    if (data.session) window.location.href = 'index.html';
  });

  function switchTab(tab) {
    document.querySelectorAll('.tab').forEach((t, i) => {
      t.classList.toggle('active', (i===0&&tab==='giris')||(i===1&&tab==='kayit'));
    });
    document.getElementById('girisForm').classList.toggle('active', tab==='giris');
    document.getElementById('kayitForm').classList.toggle('active', tab==='kayit');
    hideMessages();
  }

  function showError(msg) { const e=document.getElementById('errorMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('successMsg').style.display='none'; }
  function showSuccess(msg) { const e=document.getElementById('successMsg'); e.textContent=msg; e.style.display='block'; document.getElementById('errorMsg').style.display='none'; }
  function hideMessages() { document.getElementById('errorMsg').style.display='none'; document.getElementById('successMsg').style.display='none'; }
  function setLoading(v) { document.getElementById('loading').style.display=v?'block':'none'; }

  async function girisYap() {
    const email = document.getElementById('girisEmail').value.trim();
    const password = document.getElementById('girisPassword').value;
    if (!email||!password) return showError('E-posta ve şifre boş bırakılamaz!');
    setLoading(true);
    const { error } = await sb.auth.signInWithPassword({ email, password });
    setLoading(false);
    if (error) return showError('Giriş başarısız: ' + error.message);
    window.location.href = 'index.html';
  }

  async function kayitOl() {
    const ad = document.getElementById('kayitAd').value.trim();
    const tel = document.getElementById('kayitTel').value.trim();
    const email = document.getElementById('kayitEmail').value.trim();
    const password = document.getElementById('kayitPassword').value;
    if (!ad||!email||!password) return showError('Lütfen tüm alanları doldurun!');
    if (password.length<6) return showError('Şifre en az 6 karakter olmalı!');
    setLoading(true);
    const { data, error } = await sb.auth.signUp({ email, password });
    if (error) { setLoading(false); return showError('Kayıt başarısız: ' + error.message); }
    if (data.user) {
      await sb.from('profiles').insert({ id: data.user.id, full_name: ad, phone: tel, email });
    }
    setLoading(false);
    showSuccess('✅ Kayıt başarılı! E-postanızı doğrulayın, ardından giriş yapabilirsiniz.');
  }

  async function googleGiris() {
    const { error } = await sb.auth.signInWithOAuth({ provider: 'google', options: { redirectTo: window.location.origin + '/index.html' } });
    if (error) showError('Google girişi başarısız: ' + error.message);
  }
</script>
</body>
</html>
