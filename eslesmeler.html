/* ══ 3'LÜ SEKME ══ */
.sekme-bar {
  display: flex; background: var(--card);
  border: 1px solid var(--border); border-radius: 50px;
  padding: 4px; gap: 2px; margin-bottom: 16px;
}
.sekme-btn {
  flex: 1; padding: 10px 6px; border: none; border-radius: 50px;
  background: transparent; color: var(--text3);
  font-family: Nunito, sans-serif; font-size: 12px; font-weight: 800;
  cursor: pointer; transition: all .2s; white-space: nowrap;
}
.sekme-btn.aktif { background: var(--gold); color: #1a1a1a; }

/* ══ İLAN SEÇİCİ ══ */
.ilan-secici {
  display: flex; gap: 6px; overflow-x: auto; padding-bottom: 6px;
  scrollbar-width: none; margin-bottom: 14px;
}
.ilan-secici::-webkit-scrollbar { display: none; }
.ilan-sec-btn {
  flex-shrink: 0; padding: 7px 14px; border-radius: 50px;
  background: var(--card); border: 1.5px solid var(--border);
  color: var(--text2); font-family: Nunito, sans-serif;
  font-size: 12px; font-weight: 800; cursor: pointer; transition: all .2s;
  white-space: nowrap;
}
.ilan-sec-btn.aktif {
  background: rgba(245,200,66,0.1); border-color: var(--gold); color: var(--gold);
}
.ilan-sec-btn.yeni-ilan {
  background: rgba(46,204,113,0.08); border-color: rgba(46,204,113,0.3); color: var(--green);
}

/* ══ ROL GÖSTERGE ══ */
.rol-banner {
  display: flex; align-items: center; gap: 10px;
  background: var(--card); border: 1px solid var(--border);
  border-radius: 12px; padding: 10px 14px; margin-bottom: 14px;
}
.rol-banner-text { flex: 1; font-size: 12px; color: var(--text2); font-weight: 700; }
.rol-banner-text b { color: var(--text); }
.kredi-hap {
  display: flex; align-items: center; gap: 5px;
  background: linear-gradient(135deg,#1a1a2e,#0f3460);
  border-radius: 50px; padding: 5px 12px; text-decoration: none;
}
.kredi-hap-sayi { font-size: 14px; font-weight: 900; color: #f5c518; }
.kredi-hap-label { font-size: 10px; color: rgba(255,255,255,0.5); font-weight: 700; }

/* ══ SWIPE ALANI ══ */
.swipe-area {
  position: relative; height: 460px;
  display: flex; align-items: center; justify-content: center;
  margin-bottom: 20px;
}
.swipe-card {
  position: absolute; width: 100%;
  border-radius: 24px; overflow: hidden;
  cursor: grab; user-select: none; touch-action: none;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  background: var(--card);
}
.card-img {
  height: 240px; display: flex; align-items: center;
  justify-content: center; font-size: 80px; position: relative;
}
.card-img img { width:100%; height:100%; object-fit:cover; position:absolute; inset:0; }
.match-pct {
  position: absolute; top: 12px; right: 12px;
  background: rgba(0,0,0,0.65); backdrop-filter: blur(8px);
  border-radius: 50px; padding: 5px 12px;
  font-size: 13px; font-weight: 800; color: var(--gold); z-index: 2;
}
.like-stamp {
  position: absolute; top: 20px; left: 14px; z-index: 3;
  border: 4px solid var(--green); color: var(--green);
  padding: 5px 12px; border-radius: 8px;
  font-size: 22px; font-weight: 900; letter-spacing: 2px;
  opacity: 0; transform: rotate(-15deg); pointer-events: none;
}
.nope-stamp {
  position: absolute; top: 20px; right: 14px; z-index: 3;
  border: 4px solid var(--rust); color: var(--rust);
  padding: 5px 12px; border-radius: 8px;
  font-size: 22px; font-weight: 900; letter-spacing: 2px;
  opacity: 0; transform: rotate(15deg); pointer-events: none;
}
.card-body { padding: 14px 16px 16px; background: var(--card2); }
.card-price { font-size: 20px; font-weight: 900; color: var(--gold); }
.card-title { font-size: 14px; font-weight: 700; margin: 4px 0; line-height: 1.4; }
.card-loc { font-size: 12px; color: var(--text3); margin-bottom: 8px; }
.card-specs { display: flex; gap: 12px; flex-wrap: wrap; margin-bottom: 8px; }
.card-spec { font-size: 12px; color: var(--text2); }
.match-reasons { display: flex; gap: 5px; flex-wrap: wrap; }
.reason-chip { font-size: 10px; font-weight: 700; padding: 2px 8px; border-radius: 50px; background: rgba(46,204,113,0.12); color: var(--green); }
.card-detay-btn {
  display: block; width: 100%; padding: 10px;
  background: rgba(245,200,66,0.1); border: 1px solid rgba(245,200,66,0.3);
  border-radius: 10px; color: var(--gold); font-size: 13px; font-weight: 800;
  text-align: center; cursor: pointer; margin-top: 8px; font-family: Nunito, sans-serif;
}

/* ══ BLUR KART (Alıcı/Müşteri profili) ══ */
.blur-kart {
  background: var(--card); border: 1.5px solid var(--border);
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  width: 100%; position: absolute;
}
.blur-kart-ust {
  padding: 20px 16px 16px; display: flex; align-items: center; gap: 14px;
}
.blur-avatar {
  width: 60px; height: 60px; border-radius: 50%;
  background: var(--card2); border: 2px solid var(--border);
  display: flex; align-items: center; justify-content: center;
  font-size: 30px; flex-shrink: 0;
  filter: blur(6px); user-select: none;
}
.blur-kart.acik .blur-avatar { filter: none; }
.blur-isim {
  font-size: 16px; font-weight: 900; color: var(--text);
  letter-spacing: 3px; opacity: 0.4;
}
.blur-kart.acik .blur-isim { letter-spacing: 0; opacity: 1; }
.blur-konum { font-size: 13px; color: var(--text2); font-weight: 700; margin-top: 3px; }
.blur-tip-badge {
  margin-left: auto; padding: 4px 12px; border-radius: 50px;
  font-size: 11px; font-weight: 800; flex-shrink: 0;
}
.blur-tip-badge.kiralik { background: rgba(46,204,113,0.15); color: var(--green); }
.blur-tip-badge.satilik { background: rgba(232,96,58,0.12); color: var(--rust); }
.blur-detay {
  display: flex; gap: 8px; padding: 0 16px 14px; flex-wrap: wrap;
}
.blur-detay-item {
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 50px; padding: 5px 12px;
  font-size: 12px; font-weight: 700; color: var(--text2);
}
.blur-kilit-kat {
  background: var(--card2); border-top: 1px solid var(--border);
  padding: 16px; text-align: center;
}
.blur-kilit-kat.acik { background: rgba(46,204,113,0.05); border-color: rgba(46,204,113,0.2); }
.blur-kilit-icon { font-size: 28px; margin-bottom: 6px; }
.blur-kilit-aciklama { font-size: 13px; color: var(--text2); font-weight: 700; margin-bottom: 12px; line-height: 1.5; }
.blur-ac-btn {
  width: 100%; padding: 13px; border-radius: 50px;
  background: var(--gold); color: #1a1a1a;
  border: none; font-family: Nunito, sans-serif;
  font-size: 14px; font-weight: 900; cursor: pointer;
  transition: opacity .2s;
}
.blur-ac-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.blur-ac-btn.acik-btn { background: var(--green); color: white; }
.blur-iletisim { padding: 16px; display: none; }
.blur-kart.acik .blur-iletisim { display: block; }
.blur-iletisim-satir {
  display: flex; align-items: center; gap: 10px;
  padding: 10px 0; border-top: 1px solid var(--border);
}
.blur-iletisim-satir:first-child { border-top: none; }

/* ══ AKSİYON ══ */
.action-btns { display: flex; align-items: center; justify-content: center; gap: 14px; margin-bottom: 24px; }
.action-btn { border: none; cursor: pointer; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 26px; transition: transform .15s; }
.action-btn:active { transform: scale(0.88); }
.btn-nope  { width: 60px; height: 60px; background: rgba(232,96,58,0.15); }
.btn-like  { width: 70px; height: 70px; background: rgba(46,204,113,0.15); }
.btn-super { width: 52px; height: 52px; background: rgba(74,144,217,0.15); }
.btn-rewind{ width: 44px; height: 44px; background: rgba(255,255,255,0.05); font-size: 20px; }

/* ══ EŞLEŞMELERİM ══ */
.eslesen-item { display: flex; gap: 12px; align-items: center; background: var(--card); border-radius: var(--radius); border: 1px solid var(--border); padding: 12px; margin-bottom: 10px; color: var(--text); transition: border-color .2s; text-decoration: none; }
.eslesen-item:active { border-color: var(--gold); }
.eslesen-thumb { width: 62px; height: 62px; border-radius: 12px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
.eslesen-thumb img { width:100%; height:100%; object-fit:cover; }
.pct-pill { display: inline-block; padding: 2px 10px; border-radius: 50px; font-size: 11px; font-weight: 800; margin-bottom: 4px; }
.pct-high { background: rgba(46,204,113,0.15); color: var(--green); }
.pct-mid  { background: rgba(245,200,66,0.15); color: var(--gold); }
.pct-low  { background: rgba(232,96,58,0.12); color: var(--rust); }
.eslesen-why { font-size: 11px; color: var(--green); margin-top: 3px; line-height: 1.4; }
.sil-btn { background: rgba(232,96,58,0.15); border: none; border-radius: 8px; color: var(--rust); font-size: 18px; width: 36px; height: 36px; display: flex; align-items: center; justify-content: center; cursor: pointer; flex-shrink: 0; }

/* ══ HİZMET KARTI ══ */
.hizmet-swipe-card {
  position: absolute; width: 100%;
  border-radius: 24px; overflow: hidden;
  box-shadow: 0 20px 60px rgba(0,0,0,0.5);
  background: var(--card); cursor: grab; user-select: none; touch-action: none;
}
.hizmet-kart-ust {
  padding: 20px 16px 16px; display: flex; align-items: center; gap: 14px;
  background: linear-gradient(135deg,#1a2340,#2a3560);
}
.hizmet-kart-ikon { font-size: 44px; }
.hizmet-kart-bilgi { flex: 1; }
.hizmet-kart-adi { font-size: 17px; font-weight: 900; color: white; }
.hizmet-kart-kategori { font-size: 12px; color: rgba(255,255,255,0.6); font-weight: 700; margin-top: 3px; }
.hizmet-kart-puan { display: flex; align-items: center; gap: 4px; font-size: 13px; color: var(--gold); font-weight: 800; }
.hizmet-kart-body { padding: 14px 16px; background: var(--card2); }
.hizmet-fiyat-bant { font-size: 15px; font-weight: 900; color: var(--gold); margin-bottom: 6px; }
.hizmet-aciklama { font-size: 12px; color: var(--text2); line-height: 1.6; margin-bottom: 10px; }
.hizmet-bolge-chip {
  display: inline-flex; align-items: center; gap: 4px;
  background: var(--bg); border: 1px solid var(--border);
  border-radius: 50px; padding: 4px 10px; font-size: 11px; font-weight: 700; color: var(--text2);
}

/* ══ BOŞ DURUM ══ */
.bos-yon { text-align: center; padding: 40px 20px; }
.bos-yon .bos-icon { font-size: 60px; margin-bottom: 12px; }
.bos-yon .bos-baslik { font-size: 18px; font-weight: 900; margin-bottom: 8px; }
.bos-yon .bos-aciklama { font-size: 13px; color: var(--text3); margin-bottom: 20px; }

/* ══ TOAST ══ */
#eslesme-toast {
  position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%);
  z-index: 999; display: flex; flex-direction: column; gap: 8px;
  pointer-events: none; width: calc(100% - 32px); max-width: 380px;
}
.toast-mesaj {
  background: var(--card2); border: 1px solid var(--border); border-radius: 12px;
  padding: 12px 16px; font-size: 13px; font-weight: 700; color: var(--text);
  box-shadow: 0 4px 20px rgba(0,0,0,0.3); pointer-events: auto;
  animation: toastGir .3s ease;
}
.toast-mesaj.basari { background: rgba(46,204,113,0.15); border-color: rgba(46,204,113,0.3); color: var(--green); }
.toast-mesaj.hata { background: rgba(232,96,58,0.12); border-color: rgba(232,96,58,0.3); color: var(--rust); }
@keyframes toastGir { from{opacity:0;transform:translateY(8px)} to{opacity:1;transform:translateY(0)} }

<script>
(function() {
  if (localStorage.getItem('gotapu_tema') === 'light') document.body.classList.add('light');
  function temaButonuOlustur() {
    if (document.getElementById('themeToggleBtn')) return;
    var btn = document.createElement('button');
    btn.id = 'themeToggleBtn'; btn.className = 'theme-toggle-btn nav-icon-btn';
    btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
    btn.addEventListener('click', function() {
      var a = document.body.classList.toggle('light');
      localStorage.setItem('gotapu_tema', a ? 'light' : 'dark');
      btn.textContent = a ? '🌙' : '☀️';
      btn.style.transform = 'scale(0.8) rotate(20deg)';
      setTimeout(function() { btn.style.transform = ''; }, 200);
    });
    var nav = document.querySelector('.nav-actions');
    if (nav) nav.insertBefore(btn, nav.firstChild);
  }
  if (document.readyState === 'loading') document.addEventListener('DOMContentLoaded', temaButonuOlustur);
  else temaButonuOlustur();
})();
</script>

// Hizmet state
let hizmetGorülenler = new Set();
let hizmetler = [], hizmetKartIndex = 0, hizmetGeriStack = [];

// ── Toast
function toast(mesaj, tip = 'bilgi') {
  const kutu = document.getElementById('eslesme-toast');
  const el = document.createElement('div');
  el.className = 'toast-mesaj ' + tip;
  el.innerHTML = mesaj;
  kutu.appendChild(el);
  setTimeout(() => el.remove(), 3500);
}

// ── Sekme değiştir
function sekmeDegis(sekme) {
  aktifSekme = sekme;
  ['emlak','hizmet','eslesmen'].forEach(s => {
    document.getElementById('sekme-'+s).classList.toggle('aktif', s===sekme);
    document.getElementById('pane-'+s).style.display = s===sekme ? 'block' : 'none';
  });
}

// ══════════════════════════════════════════════
// BAŞLANGIÇ
// ══════════════════════════════════════════════
sb.auth.getSession().then(async ({ data }) => {
  if (!data.session) { window.location.href = 'auth.html'; return; }
  currentUser = data.session.user;

  // Profil çek
  const { data: p } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  profil = p || {};

  // Kredi bakiyesi (herkese — satıcı veya hizmet sağlayıcı olabilir)
  const { data: kr } = await sb.from('agent_credits').select('*').eq('agent_id', currentUser.id).single();
  kredi = kr;

  // Kredi widget nav bar
  if (kredi) {
    const w = document.getElementById('krediNavWidget');
    w.style.display = 'flex';
    document.getElementById('krediNavSayi').textContent = kredi.bakiye;
  }

  // Görülenler
  const { data: gd } = await sb.from('gorülen_ilanlar').select('ilan_id').eq('user_id', currentUser.id);
  if (gd) gd.forEach(g => gorülenler.add(g.ilan_id));

  // Kendi ilanları (satıcı/kiraya veren)
  const { data: ki } = await sb.from('ilanlar').select('id,baslik,tip,konum').eq('user_id', currentUser.id).eq('onay_durumu','onaylandi').order('created_at',{ascending:false});
  kullaniciIlanlari = ki || [];

  // Alıcı tercihleri
  const { data: pref } = await sb.from('arayan_ilanlar').select('*').eq('user_id', currentUser.id).single();
  tercihler = pref || {};

  // Rol belirle
  const varAlici = !!(tercihler.konum || tercihler.fiyat_min || tercihler.fiyat_max || tercihler.tip);
  const varSatici = kullaniciIlanlari.length > 0;
  if (varAlici && varSatici) rolTip = 'her_ikisi';
  else if (varSatici) rolTip = 'satici';
  else rolTip = 'alici';

  // İlan seçici
  ilanSeciciOlustur();

  // Rol banner
  rolBannerGoster();

  // Emlak swipe başlat
  emlakSwipeBaslat();

  // Eşleşmeler yükle
  favorileriYukle();

  // Hizmet sekmesi
  hizmetSekmesiniHazirla();
});

// ══════════════════════════════════════════════
// ROL BANNER
// ══════════════════════════════════════════════
function rolBannerGoster() {
  const banner = document.getElementById('rolBanner');
  const text   = document.getElementById('rolBannerText');
  const ikon   = document.getElementById('rolBannerIkon');
  const hapEl  = document.getElementById('rolKrediHap');
  const sayi   = document.getElementById('rolKrediSayi');
  banner.style.display = 'flex';

  if (rolTip === 'alici') {
    ikon.textContent = '🔍';
    text.innerHTML = '<b>Alıcı / Kiracı olarak</b> swipe yapıyorsunuz. Ücretsiz!';
    hapEl.style.display = 'none';
  } else if (rolTip === 'satici') {
    ikon.textContent = '🏢';
    text.innerHTML = '<b>Satıcı olarak</b> alıcı profillerini görüyorsunuz.<br>Açmak için kredi gerekli.';
    hapEl.style.display = 'flex';
    sayi.textContent = kredi ? kredi.bakiye : '0';
  } else {
    ikon.textContent = '🔄';
    text.innerHTML = 'Hem alıcı hem satıcı rolünüz var.';
    if (kredi) { hapEl.style.display = 'flex'; sayi.textContent = kredi.bakiye; }
  }
}

// ══════════════════════════════════════════════
// İLAN SEÇİCİ
// ══════════════════════════════════════════════
function ilanSeciciOlustur() {
  const secici = document.getElementById('ilanSecici');
  if (!kullaniciIlanlari.length) { secici.style.display = 'none'; return; }
  secici.style.display = 'flex';
  secici.innerHTML = '';

  // Alıcı modu butonu
  if (tercihler.konum || tercihler.fiyat_min || tercihler.tip) {
    const btn = document.createElement('button');
    btn.className = 'ilan-sec-btn' + (aktifIlanId === null ? ' aktif' : '');
    btn.textContent = '🔍 Alıcı Modunda';
    btn.onclick = () => { aktifIlanId = null; ilanSecBtnsGuncelle(); emlakSwipeBaslat(); };
    secici.appendChild(btn);
  }

  // Her ilan için buton
  kullaniciIlanlari.forEach(ilan => {
    const btn = document.createElement('button');
    btn.className = 'ilan-sec-btn' + (aktifIlanId === ilan.id ? ' aktif' : '');
    const tipEm = { satilik:'💰', kiralik:'🔑' }[ilan.tip] || '🏠';
    btn.textContent = tipEm + ' ' + (ilan.baslik.length > 20 ? ilan.baslik.slice(0,20)+'…' : ilan.baslik);
    btn.onclick = () => { aktifIlanId = ilan.id; ilanSecBtnsGuncelle(); emlakSwipeBaslat(); };
    secici.appendChild(btn);
  });

  // Yeni ilan butonu
  const yeniBtn = document.createElement('button');
  yeniBtn.className = 'ilan-sec-btn yeni-ilan';
  yeniBtn.textContent = '+ İlan Ver';
  yeniBtn.onclick = () => { window.location.href = 'ilan-ver.html'; };
  secici.appendChild(yeniBtn);
}

function ilanSecBtnsGuncelle() {
  document.querySelectorAll('#ilanSecici .ilan-sec-btn:not(.yeni-ilan)').forEach((btn, i) => {
    const isAlici = i === 0 && (tercihler.konum || tercihler.fiyat_min || tercihler.tip);
    if (isAlici) btn.classList.toggle('aktif', aktifIlanId === null);
    else {
      const idx = (tercihler.konum || tercihler.fiyat_min || tercihler.tip) ? i - 1 : i;
      if (kullaniciIlanlari[idx]) btn.classList.toggle('aktif', aktifIlanId === kullaniciIlanlari[idx].id);
    }
  });
}

// ══════════════════════════════════════════════
// EMLAK SWIPE BAŞLAT
// Mod A: Alıcı → ilanları swipe
// Mod B: Satıcı → alıcı profillerini swipe (blur + kredi)
// ══════════════════════════════════════════════
async function emlakSwipeBaslat() {
  document.getElementById('bosEkran').style.display = 'none';
  document.getElementById('actionBtns').style.display = 'flex';
  ilanlar = []; kartIndex = 0; geriStack = [];
  document.querySelectorAll('#swipeArea .swipe-card, #swipeArea .blur-kart').forEach(c => c.remove());

  if (aktifIlanId) {
    // Satıcı modu: alıcı profillerini göster
    await aliciProfilleriniYukle();
  } else {
    // Alıcı modu: ilanları swipe
    await ilanlarYukle();
  }
}

// ══════════════════════════════════════════════
// ALICI MODU — İLANLARI SWIPE
// ══════════════════════════════════════════════
async function ilanlarYukle() {
  const { data } = await sb.from('ilanlar').select('*')
    .eq('onay_durumu', 'onaylandi')
    .neq('user_id', currentUser.id)
    .order('created_at', { ascending: false })
    .limit(200);
  const filtreliIlanlar = (data || [])
    .filter(i => !gorülenler.has(i.id))
    .filter(i => ilanElemeKontrol(i, tercihler));
  ilanlar = filtreliIlanlar.map(i => ({ ...i, _esleme: eslesPuani(i, tercihler) }));
  ilanlar.sort((a, b) => b._esleme.puan - a._esleme.puan);
  document.getElementById('kalanYazi').textContent = `${ilanlar.length} ilan`;
  if (!ilanlar.length) {
    if (!tercihler.konum && !tercihler.fiyat_min && !tercihler.tip) {
      document.getElementById('swipeArea').innerHTML = `
        <div class="bos-yon">
          <div class="bos-icon">🔍</div>
          <div class="bos-baslik">Tercih Yok</div>
          <div class="bos-aciklama">Sana uygun ilanları görmek için tercih oluştur</div>
          <a href="ilan-ver.html" class="btn btn-gold btn-lg" style="max-width:240px;display:inline-block">➡️ Tercih Oluştur</a>
        </div>`;
      document.getElementById('actionBtns').style.display = 'none';
    } else {
      document.getElementById('bosEkran').style.display = 'block';
      document.getElementById('actionBtns').style.display = 'none';
    }
    return;
  }
  ilanKartlariniOlustur();
}

function ilanKartlariniOlustur() {
  const area = document.getElementById('swipeArea');
  area.querySelectorAll('.swipe-card').forEach(c => c.remove());
  const gorunecekler = ilanlar.slice(kartIndex, kartIndex + 3);
  if (!gorunecekler.length) {
    document.getElementById('bosEkran').style.display = 'block';
    document.getElementById('actionBtns').style.display = 'none';
    document.getElementById('kalanYazi').textContent = 'Tamamlandı';
    return;
  }
  document.getElementById('kalanYazi').textContent = `${ilanlar.length - kartIndex} kalan`;
  gorunecekler.forEach((ilan, i) => {
    const div = document.createElement('div');
    div.className = 'swipe-card';
    div.dataset.id = ilan.id;
    div.dataset.index = kartIndex + i;
    div.dataset.mod = 'alici';
    if      (i===0) { div.style.zIndex='10'; div.style.transform='scale(1) translateY(0)'; }
    else if (i===1) { div.style.zIndex='9';  div.style.transform='scale(0.95) translateY(14px)'; }
    else            { div.style.zIndex='8';  div.style.transform='scale(0.90) translateY(28px)'; }
    const { puan, sebepler } = ilan._esleme;
    const pctStyle = puan >= 80 ? 'color:var(--green)' : puan >= 55 ? 'color:var(--gold)' : 'color:var(--rust)';
    const tip = { satilik:'SATILIK', kiralik:'KİRALIK' }[ilan.tip] || '';
    div.innerHTML = `
      <div class="card-img" style="background:linear-gradient(135deg,#1a2340,#2a3560)">
        ${ilan.foto_url ? `<img src="${ilan.foto_url}">` : `<span>${EMOJI[ilan.tip]||'🏠'}</span>`}
        <div class="match-pct" style="${pctStyle}">%${puan} Eşleşme</div>
        <div class="like-stamp" id="like_${ilan.id}">BEĞEN</div>
        <div class="nope-stamp" id="nope_${ilan.id}">HAYIR</div>
      </div>
      <div class="card-body">
        <div style="display:flex;justify-content:space-between;align-items:center">
          <div class="card-price">${Number(ilan.fiyat).toLocaleString('tr-TR')} ₺${ilan.tip==='kiralik'?'/ay':''}</div>
          <span class="tag ${ilan.tip==='kiralik'?'tag-green':'tag-rust'}" style="font-size:10px">${tip}</span>
        </div>
        <div class="card-title">${ilan.baslik}</div>
        <div class="card-loc">📍 ${ilan.konum||''}</div>
        <div class="card-specs">
          ${ilan.oda_sayisi?`<span class="card-spec">🛏 ${ilan.oda_sayisi}</span>`:''}
          ${ilan.metrekare?`<span class="card-spec">📐 ${ilan.metrekare}m²</span>`:''}
        </div>
        ${sebepler.length?`<div class="match-reasons">${sebepler.slice(0,3).map(r=>`<span class="reason-chip">✓ ${r}</span>`).join('')}</div>`:''}
        <button class="card-detay-btn" onclick="ilanDetayAc('${ilan.id}',${kartIndex+i})">İlanı Görüntüle →</button>
      </div>`;
    area.appendChild(div);
  });
  dinleyiciEkle('swipeArea', 'alici');
}

// ══════════════════════════════════════════════
// SATICI MODU — ALICI PROFİLLERİ (BLUR + KREDİ)
// ══════════════════════════════════════════════
async function aliciProfilleriniYukle() {
  // Seçili ilana ait alıcı profillerini çek
  const seciliIlan = kullaniciIlanlari.find(i => i.id === aktifIlanId);
  if (!seciliIlan) return;

  // Alıcıları çek: aynı tip tercihi olan, konumu uyuşan
  const { data } = await sb.from('arayan_ilanlar')
    .select('*, profiles!user_id(id, full_name, phone, sehir, avatar_url)')
    .neq('user_id', currentUser.id)
    .limit(100);

  // Daha önce açılanları kontrol et
  const { data: aciklar } = await sb.from('profil_acmalar')
    .select('buyer_id').eq('agent_id', currentUser.id);
  const acikSet = new Set((aciklar || []).map(x => x.buyer_id));

  ilanlar = (data || []).filter(a => {
    if (!a.profiles) return false;
    const tip = (a.tip || '').toLowerCase();
    const silanTip = (seciliIlan.tip || '').toLowerCase();
    if (tip && silanTip && tip !== silanTip) return false;
    return true;
  }).map(a => ({
    ...a,
    _alici: true,
    _acik: acikSet.has(a.profiles?.id),
    _buyer_id: a.profiles?.id
  }));

  document.getElementById('kalanYazi').textContent = `${ilanlar.length} profil`;

  if (!ilanlar.length) {
    document.getElementById('bosEkran').style.display = 'block';
    document.getElementById('bosEkran').innerHTML = `
      <div class="empty-icon">👥</div>
      <div class="empty-title">Henüz alıcı profili yok</div>
      <div class="empty-desc">Bu ilan için henüz eşleşecek alıcı profili bulunmuyor</div>`;
    document.getElementById('actionBtns').style.display = 'none';
    return;
  }
  blurKartlariniOlustur();
}

function blurKartlariniOlustur() {
  const area = document.getElementById('swipeArea');
  area.querySelectorAll('.blur-kart').forEach(c => c.remove());
  const gorunecekler = ilanlar.slice(kartIndex, kartIndex + 3);
  if (!gorunecekler.length) {
    document.getElementById('bosEkran').style.display = 'block';
    document.getElementById('actionBtns').style.display = 'none';
    return;
  }
  document.getElementById('kalanYazi').textContent = `${ilanlar.length - kartIndex} profil`;

  gorunecekler.forEach((a, i) => {
    const div = document.createElement('div');
    div.className = 'blur-kart' + (a._acik ? ' acik' : '');
    div.dataset.id = a.profiles?.id;
    div.dataset.index = kartIndex + i;
    div.dataset.mod = 'satici';
    div.dataset.ilanTipi = a.tip || 'kiralik';
    if      (i===0) { div.style.zIndex='10'; }
    else if (i===1) { div.style.zIndex='9';  div.style.transform='scale(0.95) translateY(14px)'; }
    else            { div.style.zIndex='8';  div.style.transform='scale(0.90) translateY(28px)'; }

    const profil = a.profiles || {};
    const krediGereken = (a.tip === 'satilik') ? 2 : 1;
    const tipLabel = (a.tip === 'satilik') ? 'Satılık Arıyor' : 'Kiralık Arıyor';

    div.innerHTML = `
      <div class="blur-kart-ust">
        <div class="blur-avatar">👤</div>
        <div style="flex:1">
          <div class="blur-isim">${a._acik ? (profil.full_name||'Kullanıcı') : '●●● ●●●●●'}</div>
          <div class="blur-konum">📍 ${profil.sehir || a.konum || '—'}</div>
        </div>
        <div class="blur-tip-badge ${a.tip||'kiralik'}">${tipLabel}</div>
      </div>
      <div class="blur-detay">
        <div class="blur-detay-item">💰 ${a.fiyat_min?Number(a.fiyat_min).toLocaleString('tr-TR')+'₺':'—'} – ${a.fiyat_max?Number(a.fiyat_max).toLocaleString('tr-TR')+'₺':'—'}</div>
        ${a.emlak_tipi?`<div class="blur-detay-item">🏠 ${a.emlak_tipi}</div>`:''}
      </div>
      <div class="blur-kilit-kat${a._acik?' acik':''}" id="kilit_${profil.id}">
        ${a._acik ? `
          <div class="blur-kilit-icon">🔓</div>
          <div class="blur-kilit-aciklama">Profil açık — iletişim bilgileri görünüyor</div>
          <button class="blur-ac-btn acik-btn" onclick="mesajGonderAlici('${profil.id}','${a.id}')">💬 Mesaj Gönder</button>
        ` : `
          <div class="blur-kilit-icon">🔒</div>
          <div class="blur-kilit-aciklama">İletişim bilgileri gizli<br><b>${krediGereken} kredi</b> harcayarak açabilirsiniz</div>
          <button class="blur-ac-btn" id="acBtn_${profil.id}" onclick="profilAc(this,'${profil.id}','${a.tip||'kiralik'}','${a.id}')">
            💎 ${krediGereken} Kredi Harca → Aç
          </button>
        `}
      </div>
      ${a._acik && profil.phone ? `
        <div class="blur-iletisim">
          <div class="blur-iletisim-satir">
            <span style="font-size:20px">📞</span>
            <div>
              <div style="font-size:13px;font-weight:800">${profil.full_name||'Kullanıcı'}</div>
              <a href="tel:${profil.phone}" style="font-size:14px;color:var(--gold);font-weight:900;text-decoration:none">${profil.phone}</a>
            </div>
          </div>
        </div>
      ` : ''}
    `;
    area.appendChild(div);
  });
  dinleyiciEkle('swipeArea', 'satici');
}

// ══════════════════════════════════════════════
// KREDİ İLE PROFİL AÇ
// ══════════════════════════════════════════════
async function profilAc(btn, buyerId, ilanTipi, arayanIlanId) {
  const krediGereken = ilanTipi === 'satilik' ? 2 : 1;

  // Bakiye kontrolü
  const mevcutBakiye = kredi ? kredi.bakiye : 0;
  if (mevcutBakiye < krediGereken) {
    toast(`❌ Yetersiz kredi! Gereken: ${krediGereken}, Mevcut: ${mevcutBakiye}`, 'hata');
    setTimeout(() => { window.location.href = 'odeme.html'; }, 1800);
    return;
  }

  // Günlük limit
  const bugun = new Date().toISOString().split('T')[0];
  const { count } = await sb.from('profil_acmalar').select('id',{count:'exact',head:true})
    .eq('agent_id', currentUser.id).gte('tarih', bugun+'T00:00:00');
  if ((count||0) >= 3) {
    toast('⏰ Günlük 3 profil açma limitine ulaştınız. Yarın tekrar deneyin.', 'hata');
    return;
  }

  if (!confirm(`Bu profili açmak ${krediGereken} kredi harcayacak.\nMevcut: ${mevcutBakiye} kredi\n\nDevam etmek istiyor musunuz?`)) return;

  btn.disabled = true;
  btn.textContent = '⏳ Açılıyor...';

  const { data: sonuc, error } = await sb.rpc('kredi_harca', {
    p_agent_id: currentUser.id,
    p_buyer_id: buyerId,
    p_ilan_tipi: ilanTipi,
    p_ilan_id: aktifIlanId
  });

  if (error || !sonuc?.basarili) {
    btn.disabled = false;
    btn.textContent = `💎 ${krediGereken} Kredi Harca → Aç`;
    toast('❌ ' + (sonuc?.mesaj || error?.message || 'Bir hata oluştu'), 'hata');
    return;
  }

  // Bakiyeyi güncelle
  kredi = { ...(kredi||{}), bakiye: sonuc.kalan_bakiye };
  document.getElementById('krediNavSayi').textContent = sonuc.kalan_bakiye;
  document.getElementById('rolKrediSayi').textContent = sonuc.kalan_bakiye;

  toast(`✅ Profil açıldı! Kalan kredi: ${sonuc.kalan_bakiye}`, 'basari');

  // Kartı güncelle — açık hale getir
  const kart = btn.closest('.blur-kart');
  if (kart) {
    kart.classList.add('acik');
    // Profil bilgisini çek
    const { data: aliciProfil } = await sb.from('profiles').select('*').eq('id', buyerId).single();
    if (aliciProfil) {
      const kilitKat = document.getElementById('kilit_' + buyerId);
      if (kilitKat) {
        kilitKat.classList.add('acik');
        kilitKat.innerHTML = `
          <div class="blur-kilit-icon">🔓</div>
          <div class="blur-kilit-aciklama">Profil açıldı!</div>
          <button class="blur-ac-btn acik-btn" onclick="mesajGonderAlici('${buyerId}','${arayanIlanId}')">💬 Mesaj Gönder</button>`;
        // Telefon
        const blur_ust = kart.querySelector('.blur-isim');
        if (blur_ust) blur_ust.textContent = aliciProfil.full_name || 'Kullanıcı';
        kart.querySelector('.blur-avatar').style.filter = 'none';
        if (aliciProfil.phone) {
          const iletisimDiv = kart.querySelector('.blur-iletisim');
          if (iletisimDiv) {
            iletisimDiv.style.display = 'block';
            iletisimDiv.innerHTML = `
              <div class="blur-iletisim-satir">
                <span style="font-size:20px">📞</span>
                <div>
                  <div style="font-size:13px;font-weight:800">${aliciProfil.full_name}</div>
                  <a href="tel:${aliciProfil.phone}" style="font-size:14px;color:var(--gold);font-weight:900;text-decoration:none">${aliciProfil.phone}</a>
                </div>
              </div>`;
          }
        }
      }
    }
  }
}

function mesajGonderAlici(buyerId, arayanIlanId) {
  window.location.href = `mesajlar.html?karsi_id=${buyerId}`;
}

// ══════════════════════════════════════════════
// SWIPE MANTIĞI
// ══════════════════════════════════════════════
function getTopCard(areaId) {
  let top = null, maxZ = -1;
  document.querySelectorAll('#'+areaId+' .swipe-card, #'+areaId+' .blur-kart, #'+areaId+' .hizmet-swipe-card').forEach(c => {
    const z = parseInt(c.style.zIndex||0);
    if (z > maxZ) { maxZ = z; top = c; }
  });
  return top;
}

function dinleyiciEkle(areaId, mod) {
  const card = getTopCard(areaId);
  if (!card) return;
  let startX, isDragging = false;
  card.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
    isDragging = true; startX = e.clientX;
    card.setPointerCapture(e.pointerId); card.style.transition = 'none';
  });
  card.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    card.style.transform = `translateX(${dx}px) rotate(${dx*0.06}deg)`;
    const id = card.dataset.id;
    if (mod === 'alici') {
      const le = document.getElementById('like_'+id);
      const ne = document.getElementById('nope_'+id);
      if (le) le.style.opacity = dx > 40 ? Math.min((dx-40)/60,1) : 0;
      if (ne) ne.style.opacity = dx < -40 ? Math.min((-dx-40)/60,1) : 0;
    }
  });
  card.addEventListener('pointerup', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.clientX - startX;
    if      (dx >  80) swipe('right');
    else if (dx < -80) swipe('left');
    else {
      card.style.transition = 'transform .3s';
      card.style.transform = 'scale(1) translateY(0)';
      const id = card.dataset.id;
      const le = document.getElementById('like_'+id);
      const ne = document.getElementById('nope_'+id);
      if (le) le.style.opacity = 0;
      if (ne) ne.style.opacity = 0;
    }
  });
}

async function swipe(dir) {
  const card = getTopCard('swipeArea');
  if (!card) return;
  geriStack.push(kartIndex);
  card.style.transition = 'transform .45s ease, opacity .35s';
  const id = card.dataset.id;
  const mod = card.dataset.mod || 'alici';

  if (mod === 'alici') {
    gorülenler.add(id);
    await sb.from('gorülen_ilanlar').upsert({
      user_id: currentUser.id, ilan_id: id,
      aksiyon: dir === 'right' ? 'like' : dir === 'up' ? 'super' : 'nope'
    }, { onConflict: 'user_id,ilan_id' });
    if (dir === 'right' || dir === 'up') {
      const el = document.getElementById('like_'+id);
      if (el) el.style.opacity = '1';
      card.style.transform = dir === 'right' ? 'translateX(160%) rotate(20deg)' : 'translateY(-150%)';
      await saveFavorite(id);
      const ilanBilgi = ilanlar.find(x => x.id === id);
      setTimeout(() => {
        card.remove(); kartIndex++; ilanKartlariniOlustur();
        if (ilanBilgi?.user_id) window.location.href = `mesajlar.html?ilan_id=${ilanBilgi.id}&karsi_id=${ilanBilgi.user_id}`;
        else window.location.href = 'mesajlar.html';
      }, 400);
    } else {
      card.style.transform = 'translateX(-160%) rotate(-20deg)';
      const el = document.getElementById('nope_'+id);
      if (el) el.style.opacity = '1';
      setTimeout(() => { card.remove(); kartIndex++; ilanKartlariniOlustur(); }, 400);
    }
  } else {
    // Satıcı modu — blur kartı sadece geç (açma olmadan)
    if (dir === 'right' || dir === 'up') {
      card.style.transform = 'translateX(160%) rotate(20deg)';
    } else {
      card.style.transform = 'translateX(-160%) rotate(-20deg)';
    }
    setTimeout(() => { card.remove(); kartIndex++; blurKartlariniOlustur(); }, 400);
  }
}

function geriAl() {
  if (!geriStack.length) return;
  const eskiIndex = geriStack.pop();
  if (aktifIlanId === null) {
    const ilanId2 = ilanlar[eskiIndex]?.id;
    if (ilanId2) { gorülenler.delete(ilanId2); sb.from('gorülen_ilanlar').delete().eq('user_id', currentUser.id).eq('ilan_id', ilanId2); }
    kartIndex = eskiIndex;
    ilanKartlariniOlustur();
  } else {
    kartIndex = eskiIndex;
    blurKartlariniOlustur();
  }
}

async function hizmetMusteriAc(btn, buyerId) {

    p_agent_id: currentUser.id, p_buyer_id: buyerId, p_ilan_tipi: 'kiralik'
  });

    toast('❌ ' + (sonuc?.mesaj || 'Hata'), 'hata');

  }
  kredi = { ...(kredi||{}), bakiye: sonuc.kalan_bakiye };
  document.getElementById('krediNavSayi').textContent = sonuc.kalan_bakiye;
  toast('✅ Profil açıldı! Kalan: ' + sonuc.kalan_bakiye + ' kredi', 'basari');

  if (p2) {

  }
}

function dinleyiciEkleHizmet() {
  const card = getTopCard('hizmetSwipeArea');
  if (!card) return;
  let startX, isDragging = false;
  card.addEventListener('pointerdown', e => {
    if (e.target.tagName === 'BUTTON' || e.target.tagName === 'A') return;
    isDragging = true; startX = e.clientX;
    card.setPointerCapture(e.pointerId); card.style.transition = 'none';
  });
  card.addEventListener('pointermove', e => {
    if (!isDragging) return;
    const dx = e.clientX - startX;
    card.style.transform = `translateX(${dx}px) rotate(${dx*0.06}deg)`;
  });
  card.addEventListener('pointerup', e => {
    if (!isDragging) return;
    isDragging = false;
    const dx = e.clientX - startX;
    if (dx > 80) hizmetSwipe('right');
    else if (dx < -80) hizmetSwipe('left');
    else { card.style.transition = 'transform .3s'; card.style.transform = 'scale(1) translateY(0)'; }
  });
}

async function hizmetSwipe(dir) {
  const card = getTopCard('hizmetSwipeArea');

  hizmetGeriStack.push(hizmetKartIndex);
  card.style.transition = 'transform .45s ease, opacity .35s';
  card.style.transform = dir === 'right' || dir === 'up' ? 'translateX(160%) rotate(20deg)' : 'translateX(-160%) rotate(-20deg)';

function hizmetGeriAl() {
  if (!hizmetGeriStack.length) return;
  hizmetKartIndex = hizmetGeriStack.pop();
  hizmetKartlariniOlustur();
}

// EŞLEŞME PUANLAMA (değişmedi)
// ══════════════════════════════════════════════
function ilanElemeKontrol(ilan, pref) {
  const prefTip  = (pref.tip||'').toLowerCase();
  const ilanTip  = (ilan.tip||'').toLowerCase();
  if (prefTip && ilanTip && prefTip !== ilanTip) return false;
  const prefIl   = (pref.kriterler?.sehir||pref.sehir||'').toLowerCase().trim();
  const prefIlce = (pref.kriterler?.ilce||'').toLowerCase().trim();
  const konum    = (ilan.konum||'').toLowerCase();
  if (prefIl) { if (!konum.includes(prefIl) && !(prefIlce&&konum.includes(prefIlce))) return false; }
  const f=Number(ilan.fiyat),mn=pref.fiyat_min?Number(pref.fiyat_min):null,mx=pref.fiyat_max?Number(pref.fiyat_max):null;
  if (mn&&mx&&f>0&&(f<mn*0.8||f>mx*1.2)) return false;
  else if (mn&&f>0&&f<mn*0.8) return false;
  else if (mx&&f>0&&f>mx*1.2) return false;
  return true;
}

function eslesPuani(ilan, pref) {
  const k=ilan.kriterler||{};
  const tip=(k.emlak_tipi||'').toLowerCase();
  if (tip.includes('arsa')||tip.includes('tarla')) return eslesPuaniArsa(ilan,pref);
  if (tip.includes('işyeri')||tip.includes('ofis')||tip.includes('depo')) return eslesPuaniIsyeri(ilan,pref);
  return eslesPuaniKonut(ilan,pref);
}
