  /* ═══════════════════════════════════════════════════
     ANA KATEGORİ ACCORDION
  ═══════════════════════════════════════════════════ */
  .kategori-liste {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .kategori-satir { border-bottom: 1px solid var(--border); }
  .kategori-satir:last-child { border-bottom: none; }

  .kategori-baslik {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    background: var(--card);
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .kategori-baslik:hover { background: rgba(245,200,66,0.06); }
  .kategori-baslik.acik {
    background: rgba(245,200,66,0.08);
    border-bottom: 1px solid rgba(245,200,66,0.25);
  }
  .kategori-baslik-ikon {
    width: 40px; height: 40px;
    border-radius: 50%;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.2);
    display: flex; align-items: center; justify-content: center;
    font-size: 20px; flex-shrink: 0;
  }
  .kategori-baslik.acik .kategori-baslik-ikon {
    background: rgba(245,200,66,0.2);
    border-color: var(--gold);
  }
  .kategori-baslik-metin { flex: 1; }
  .kategori-baslik-ad { font-size: 14px; font-weight: 800; color: var(--text); }
  .kategori-baslik.acik .kategori-baslik-ad { color: var(--gold); }
  .kategori-baslik-altad { font-size: 11px; color: var(--text3); margin-top: 1px; }
  .kategori-ok { font-size: 18px; color: var(--text3); transition: transform .25s; flex-shrink: 0; }
  .kategori-baslik.acik .kategori-ok { transform: rotate(180deg); color: var(--gold); }

  /* Body */
  .kategori-body { display: none; background: var(--bg); border-bottom: 2px solid var(--gold); }
  .kategori-body.acik { display: block; }

  /* ═══════════════════════════════════════════════════
     ALT KATEGORİ TAB BAR
  ═══════════════════════════════════════════════════ */
  .alt-kat-bar {
    display: flex;
    gap: 6px;
    padding: 12px 14px 8px;
    overflow-x: auto;
    scrollbar-width: none;
    border-bottom: 1px solid var(--border);
  }

  .alt-kat-btn {
    padding: 7px 12px;
    border-radius: 50px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 11px;
    font-weight: 800;
    cursor: pointer;
    white-space: nowrap;
    transition: all .2s;
    flex-shrink: 0;
  }
  .alt-kat-btn.secili {
    background: rgba(245,200,66,0.12);
    border-color: var(--gold);
    color: var(--gold);
  }

  /* ═══════════════════════════════════════════════════
     FORM ALANI
  ═══════════════════════════════════════════════════ */
  .form-alan { padding: 14px; }

  /* Soru bloğu — progressive reveal */
  .soru-blok {
    margin-bottom: 0;
    overflow: hidden;
    max-height: 0;
    opacity: 0;
    transition: max-height 0.35s ease, opacity 0.3s ease, margin-bottom 0.3s ease;
  }
  .soru-blok.gorunen {
    max-height: 300px;
    opacity: 1;
    margin-bottom: 16px;
  }

  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-btn {

    background: var(--card);

    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 14px;
    display: flex;
    align-items: center;

    height: 80px;

    border: 2px dashed var(--border);

    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--text3);
    font-weight: 700;

  .foto-thumb { position: relative; width: 68px; height: 68px; }
  .foto-thumb img { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; }
  .foto-remove {

    width: 100%;

    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);

    margin-bottom: 14px;
    overflow: hidden;
  }

    height: 100%;
    background: var(--gold);
    border-radius: 2px;
    transition: width 0.4s ease;
  }

<script>
(function() {
  var kaydedilenTema = localStorage.getItem('gotapu_tema');
  if (kaydedilenTema === 'light') document.body.classList.add('light');
  function temaButonuOlustur() {
    if (document.getElementById('themeToggleBtn')) return;
    var btn = document.createElement('button');
    btn.id = 'themeToggleBtn';
    btn.className = 'theme-toggle-btn nav-icon-btn';
    btn.style.cssText = 'flex-shrink:0;';
    btn.setAttribute('title', 'Temayı Değiştir');
    btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
    btn.addEventListener('click', function() {
      var acikMi = document.body.classList.toggle('light');
      localStorage.setItem('gotapu_tema', acikMi ? 'light' : 'dark');
      btn.textContent = acikMi ? '🌙' : '☀️';
      btn.style.transform = 'scale(0.8) rotate(20deg)';
      setTimeout(function() { btn.style.transform = ''; }, 200);
    });
    var navActions = document.querySelector('.nav-actions');
    if (navActions) navActions.insertBefore(btn, navActions.firstChild);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', temaButonuOlustur);
  } else {
    temaButonuOlustur();
  }
})();
</script>

/* ═══════════════════════════════════════════════════════════════
   STATE
═══════════════════════════════════════════════════════════════ */
// state[anaKatKey][altKatKey] = { secimler: {}, fotoFiles: [], aciklama: '' }
const state = {};
Object.keys(kategoriler).forEach(k => {
  state[k] = {};
  Object.keys(kategoriler[k].altKategoriler).forEach(ak => {
    state[k][ak] = { secimler: {}, fotoFiles: [] };
  });
});

let currentUser = null;
let currentProfil = null;
let acikKategori = null;
// Her ana kategoride hangi alt kategori seçili
const seciliAlt = {};

const params = new URLSearchParams(window.location.search);
const urlKategori = params.get('kategori');

sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'index.html'; return; }
  currentUser = data.session.user;
  profilYukle();
});

async function profilYukle() {
  try {
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfil = data;
  } catch(e) {}
  sayfaOlustur();
}

/* ═══════════════════════════════════════════════════════════════
   SAYFA OLUŞTUR
═══════════════════════════════════════════════════════════════ */
function sayfaOlustur() {
  const liste = document.getElementById('kategoriListe');
  liste.innerHTML = Object.entries(kategoriler).map(([key, kat]) => {
    const ilkAlt = Object.keys(kat.altKategoriler)[0];
    seciliAlt[key] = ilkAlt;
    return `
    <div class="kategori-satir" id="satir_${key}">
      <div class="kategori-baslik" id="baslik_${key}" onclick="kategoriToggle('${key}')">
        <div class="kategori-baslik-ikon">${kat.em}</div>
        <div class="kategori-baslik-metin">
          <div class="kategori-baslik-ad">${kat.ad}</div>
          <div class="kategori-baslik-altad">${kat.desc}</div>
        </div>
        <span class="kategori-ok">▼</span>
      </div>
      <div class="kategori-body" id="body_${key}">
        ${altKatBarHtml(key)}
        <div class="form-alan" id="formAlan_${key}">
          ${formHtmlOlustur(key, ilkAlt)}
        </div>
      </div>
    </div>`;
  }).join('');

  if (urlKategori && kategoriler[urlKategori]) {
    setTimeout(() => kategoriToggle(urlKategori), 100);
  }
}

function altKatBarHtml(key) {
  const kat = kategoriler[key];
  if (Object.keys(kat.altKategoriler).length <= 1) return '';
  return `<div class="alt-kat-bar" id="altKatBar_${key}">
    ${Object.entries(kat.altKategoriler).map(([ak, altKat]) =>
      `<button class="alt-kat-btn${ak === seciliAlt[key] ? ' secili' : ''}"
        onclick="altKatSec('${key}','${ak}')">${altKat.ad}</button>`
    ).join('')}
  </div>`;
}

/* ═══════════════════════════════════════════════════════════════
   FORM HTML — Progressive Reveal
═══════════════════════════════════════════════════════════════ */
function formHtmlOlustur(key, altKey) {
  const altKat = kategoriler[key].altKategoriler[altKey];
  const kullaniciAd = currentProfil?.full_name || currentUser?.email || '';
  const kullaniciTel = currentProfil?.phone || '';
  const st = state[key][altKey];
  const toplamSoru = altKat.sorular.length;

  const sorularHtml = altKat.sorular.map((soru, idx) => {
    const gorunenMi = idx === 0 || st.secimler[altKat.sorular[idx-1].id] !== undefined;
    const fn = soru.coklu
      ? `cokluSec('${key}','${altKey}','${soru.id}',this,${idx})`
      : `tekSec('${key}','${altKey}','${soru.id}',this,${idx})`;

    const seceneklerHtml = soru.secenekler.map(s => {
      const secildi = soru.coklu
        ? (st.secimler[soru.id] || '').split(', ').includes(s)
        : st.secimler[soru.id] === s;
      return `<button class="radio-btn${secildi ? ' selected' : ''}" onclick="${fn}">${s}</button>`;
    }).join('');

    return `
    <div class="soru-blok${gorunenMi ? ' gorunen' : ''}" id="soru_${key}_${altKey}_${idx}">
      <label class="form-label">${soru.label}</label>
      <div class="radio-group" id="grp_${key}_${altKey}_${soru.id}">${seceneklerHtml}</div>
    </div>`;
  }).join('');

  // İlerleme hesapla
  const dolu = Object.keys(st.secimler).length;
  const yuzde = toplamSoru > 0 ? Math.round((dolu / toplamSoru) * 100) : 0;

  return `
    <div class="kullanici-bilgi">
      <span style="font-size:22px">👤</span>
      <div>
        <div style="font-size:13px;font-weight:800">${kullaniciAd}</div>
        ${kullaniciTel ? `<div style="font-size:11px;color:var(--text3)">📞 ${kullaniciTel}</div>` : ''}
      </div>
    </div>

    <div class="ilerleme-bar">
      <div class="ilerleme-dolu" id="ilerleme_${key}_${altKey}" style="width:${yuzde}%"></div>
    </div>

    <div id="sorular_${key}_${altKey}">${sorularHtml}</div>

    <div class="soru-blok${dolu >= 1 ? ' gorunen' : ''}" id="foto_${key}_${altKey}" style="max-height:200px">
      <label class="form-label">📸 Fotoğraf Ekle (isteğe bağlı)</label>
      <div class="foto-ekle-btn" onclick="document.getElementById('fotoInput').setAttribute('data-key','${key}');document.getElementById('fotoInput').setAttribute('data-altkey','${altKey}');document.getElementById('fotoInput').click()">
        <span style="font-size:24px">📷</span> Fotoğraf Seç
      </div>
      <div class="foto-preview" id="fotoPreview_${key}_${altKey}"></div>
    </div>

    <div class="soru-blok${dolu >= 1 ? ' gorunen' : ''}" id="aciklama_${key}_${altKey}_blok" style="max-height:200px">
      <label class="form-label">📝 Ek Açıklama (isteğe bağlı)</label>
      <textarea class="input" id="aciklama_${key}_${altKey}" rows="3" placeholder="Eklemek istediğiniz detaylar..." style="resize:none"></textarea>
    </div>

    <div id="formError_${key}_${altKey}" style="background:rgba(232,96,58,0.1);color:var(--rust);border-radius:10px;padding:12px;font-size:13px;font-weight:700;display:none;margin-bottom:12px"></div>

    <button class="gonder-btn" id="gonderBtn_${key}_${altKey}" onclick="teklifGonder('${key}','${altKey}')">
      📩 Teklif İste — ${altKat.ad}
    </button>
  `;
}

/* ═══════════════════════════════════════════════════════════════
   TOGGLE & SEKME
═══════════════════════════════════════════════════════════════ */
function kategoriToggle(key) {
  const baslik = document.getElementById('baslik_' + key);
  const body   = document.getElementById('body_'   + key);

  if (acikKategori && acikKategori !== key) {
    document.getElementById('baslik_' + acikKategori).classList.remove('acik');
    document.getElementById('body_'   + acikKategori).classList.remove('acik');
  }

  const yeniDurum = body.classList.toggle('acik');
  baslik.classList.toggle('acik', yeniDurum);
  acikKategori = yeniDurum ? key : null;

  if (yeniDurum) {
    setTimeout(() => {
      document.getElementById('satir_' + key).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }
}

function altKatSec(key, altKey) {
  seciliAlt[key] = altKey;
  // Tab butonlarını güncelle
  const bar = document.getElementById('altKatBar_' + key);
  if (bar) {
    bar.querySelectorAll('.alt-kat-btn').forEach(btn => btn.classList.remove('secili'));
    const idx = Object.keys(kategoriler[key].altKategoriler).indexOf(altKey);
    if (bar.children[idx]) bar.children[idx].classList.add('secili');
  }
  // Formu yeniden çiz
  document.getElementById('formAlan_' + key).innerHTML = formHtmlOlustur(key, altKey);
}

/* ═══════════════════════════════════════════════════════════════
   SEÇİM & PROGRESSİVE REVEAL
═══════════════════════════════════════════════════════════════ */
function soruAc(key, altKey, soruIdx) {
  const altKat = kategoriler[key].altKategoriler[altKey];
  const sonrakiIdx = soruIdx + 1;
  if (sonrakiIdx < altKat.sorular.length) {
    const sonrakiEl = document.getElementById(`soru_${key}_${altKey}_${sonrakiIdx}`);
    if (sonrakiEl && !sonrakiEl.classList.contains('gorunen')) {
      setTimeout(() => {
        sonrakiEl.classList.add('gorunen');
        sonrakiEl.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
      }, 200);
    }
  }
  // Fotoğraf ve açıklama bloklarını da aç (1. sorudan sonra)
  if (soruIdx >= 0) {
    const fotoEl = document.getElementById(`foto_${key}_${altKey}`);
    const acikEl = document.getElementById(`aciklama_${key}_${altKey}_blok`);
    if (fotoEl) fotoEl.classList.add('gorunen');
    if (acikEl) acikEl.classList.add('gorunen');
  }

  // İlerleme güncelle
  const st = state[key][altKey];
  const toplamSoru = altKat.sorular.length;
  const dolu = Object.keys(st.secimler).length;
  const yuzde = Math.round((dolu / toplamSoru) * 100);
  const ilerlemeEl = document.getElementById(`ilerleme_${key}_${altKey}`);
  if (ilerlemeEl) ilerlemeEl.style.width = yuzde + '%';
}

function tekSec(key, altKey, alanId, el, soruIdx) {
  state[key][altKey].secimler[alanId] = el.textContent.trim();
  document.querySelectorAll(`#grp_${key}_${altKey}_${alanId} .radio-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
  soruAc(key, altKey, soruIdx);
}

function cokluSec(key, altKey, alanId, el, soruIdx) {
  el.classList.toggle('selected');
  const secili = [...document.querySelectorAll(`#grp_${key}_${altKey}_${alanId} .radio-btn.selected`)].map(b => b.textContent.trim());
  if (secili.length > 0) {
    state[key][altKey].secimler[alanId] = secili.join(', ');
  } else {
    delete state[key][altKey].secimler[alanId];
  }
  soruAc(key, altKey, soruIdx);
}

/* ═══════════════════════════════════════════════════════════════
   FOTOĞRAF
═══════════════════════════════════════════════════════════════ */
function fotoSec(input) {
  const key    = input.getAttribute('data-key');
  const altKey = input.getAttribute('data-altkey');
  if (!key || !altKey) return;
  Array.from(input.files).forEach(f => {
    if (state[key][altKey].fotoFiles.length < 5) state[key][altKey].fotoFiles.push(f);
  });
  input.value = '';
  fotoPreviewGuncelle(key, altKey);
}

function fotoPreviewGuncelle(key, altKey) {
  const el = document.getElementById(`fotoPreview_${key}_${altKey}`);
  if (!el) return;
  el.innerHTML = state[key][altKey].fotoFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="foto-thumb"><img src="${url}"><button class="foto-remove" onclick="fotoSil('${key}','${altKey}',${i})">✕</button></div>`;
  }).join('');
}

function fotoSil(key, altKey, i) {
  state[key][altKey].fotoFiles.splice(i, 1);
  fotoPreviewGuncelle(key, altKey);
}

/* ═══════════════════════════════════════════════════════════════
   GÖNDER
═══════════════════════════════════════════════════════════════ */
async function teklifGonder(key, altKey) {
  const altKat = kategoriler[key].altKategoriler[altKey];
  const st = state[key][altKey];
  const zorunlu = altKat.sorular.filter(a => !a.coklu);
  const eksik = zorunlu.find(a => !st.secimler[a.id]);
  const errEl = document.getElementById(`formError_${key}_${altKey}`);

  if (eksik) {
    errEl.textContent = `⚠️ Lütfen "${eksik.label}" seçin!`;
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById(`gonderBtn_${key}_${altKey}`);
  btn.textContent = '⏳ Gönderiliyor...';
  btn.disabled = true;

  const fotoFiles = st.fotoFiles;
  let foto_urls = [];
  for (let i = 0; i < fotoFiles.length; i++) {
    const file = fotoFiles[i];
    const fileName = `teklifler/${currentUser.id}/${Date.now()}_${i}`;
    btn.textContent = `⏳ Fotoğraf ${i+1}/${fotoFiles.length}...`;
    const { data: up } = await sb.storage.from('ilan-fotograflar').upload(fileName, file);
    if (up) {
      const { data: u } = sb.storage.from('ilan-fotograflar').getPublicUrl(fileName);
      foto_urls.push(u.publicUrl);
    }
  }

  const aciklamaEl = document.getElementById(`aciklama_${key}_${altKey}`);
  const aciklama = aciklamaEl ? aciklamaEl.value.trim() : '';

  const { error } = await sb.from('teklifler').insert({
    user_id:  currentUser.id,
    ad_soyad: currentProfil?.full_name || '',
    telefon:  currentProfil?.phone || '',
    kategori: key + '_' + altKey,
    detaylar: { ...st.secimler, aciklama, foto_urls },
    durum:    'bekliyor'
  });

  if (error) {
    errEl.textContent = 'Hata: ' + error.message;
    errEl.style.display = 'block';
    btn.textContent = `📩 Teklif İste — ${altKat.ad}`;
    btn.disabled = false;
    return;
  }

  document.getElementById('successOverlay').classList.add('show');
}
</script>

    navigator.serviceWorker.register("/sw.js").catch(e => console.log("SW error:", e));
  }
