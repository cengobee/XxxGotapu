<style>
  .kategori-grid {
    display: grid; grid-template-columns: repeat(4,1fr); gap: 10px;
    margin-bottom: 24px;
  }
  .kategori-item {
    background: var(--card); border: 2px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 8px;
    text-align: center; cursor: pointer; transition: all .2s;
  }
  .kategori-item.active { border-color: var(--gold); background: rgba(245,200,66,0.08); }
  .kategori-item:active { transform: scale(0.95); }
  .kategori-em { font-size: 28px; display: block; margin-bottom: 6px; }
  .kategori-lbl { font-size: 10px; font-weight: 700; color: var(--text2); }

  .hizmet-header {
    background: linear-gradient(135deg, #1a2340, #2a3560);
    border-radius: var(--radius); padding: 20px; margin-bottom: 20px;
    display: flex; align-items: center; gap: 16px;
  }
  .hizmet-icon { font-size: 52px; }
  .hizmet-title { font-size: 20px; font-weight: 900; }
  .hizmet-desc { font-size: 13px; color: var(--text3); margin-top: 4px; line-height: 1.5; }

  .teklif-form {
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius); padding: 20px;
  }
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 8px; display: block; }

  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-btn {
    padding: 8px 16px; border-radius: 50px;
    background: var(--card2); border: 1.5px solid var(--border);
    color: var(--text2); font-family: 'Nunito', sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer;
    transition: all .2s;
  }
  .radio-btn.selected { background: rgba(245,200,66,0.1); border-color: var(--gold); color: var(--gold); }

  .foto-ekle-btn {
    width: 100%; height: 90px;
    background: var(--card2); border: 2px dashed var(--border);
    border-radius: var(--radius-sm); display: flex;
    align-items: center; justify-content: center;
    gap: 10px; cursor: pointer; color: var(--text3);
    font-weight: 700; font-size: 14px;
  }
  .foto-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .foto-thumb { position: relative; width: 72px; height: 72px; }
  .foto-thumb img { width: 72px; height: 72px; border-radius: 10px; object-fit: cover; }
  .foto-remove {
    position: absolute; top: -6px; right: -6px;
    width: 18px; height: 18px; border-radius: 50%;
    background: var(--rust); color: white; border: none;
    font-size: 11px; cursor: pointer; display: flex;
    align-items: center; justify-content: center;
  }

  .kullanici-bilgi {
    background: var(--card2); border-radius: var(--radius-sm);
    padding: 12px 16px; margin-bottom: 16px;
    display: flex; align-items: center; gap: 10px;
  }

  .success-overlay {
    position: fixed; inset: 0; background: rgba(0,0,0,0.9);
    display: none; align-items: center; justify-content: center;
    flex-direction: column; z-index: 999; padding: 24px; text-align: center;
  }
  .success-overlay.show { display: flex; }
</style>
</head>

    <button class="btn btn-gold btn-lg" onclick="teklifGonder()" id="gonderBtn">📩 Teklif İste</button>

const params = new URLSearchParams(window.location.search);
let aktifKategori = params.get('kategori') || 'temizlik';
let currentUser = null;
let currentProfil = null;
let fotoFiles = [];
let secimler = {};

sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'auth.html'; return; }
  currentUser = data.session.user;
  profilYukle();
});

async function profilYukle() {
  const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  currentProfil = data;
  document.getElementById('kullaniciAd').textContent = data?.full_name || currentUser.email;
  document.getElementById('kullaniciTel').textContent = data?.phone ? '📞 ' + data.phone : 'Telefon bilgisi yok';
  sayfaOlustur();
}

function sayfaOlustur() {
  const grid = document.getElementById('kategoriGrid');
  grid.innerHTML = Object.entries(kategoriler).map(([key, val]) => `
    <div class="kategori-item ${key === aktifKategori ? 'active' : ''}" onclick="kategoriSec('${key}')">
      <span class="kategori-em">${val.em}</span>
      <div class="kategori-lbl">${val.ad}</div>
    </div>`).join('');
  kategoriGoster();
}

function kategoriSec(key) {
  aktifKategori = key;
  secimler = {};
  fotoFiles = [];
  document.getElementById('fotoPreview').innerHTML = '';
  document.getElementById('aciklama').value = '';
  document.querySelectorAll('.kategori-item').forEach((el, i) => {
    el.classList.toggle('active', Object.keys(kategoriler)[i] === key);
  });
  kategoriGoster();
}

function kategoriGoster() {
  const kat = kategoriler[aktifKategori];
  document.getElementById('hizmetHeader').innerHTML = `
    <div class="hizmet-icon">${kat.em}</div>
    <div>
      <div class="hizmet-title">${kat.ad}</div>
      <div class="hizmet-desc">${kat.desc}</div>
    </div>`;

  document.getElementById('formAlanlari').innerHTML = kat.alanlar.map(alan => `
    <div class="form-group">
      <label class="form-label">${alan.label}</label>
      <div class="radio-group">
        ${alan.secenekler.map(s => `
          <button class="radio-btn" onclick="secimYap('${alan.id}', '${s}', this)">${s}</button>
        `).join('')}
      </div>
    </div>`).join('');
}

function secimYap(alanId, deger, el) {
  secimler[alanId] = deger;
  const grup = el.closest('.radio-group');
  grup.querySelectorAll('.radio-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function fotoSec(input) {
  Array.from(input.files).forEach(f => {
    if (fotoFiles.length < 5) fotoFiles.push(f);
  });
  input.value = '';
  fotoPreviewGuncelle();
}

function fotoPreviewGuncelle() {
  const preview = document.getElementById('fotoPreview');
  preview.innerHTML = fotoFiles.map((f, i) => {
    const url = URL.createObjectURL(f);
    return `<div class="foto-thumb"><img src="${url}"><button class="foto-remove" onclick="fotoSil(${i})">✕</button></div>`;
  }).join('');
}

function fotoSil(i) {
  fotoFiles.splice(i, 1);
  fotoPreviewGuncelle();
}

async function teklifGonder() {
  const kat = kategoriler[aktifKategori];
  const eksikAlanlar = kat.alanlar.filter(a => !secimler[a.id]);
  if (eksikAlanlar.length > 0) {
    const errEl = document.getElementById('formError');
    errEl.textContent = `⚠️ Lütfen "${eksikAlanlar[0].label}" alanını seçin!`;
    errEl.style.display = 'block';
    return;
  }
  document.getElementById('formError').style.display = 'none';

  const btn = document.getElementById('gonderBtn');
  btn.textContent = '⏳ Gönderiliyor...';
  btn.disabled = true;

  let foto_urls = [];
  for (let i = 0; i < fotoFiles.length; i++) {
    const file = fotoFiles[i];
    const fileName = `teklifler/${currentUser.id}/${Date.now()}_${i}_${file.name}`;
    btn.textContent = `⏳ Fotoğraf yükleniyor ${i+1}/${fotoFiles.length}...`;
    const { data: uploadData } = await sb.storage.from('ilan-fotograflar').upload(fileName, file);
    if (uploadData) {
      const { data: urlData } = sb.storage.from('ilan-fotograflar').getPublicUrl(fileName);
      foto_urls.push(urlData.publicUrl);
    }
  }

  const { error } = await sb.from('teklifler').insert({
    user_id: currentUser.id,
    ad_soyad: currentProfil?.full_name || '',
    telefon: currentProfil?.phone || '',
    kategori: aktifKategori,
    detaylar: {
      ...secimler,
      aciklama: document.getElementById('aciklama').value.trim(),
      foto_urls
    },
    durum: 'bekliyor'
  });

  if (error) {
    document.getElementById('formError').textContent = 'Hata: ' + error.message;
    document.getElementById('formError').style.display = 'block';
    btn.textContent = '📩 Teklif İste';
    btn.disabled = false;
    return;
  }

  document.getElementById('successOverlay').classList.add('show');
}
</script>
