  /* ═══════════════════════════════════════════════════
     KATEGORİ ACCORDION LİSTE
  ═══════════════════════════════════════════════════ */
  .kategori-liste {
    display: flex;
    flex-direction: column;
    border: 1px solid var(--border);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }

  .kategori-satir {
    border-bottom: 1px solid var(--border);
  }
  .kategori-satir:last-child { border-bottom: none; }

  .kategori-baslik {
    display: flex;
    align-items: center;
    gap: 12px;
    padding: 13px 14px;
    background: var(--card);
    cursor: pointer;
    transition: background .15s;
    user-select: none;
  }
  .kategori-baslik:hover { background: rgba(245,200,66,0.06); }
  .kategori-baslik.acik {
    background: rgba(245,200,66,0.08);
    border-bottom: 1px solid rgba(245,200,66,0.25);
  }

  .kategori-baslik-ikon {
    width: 40px;
    height: 40px;
    border-radius: 50%;
    background: rgba(245,200,66,0.1);
    border: 1px solid rgba(245,200,66,0.2);
    display: flex;
    align-items: center;
    justify-content: center;
    font-size: 20px;
    flex-shrink: 0;
  }
  .kategori-baslik.acik .kategori-baslik-ikon {
    background: rgba(245,200,66,0.2);
    border-color: var(--gold);
  }

  .kategori-baslik-metin { flex: 1; }
  .kategori-baslik-ad {
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
  }
  .kategori-baslik.acik .kategori-baslik-ad { color: var(--gold); }
  .kategori-baslik-altad {
    font-size: 11px;
    color: var(--text3);
    margin-top: 1px;
  }

  .kategori-ok {
    font-size: 18px;
    color: var(--text3);
    transition: transform .25s;
    flex-shrink: 0;
  }
  .kategori-baslik.acik .kategori-ok {
    transform: rotate(180deg);
    color: var(--gold);
  }

  /* Accordion body — form alanları */
  .kategori-body {
    display: none;
    background: var(--bg);
    padding: 16px;
    border-bottom: 2px solid var(--gold);
  }
  .kategori-body.acik { display: block; }

  /* Form alanları */
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 8px; display: block; }
  .radio-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .radio-btn {
    padding: 8px 14px;
    border-radius: 50px;
    background: var(--card);
    border: 1.5px solid var(--border);
    color: var(--text2);
    font-family: 'Nunito', sans-serif;
    font-size: 12px;
    font-weight: 700;
    cursor: pointer;
    transition: all .2s;
  }
  .radio-btn.selected {
    background: rgba(245,200,66,0.1);
    border-color: var(--gold);
    color: var(--gold);
  }

  .kullanici-bilgi {
    background: var(--card);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 12px 14px;
    margin-bottom: 16px;
    display: flex;
    align-items: center;
    gap: 10px;
  }

  .foto-ekle-btn {
    width: 100%;
    height: 80px;
    background: var(--card);
    border: 2px dashed var(--border);
    border-radius: var(--radius-sm);
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    cursor: pointer;
    color: var(--text3);
    font-weight: 700;
    font-size: 13px;
  }
  .foto-preview { display: flex; gap: 8px; flex-wrap: wrap; margin-top: 10px; }
  .foto-thumb { position: relative; width: 68px; height: 68px; }
  .foto-thumb img { width: 68px; height: 68px; border-radius: 8px; object-fit: cover; }
  .foto-remove {
    position: absolute;
    top: -6px; right: -6px;
    width: 18px; height: 18px;
    border-radius: 50%;
    background: var(--rust);
    color: white;
    border: none;
    font-size: 10px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
  }

  .success-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.9);
    display: none;
    align-items: center;
    justify-content: center;
    flex-direction: column;
    z-index: 999;
    padding: 24px;
    text-align: center;
  }
  .success-overlay.show { display: flex; }

  .gonder-btn {
    width: 100%;
    padding: 14px;
    background: var(--gold);
    color: var(--bg);
    border: none;
    border-radius: 50px;
    font-family: 'Nunito', sans-serif;
    font-size: 15px;
    font-weight: 900;
    cursor: pointer;
    transition: opacity .2s;
    margin-top: 4px;
  }
  .gonder-btn:disabled { opacity: .6; cursor: not-allowed; }

<script>
(function() {
  var kaydedilenTema = localStorage.getItem('gotapu_tema');
  if (kaydedilenTema === 'light') document.body.classList.add('light');
  function temaButonuOlustur() {
    if (document.getElementById('themeToggleBtn')) return;
    var btn = document.createElement('button');
    btn.id = 'themeToggleBtn';
    btn.className = 'theme-toggle-btn nav-icon-btn';
    btn.style.cssText = 'flex-shrink:0;';
    btn.setAttribute('title', 'Temayı Değiştir');
    btn.textContent = document.body.classList.contains('light') ? '🌙' : '☀️';
    btn.addEventListener('click', function() {
      var acikMi = document.body.classList.toggle('light');
      localStorage.setItem('gotapu_tema', acikMi ? 'light' : 'dark');
      btn.textContent = acikMi ? '🌙' : '☀️';
      btn.style.transform = 'scale(0.8) rotate(20deg)';
      setTimeout(function() { btn.style.transform = ''; }, 200);
    });
    var navActions = document.querySelector('.nav-actions');
    if (navActions) navActions.insertBefore(btn, navActions.firstChild);
  }
  if (document.readyState === 'loading') {
    document.addEventListener('DOMContentLoaded', temaButonuOlustur);
  } else {
    temaButonuOlustur();
  }
})();
</script>

  ]},
  haliyikama: { em: '🧼', ad: 'Halı Yıkama', desc: 'Halı, kilim ve yolluk yıkama hizmetleri', alanlar: [
    { id: 'tip', label: 'Ürün Tipi', secenekler: ['Makine Halısı', 'El Dokuma Kilim', 'Yolluk', 'Paspas', 'İpek Halı', 'Karma (Birden Fazla)'] },
    { id: 'boyut', label: 'En Büyük Halı Boyutu', secenekler: ['2x3m altı', '2x3m', '3x4m', '4x5m', '5m² üzeri'] },
    { id: 'adet', label: 'Toplam Adet', secenekler: ['1-2 Adet', '3-5 Adet', '6-10 Adet', '10+ Adet'] },
    { id: 'durum', label: 'Kirlilik Durumu', secenekler: ['Normal Kirlilik', 'Ağır Leke Var', 'Koku Sorunu Var', 'Evcil Hayvan Lekesi', 'Su/Nem Hasarı'] },
    { id: 'servis', label: 'Servis Şekli', secenekler: ['Evden Alıp Getirsinler', 'Yerinde Yıkama', 'Ben Getireceğim'] },
    { id: 'zaman', label: 'Ne Zaman?', secenekler: ['Bu Hafta', 'Önümüzdeki Hafta', 'Bu Ay', 'Tarih Belirlemedim'] },
  ]}
};

// Her kategori için ayrı state
const state = {};
Object.keys(kategoriler).forEach(k => {
  state[k] = { secimler: {}, fotoFiles: [], aciklama: '' };
});

let currentUser = null;
let currentProfil = null;
let acikKategori = null;

// URL parametresinden kategori al
const params = new URLSearchParams(window.location.search);
const urlKategori = params.get('kategori');

sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'index.html'; return; }
  currentUser = data.session.user;
  profilYukle();
});

async function profilYukle() {
  try {
    const { data } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
    currentProfil = data;
  } catch(e) {}
  sayfaOlustur();
}

function sayfaOlustur() {
  const liste = document.getElementById('kategoriListe');
  liste.innerHTML = Object.entries(kategoriler).map(([key, kat]) => `
    <div class="kategori-satir" id="satir_${key}">
      <div class="kategori-baslik" id="baslik_${key}" onclick="kategoriToggle('${key}')">
        <div class="kategori-baslik-ikon">${kat.em}</div>
        <div class="kategori-baslik-metin">
          <div class="kategori-baslik-ad">${kat.ad}</div>
          <div class="kategori-baslik-altad">${kat.desc}</div>
        </div>
        <span class="kategori-ok">▼</span>
      </div>
      <div class="kategori-body" id="body_${key}">
        ${formHtmlOlustur(key)}
      </div>
    </div>
  `).join('');

  // URL'den gelen kategoriyi aç
  if (urlKategori && kategoriler[urlKategori]) {
    setTimeout(() => kategoriToggle(urlKategori), 100);
  }
}

function formHtmlOlustur(key) {
  const kat = kategoriler[key];
  const kullaniciAd = currentProfil?.full_name || currentUser?.email || '';
  const kullaniciTel = currentProfil?.phone || '';

  return `
    <div class="kullanici-bilgi">
      <span style="font-size:22px">👤</span>
      <div>
        <div style="font-size:13px;font-weight:800">${kullaniciAd}</div>
        ${kullaniciTel ? `<div style="font-size:11px;color:var(--text3)">📞 ${kullaniciTel}</div>` : ''}
      </div>
    </div>

    <div id="formAlanlari_${key}">
      ${kat.alanlar.map(alan => {
        const fn = alan.coklu ? `cokluSec('${key}','${alan.id}',this)` : `tekSec('${key}','${alan.id}',this)`;
        return `
        <div class="form-group">
          <label class="form-label">${alan.label}</label>
          <div class="radio-group" id="grp_${key}_${alan.id}">
            ${alan.secenekler.map(s => `<button class="radio-btn" onclick="${fn}">${s}</button>`).join('')}
          </div>
        </div>`;
      }).join('')}
    </div>

    <div class="form-group">
      <label class="form-label">📸 Fotoğraf Ekle (isteğe bağlı)</label>
      <div class="foto-ekle-btn" onclick="document.getElementById('fotoInput').setAttribute('data-key','${key}');document.getElementById('fotoInput').click()">
        <span style="font-size:24px">📷</span> Fotoğraf Seç
      </div>
      <div class="foto-preview" id="fotoPreview_${key}"></div>
    </div>

    <div class="form-group">
      <label class="form-label">📝 Ek Açıklama (isteğe bağlı)</label>
      <textarea class="input" id="aciklama_${key}" rows="3" placeholder="Eklemek istediğiniz detaylar..." style="resize:none"></textarea>
    </div>

    <div id="formError_${key}" style="background:rgba(232,96,58,0.1);color:var(--rust);border-radius:10px;padding:12px;font-size:13px;font-weight:700;display:none;margin-bottom:12px"></div>

    <button class="gonder-btn" id="gonderBtn_${key}" onclick="teklifGonder('${key}')">
      📩 Teklif İste — ${kat.ad}
    </button>
  `;
}

function kategoriToggle(key) {
  const baslik = document.getElementById('baslik_' + key);
  const body   = document.getElementById('body_' + key);

  if (acikKategori && acikKategori !== key) {
    // Diğerini kapat
    document.getElementById('baslik_' + acikKategori).classList.remove('acik');
    document.getElementById('body_' + acikKategori).classList.remove('acik');
  }

  const yeniDurum = body.classList.toggle('acik');
  baslik.classList.toggle('acik', yeniDurum);
  acikKategori = yeniDurum ? key : null;

  if (yeniDurum) {
    // Sayfayı o satıra kaydır
    setTimeout(() => {
      document.getElementById('satir_' + key).scrollIntoView({ behavior: 'smooth', block: 'start' });
    }, 150);
  }
}

function tekSec(key, alanId, el) {
  state[key].secimler[alanId] = el.textContent.trim();
  document.querySelectorAll(`#grp_${key}_${alanId} .radio-btn`).forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

function cokluSec(key, alanId, el) {
  el.classList.toggle('selected');
  const secili = [...document.querySelectorAll(`#grp_${key}_${alanId} .radio-btn.selected`)].map(b => b.textContent.trim());
  state[key].secimler[alanId] = secili.join(', ');
}

function fotoSec(input) {
  const key = input.getAttribute('data-key');
  if (!key) return;
  Array.from(input.files).forEach(f => {
    if (state[key].fotoFiles.length < 5) state[key].fotoFiles.push(f);
  });
  input.value = '';
  fotoPreviewGuncelle(key);
}

function fotoPreviewGuncelle(key) {
  document.getElementById('fotoPreview_' + key).innerHTML =
    state[key].fotoFiles.map((f, i) => {
      const url = URL.createObjectURL(f);
      return `<div class="foto-thumb"><img src="${url}"><button class="foto-remove" onclick="fotoSil('${key}',${i})">✕</button></div>`;
    }).join('');
}

function fotoSil(key, i) {
  state[key].fotoFiles.splice(i, 1);
  fotoPreviewGuncelle(key);
}

async function teklifGonder(key) {
  const kat = kategoriler[key];
  const zorunlu = kat.alanlar.filter(a => !a.coklu);
  const eksik = zorunlu.find(a => !state[key].secimler[a.id]);
  const errEl = document.getElementById('formError_' + key);

  if (eksik) {
    errEl.textContent = `⚠️ Lütfen "${eksik.label}" seçin!`;
    errEl.style.display = 'block';
    return;
  }
  errEl.style.display = 'none';

  const btn = document.getElementById('gonderBtn_' + key);
  btn.textContent = '⏳ Gönderiliyor...';
  btn.disabled = true;

  const fotoFiles = state[key].fotoFiles;
  let foto_urls = [];
  for (let i = 0; i < fotoFiles.length; i++) {
    const file = fotoFiles[i];
    const fileName = `teklifler/${currentUser.id}/${Date.now()}_${i}`;
    btn.textContent = `⏳ Fotoğraf ${i+1}/${fotoFiles.length}...`;
    const { data: up } = await sb.storage.from('ilan-fotograflar').upload(fileName, file);
    if (up) {
      const { data: u } = sb.storage.from('ilan-fotograflar').getPublicUrl(fileName);
      foto_urls.push(u.publicUrl);
    }
  }

  const aciklama = document.getElementById('aciklama_' + key).value.trim();
  const { error } = await sb.from('teklifler').insert({
    user_id: currentUser.id,
    ad_soyad: currentProfil?.full_name || '',
    telefon: currentProfil?.phone || '',
    kategori: key,
    detaylar: { ...state[key].secimler, aciklama, foto_urls },
    durum: 'bekliyor'
  });

  if (error) {
    errEl.textContent = 'Hata: ' + error.message;
    errEl.style.display = 'block';
    btn.textContent = `📩 Teklif İste — ${kat.ad}`;
    btn.disabled = false;
    return;
  }

  document.getElementById('successOverlay').classList.add('show');
}
</script>
<script>
  if ("serviceWorker" in navigator) {
    navigator.serviceWorker.register("/sw.js").catch(e => console.log("SW error:", e));
  }
</script>
</body>
</html>
