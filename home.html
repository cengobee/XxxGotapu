<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GoTapu — Türkiye'nin Mega Uygulaması</title>
<meta name="description" content="Yazı, foto, video. İlan, alışveriş, eşleşme. Tek uygulama, sınırsız hayat.">
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="stil.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<script src="kredi.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
input,textarea{-webkit-user-select:text;user-select:text}

/* ── SEKME BAR ── */
.sekme-bar{
  display:flex;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  position:sticky;top:var(--nav-h,58px);z-index:90;
  padding:0 8px;
  overflow-x:auto;
}
.sekme-bar::-webkit-scrollbar{display:none}
.sekme-btn{
  display:flex;align-items:center;gap:7px;
  padding:11px 14px 10px;font-size:13px;font-weight:800;
  border:none;background:transparent;color:var(--text3);
  cursor:pointer;font-family:'Nunito',sans-serif;
  border-bottom:2.5px solid transparent;
  transition:color .15s,border-color .15s;white-space:nowrap;
  flex-shrink:0;
}
.sekme-btn.aktif{color:var(--text);border-bottom-color:var(--rust)}

/* ── FEED BÖLÜM ── */
.bolum{display:none}
.bolum.aktif{display:block}

/* ── FEED BOŞ ── */
.feed-bos{
  display:flex;flex-direction:column;align-items:center;
  justify-content:center;padding:80px 24px;text-align:center;
}
.feed-bos-emoji{font-size:56px;margin-bottom:16px;line-height:1}
.feed-bos-baslik{font-size:18px;font-weight:900;color:var(--text);margin-bottom:8px}
.feed-bos-alt{font-size:13px;color:var(--text3);line-height:1.6;max-width:260px}


</style>
</head>
<body data-page="home" style="visibility:hidden">
<script>(function(){if(localStorage.getItem('gotapu_tema')==='light')document.body.classList.add('light')})();</script>

<!-- SEKME BAR -->
<div class="sekme-bar">
  <button id="tabVideo" class="sekme-btn aktif" onclick="sekmeGec('Video')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="2" y="3" width="15" height="15" rx="2"/><polygon points="17 8 22 12 17 16 17 8"/></svg>
    Video
  </button>
  <button id="tabFoto" class="sekme-btn" onclick="sekmeGec('Foto')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><rect x="3" y="3" width="18" height="18" rx="2"/><circle cx="8.5" cy="8.5" r="1.5"/><polyline points="21 15 16 10 5 21"/></svg>
    Foto
  </button>
  <button id="tabYazi" class="sekme-btn" onclick="sekmeGec('Yazi')">
    <svg width="14" height="14" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round"><line x1="17" y1="10" x2="3" y2="10"/><line x1="21" y1="6" x2="3" y2="6"/><line x1="21" y1="14" x2="3" y2="14"/><line x1="17" y1="18" x2="3" y2="18"/></svg>
    Yazı
  </button>
</div>

<!-- VIDEO FEED -->
<div id="bolumVideo" class="bolum aktif">
  <div class="feed-bos">
    <div class="feed-bos-emoji">🎬</div>
    <div class="feed-bos-baslik">Video akışı yakında</div>
    <div class="feed-bos-alt">Takip ettiğin kişilerin videoları burada akacak</div>
  </div>
</div>

<!-- FOTO FEED -->
<div id="bolumFoto" class="bolum">
  <div class="feed-bos">
    <div class="feed-bos-emoji">📷</div>
    <div class="feed-bos-baslik">Fotoğraf akışı yakında</div>
    <div class="feed-bos-alt">Takip ettiğin kişilerin fotoğrafları burada görünecek</div>
  </div>
</div>

<!-- YAZI FEED -->
<div id="bolumYazi" class="bolum">
  <div class="feed-bos">
    <div class="feed-bos-emoji">✏️</div>
    <div class="feed-bos-baslik">Yazı akışı yakında</div>
    <div class="feed-bos-alt">Takip ettiğin kişilerin paylaşımları burada görünecek</div>
  </div>
</div>

<script>
/* ── SUPABASE ── */
const SUPABASE_URL='https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
window._sbClient=sb;

/* ── SEKME ── */
function sekmeGec(s){
  document.querySelectorAll('.sekme-btn').forEach(b=>b.classList.remove('aktif'));
  document.getElementById('tab'+s).classList.add('aktif');
  document.querySelectorAll('.bolum').forEach(b=>b.classList.remove('aktif'));
  document.getElementById('bolum'+s).classList.add('aktif');
}

/* ── AUTH REDIRECT ── */
if(window.location.hash&&window.location.hash.includes('access_token')){
  const hp=new URLSearchParams(window.location.hash.substring(1));
  const at=hp.get('access_token'),rt=hp.get('refresh_token');
  if(at){
    sb.auth.setSession({access_token:at,refresh_token:rt}).then(({data,error})=>{
      if(error)window.location.replace('index.html');
      else{window.history.replaceState(null,'',window.location.pathname);init();}
    });
  }else init();
}else if(new URLSearchParams(window.location.search).get('code')){
  window.location.replace('index.html'+window.location.search);
}else{init();}

function init(){
  sb.auth.getSession().then(({data})=>{
    if(!data.session){window.location.replace('index.html');return;}
    document.body.style.visibility='visible';
  });
}
</script>

<!-- NAVBAR (en sona ekleniyor) -->
<script src="navbar.js"></script>
</body>
</html>
