<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .detay-img {
    width: 100%; height: 260px;
    background: linear-gradient(135deg, #1a2340, #2a3560);
    display: flex; align-items: center; justify-content: center;
    font-size: 100px; position: relative; overflow: hidden;
    margin: -16px -16px 20px; width: calc(100% + 32px);
  }
  .detay-img img { width: 100%; height: 100%; object-fit: cover; position: absolute; inset: 0; }
  .detay-tip-badge { position: absolute; top: 16px; left: 16px; padding: 6px 14px; border-radius: 50px; font-size: 12px; font-weight: 800; }
  .detay-fav-btn { position: absolute; top: 16px; right: 16px; width: 42px; height: 42px; border-radius: 50%; background: rgba(0,0,0,0.5); backdrop-filter: blur(8px); display: flex; align-items: center; justify-content: center; font-size: 22px; cursor: pointer; border: none; transition: transform .2s; }
  .detay-fav-btn:active { transform: scale(1.2); }
  .detay-fiyat { font-size: 28px; font-weight: 900; color: var(--gold); }
  .detay-baslik { font-size: 18px; font-weight: 800; margin: 6px 0; }
  .detay-konum { font-size: 14px; color: var(--text3); margin-bottom: 16px; }
  .specs-row { display: flex; gap: 10px; margin-bottom: 20px; flex-wrap: wrap; }
  .spec-box { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius-sm); padding: 12px 16px; text-align: center; flex: 1; min-width: 70px; }
  .spec-icon { font-size: 22px; display: block; margin-bottom: 4px; }
  .spec-val { font-size: 14px; font-weight: 800; }
  .spec-lbl { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .detay-section { margin-bottom: 20px; }
  .detay-section-title { font-size: 16px; font-weight: 900; margin-bottom: 10px; }
  .detay-aciklama { font-size: 14px; color: var(--text2); line-height: 1.8; }
  .sahip-card { display: flex; gap: 14px; align-items: center; background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); padding: 14px; }
  .sahip-avatar { width: 52px; height: 52px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
  .sahip-avatar img { width: 100%; height: 100%; object-fit: cover; }
  .sahip-name { font-size: 15px; font-weight: 800; }
  .sahip-since { font-size: 12px; color: var(--text3); margin-top: 2px; }
  .sahip-verified { font-size: 12px; color: var(--green); font-weight: 700; margin-top: 3px; }
  .action-bottom { position: fixed; bottom: var(--bot-h); left: 0; right: 0; background: var(--bg2); border-top: 1px solid var(--border); padding: 12px 16px; display: flex; gap: 10px; z-index: 150; }
  .btn-ara { background: var(--card2); color: var(--text); border: 1.5px solid var(--border); border-radius: 50px; padding: 14px 20px; font-size: 15px; font-weight: 800; cursor: pointer; font-family: 'Nunito', sans-serif; display: flex; align-items: center; gap: 8px; }
  .harita-placeholder { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); height: 110px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 6px; color: var(--text3); font-size: 13px; font-weight: 700; cursor: pointer; flex: 1; text-align: center; padding: 8px; }
  .page { padding-bottom: 100px !important; }

  /* ── LİGHTBOX ── */
  .lightbox { position: fixed; inset: 0; z-index: 999; background: rgba(0,0,0,0.97); display: none; flex-direction: column; align-items: center; justify-content: center; }
  .lightbox.open { display: flex; }
  .lightbox-close { position: absolute; top: 16px; right: 16px; width: 40px; height: 40px; border-radius: 50%; background: rgba(255,255,255,0.15); border: none; color: white; font-size: 20px; cursor: pointer; display: flex; align-items: center; justify-content: center; z-index: 10; }
  .lightbox-galeri { display: flex; overflow-x: auto; scroll-snap-type: x mandatory; scrollbar-width: none; width: 100%; flex: 1; }
  .lightbox-galeri::-webkit-scrollbar { display: none; }
  .lightbox-item { flex-shrink: 0; width: 100vw; height: 80vh; scroll-snap-align: start; display: flex; align-items: center; justify-content: center; position: relative; }
  .lightbox-item img { max-width: 100%; max-height: 100%; object-fit: contain; }
  .lightbox-oda-etiket {
    position: absolute; bottom: 12px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.72); backdrop-filter: blur(10px);
    border: 1px solid rgba(245,200,66,0.35);
    border-radius: 50px; padding: 6px 18px;
    font-size: 13px; font-weight: 800; color: var(--gold);
    white-space: nowrap; pointer-events: none;
  }
  .lightbox-sayac {
    position: absolute; bottom: 16px; left: 50%; transform: translateX(-50%);
    font-size: 13px; font-weight: 800; color: white;
    background: rgba(255,255,255,0.15); border-radius: 50px; padding: 6px 16px;
    white-space: nowrap;
  }
  .lightbox-footer { display: flex; align-items: center; justify-content: center; padding: 10px 16px 16px; gap: 12px; }
  .lightbox-sayac-bar { font-size: 13px; font-weight: 800; color: rgba(255,255,255,0.7); background: rgba(255,255,255,0.1); border-radius: 50px; padding: 6px 16px; }

  .galeri-oda-ozet { position: absolute; bottom: 12px; left: 12px; background: rgba(0,0,0,0.65); backdrop-filter: blur(8px); border-radius: 50px; padding: 4px 12px; font-size: 11px; font-weight: 800; color: rgba(255,255,255,0.85); max-width: calc(100% - 80px); overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }

  .sikayet-sebep-btn { width: 100%; padding: 14px 16px; border-radius: var(--radius-sm); background: var(--card); border: 1.5px solid var(--border); color: var(--text); font-family: 'Nunito', sans-serif; font-size: 14px; font-weight: 700; cursor: pointer; text-align: left; transition: all .2s; }
  .sikayet-sebep-btn.selected { border-color: var(--rust); background: rgba(232,96,58,0.08); color: var(--rust); }
  .btn-rust { background: var(--rust); color: white; }
  .fav-toast { position: fixed; bottom: 90px; left: 50%; transform: translateX(-50%); background: var(--card2); border: 1px solid var(--border); border-radius: 50px; padding: 10px 20px; font-size: 13px; font-weight: 700; color: var(--text); display: none; align-items: center; gap: 8px; z-index: 500; white-space: nowrap; box-shadow: 0 8px 24px rgba(0,0,0,0.4); }
  .fav-toast.show { display: flex; animation: toastIn .3s ease; }
  @keyframes toastIn { from { opacity:0; transform:translateX(-50%) translateY(10px); } to { opacity:1; transform:translateX(-50%) translateY(0); } }
  .kriter-tablo { background: var(--card); border: 1px solid var(--border); border-radius: var(--radius); overflow: hidden; }
  .kriter-satir { display: flex; justify-content: space-between; align-items: flex-start; padding: 11px 14px; border-top: 1px solid var(--border); }
  .kriter-satir:first-child { border-top: none; }
  .kriter-label { font-size: 13px; color: var(--text3); font-weight: 700; flex-shrink: 0; margin-right: 12px; }
  .kriter-deger { font-size: 13px; font-weight: 800; text-align: right; }

  /* ── KREDİ HESAPLAYICI ── */
  .kredi-wrap {
    background: var(--card);
    border: 1.5px solid rgba(245,200,66,0.25);
    border-radius: var(--radius);
    overflow: hidden;
    margin-bottom: 20px;
  }
  .kredi-header {
    background: linear-gradient(135deg, rgba(245,200,66,0.12), rgba(245,200,66,0.04));
    border-bottom: 1px solid rgba(245,200,66,0.2);
    padding: 14px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    cursor: pointer;
    user-select: none;
    -webkit-user-select: none;
  }
  .kredi-header-icon { font-size: 22px; }
  .kredi-header-text { flex: 1; }
  .kredi-header-title { font-size: 15px; font-weight: 900; color: var(--gold); }
  .kredi-header-sub { font-size: 12px; color: var(--text3); margin-top: 1px; }
  .kredi-header-arrow {
    font-size: 16px; color: var(--gold); transition: transform .3s;
    display: inline-block;
  }
  .kredi-header-arrow.acik { transform: rotate(180deg); }
  .kredi-body { padding: 16px; display: none; }
  .kredi-body.acik { display: block; }

  /* Banka seçici */
  .banka-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 8px; margin-bottom: 16px; }
  .banka-btn {
    background: var(--card2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 10px 12px;
    cursor: pointer;
    transition: all .2s;
    text-align: left;
  }
  .banka-btn.secili {
    border-color: var(--gold);
    background: rgba(245,200,66,0.08);
  }
  .banka-btn-ad { font-size: 13px; font-weight: 900; color: var(--text); }
  .banka-btn-faiz { font-size: 11px; color: var(--text3); margin-top: 2px; }
  .banka-btn.secili .banka-btn-faiz { color: var(--gold); font-weight: 800; }

  /* Input grubu */
  .kredi-input-grup { display: flex; flex-direction: column; gap: 12px; margin-bottom: 16px; }
  .kredi-input-row { display: flex; flex-direction: column; gap: 4px; }
  .kredi-input-label { font-size: 12px; font-weight: 800; color: var(--text3); }
  .kredi-input-inner { display: flex; align-items: center; gap: 8px; }
  .kredi-input {
    flex: 1;
    background: var(--bg2);
    border: 1.5px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 11px 12px;
    font-size: 14px;
    font-weight: 800;
    color: var(--text);
    font-family: 'Nunito', sans-serif;
    outline: none;
    transition: border-color .2s;
  }
  .kredi-input:focus { border-color: var(--gold); }
  .kredi-input-birim { font-size: 13px; font-weight: 800; color: var(--text3); white-space: nowrap; }

  /* Vade slider */
  .vade-slider-wrap { margin-top: 4px; }
  .vade-slider {
    -webkit-appearance: none;
    appearance: none;
    width: 100%;
    height: 6px;
    border-radius: 3px;
    background: var(--border);
    outline: none;
    cursor: pointer;
  }
  .vade-slider::-webkit-slider-thumb {
    -webkit-appearance: none;
    appearance: none;
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .vade-slider::-moz-range-thumb {
    width: 20px; height: 20px;
    border-radius: 50%;
    background: var(--gold);
    cursor: pointer;
    border: none;
    box-shadow: 0 2px 8px rgba(0,0,0,0.3);
  }
  .vade-isaretler { display: flex; justify-content: space-between; margin-top: 6px; }
  .vade-isaret { font-size: 10px; font-weight: 700; color: var(--text3); }

  /* Sonuç */
  .kredi-sonuc {
    background: linear-gradient(135deg, rgba(245,200,66,0.1), rgba(245,200,66,0.03));
    border: 1px solid rgba(245,200,66,0.2);
    border-radius: var(--radius-sm);
    padding: 14px 16px;
    display: none;
  }
  .kredi-sonuc.goster { display: block; }
  .kredi-sonuc-row { display: flex; justify-content: space-between; align-items: center; padding: 6px 0; border-bottom: 1px solid rgba(245,200,66,0.1); }
  .kredi-sonuc-row:last-child { border-bottom: none; padding-top: 10px; }
  .kredi-sonuc-label { font-size: 12px; color: var(--text3); font-weight: 700; }
  .kredi-sonuc-val { font-size: 14px; font-weight: 900; color: var(--text); }
  .kredi-sonuc-taksit { font-size: 22px; font-weight: 900; color: var(--gold); }
  .kredi-uyari { font-size: 11px; color: var(--text3); line-height: 1.5; margin-top: 10px; padding-top: 10px; border-top: 1px solid var(--border); }
</style>

<script>
var SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
var SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
var sb = supabase.createClient(SUPABASE_URL, SUPABASE_KEY);

var odaAdlari = {
  salon:{em:'🛋️',ad:'Salon'}, mutfak:{em:'🍳',ad:'Mutfak'}, yatak:{em:'🛏️',ad:'Yatak Odası'},
  banyo:{em:'🚿',ad:'Banyo'}, balkon:{em:'🌿',ad:'Balkon / Bahçe'}, havuz:{em:'🏊',ad:'Havuz'},
  otopark:{em:'🚗',ad:'Otopark'}, tenis:{em:'🎾',ad:'Tenis Kortu'}, spor:{em:'💪',ad:'Spor Salonu'},
  dis:{em:'🏠',ad:'Dış Görünüm'}, diger:{em:'📷',ad:'Diğer'}
};

var ilan = null;
var currentUser = null;
var favori = false;
var ilanId = null;
var kisaKod = null;

// Birleşik fotoğraf dizisi: [{url, oda, ad, em}]
var tumFotolar = [];

// ── KREDİ HESAPLAYICI DEĞİŞKENLERİ ──
var bankalar = [];          // [{ad, faiz}] — Supabase'den veya fallback
var seciliBankaIndex = 0;
var krediAcikMi = false;

function ilanIdCoz() {
  var hash = window.location.hash.replace('#','').trim();
  if (hash && hash.length > 0) return {tip:'kisa_kod', deger:hash};
  var params = new URLSearchParams(window.location.search);
  var id = params.get('id');
  if (id) return {tip:'uuid', deger:id};
  return null;
}

function girisGerekli() {
  localStorage.setItem('gotapu_redirect', window.location.href);
  window.location.href = 'auth.html';
}

sb.auth.getSession().then(function(res) {
  currentUser = res.data.session ? res.data.session.user : null;
  var sorgu = ilanIdCoz();
  if (sorgu) {
    ilanYukle(sorgu);
  } else {
    document.getElementById('icerik').innerHTML = '<div class="empty"><div class="empty-icon">?</div><div class="empty-title">Ilan bulunamadi</div><a href="index.html" class="btn btn-gold btn-md" style="margin-top:20px;max-width:200px">Ana Sayfaya Don</a></div>';
  }
});

async function ilanYukle(sorgu) {
  var query;
  if (sorgu.tip === 'kisa_kod') {
    query = sb.from('ilanlar').select('*').eq('kisa_kod', sorgu.deger).single();
  } else {
    query = sb.from('ilanlar').select('*').eq('id', sorgu.deger).single();
  }
  var res = await query;
  if (res.error || !res.data) {
    document.getElementById('icerik').innerHTML = '<div class="empty"><div class="empty-icon">?</div><div class="empty-title">Ilan bulunamadi</div><a href="index.html" class="btn btn-gold btn-md" style="margin-top:20px;max-width:200px">Ana Sayfaya Don</a></div>';
    return;
  }
  ilan = res.data;
  ilanId = ilan.id;
  kisaKod = ilan.kisa_kod || null;
  if (sorgu.tip === 'uuid' && kisaKod) {
    window.history.replaceState(null, '', 'ilan-detay.html#' + kisaKod);
  }
  if (ilan.user_id) {
    var pr = await sb.from('profiles').select('*').eq('id', ilan.user_id).single();
    ilan.profiles = pr.data || null;
  }

  // ── Birleşik fotoğraf dizisi oluştur ──
  tumFotolar = [];
  var eklenenUrlSet = new Set();

  if (ilan.oda_fotograflari && typeof ilan.oda_fotograflari === 'object') {
    Object.entries(ilan.oda_fotograflari).forEach(function(entry) {
      var oda = entry[0];
      var urls = entry[1];
      if (!urls || !urls.length) return;
      var bilgi = odaAdlari[oda] || {em:'📷', ad:'Diğer'};
      urls.forEach(function(url) {
        tumFotolar.push({url: url, oda: oda, ad: bilgi.ad, em: bilgi.em});
        eklenenUrlSet.add(url);
      });
    });
  }

  var ekstraUrls = ilan.foto_urls && ilan.foto_urls.length > 0
    ? ilan.foto_urls
    : (ilan.foto_url ? [ilan.foto_url] : []);

  ekstraUrls.forEach(function(url) {
    if (!eklenenUrlSet.has(url)) {
      tumFotolar.push({url: url, oda: null, ad: null, em: null});
    }
  });

  // ── Banka faizlerini yükle ──
  await bankaFaizleriYukle();

  favoriKontrol();
  sayfayiOlustur();
  document.getElementById('actionBottom').style.display = 'flex';
}

async function bankaFaizleriYukle() {
  var fallback = [
    { ad: 'Ziraat Bankası',   faiz: 3.49 },
    { ad: 'Halkbank',         faiz: 3.59 },
    { ad: 'Vakıfbank',        faiz: 3.69 },
    { ad: 'Garanti BBVA',     faiz: 3.79 }
  ];

  try {
    var res = await sb.from('banka_faizleri').select('banka_adi, aylik_faiz').eq('aktif', true).order('aylik_faiz', {ascending: true}).limit(4);
    if (!res.error && res.data && res.data.length >= 2) {
      bankalar = res.data.map(function(r) { return { ad: r.banka_adi, faiz: parseFloat(r.aylik_faiz) }; });
    } else {
      bankalar = fallback;
    }
  } catch(e) {
    bankalar = fallback;
  }
}

async function favoriKontrol() {
  if (!currentUser) return;
  var res = await sb.from('favoriler').select('id').eq('user_id', currentUser.id).eq('ilan_id', ilanId).single();
  favori = !!res.data;
  var btn = document.getElementById('favBtn');
  if (btn) btn.textContent = favori ? '❤️' : '🤍';
}

function sayfayiOlustur() {
  var tipRenk = {satilik:'tag-rust', kiralik:'tag-green', devren:'tag-blue'};
  var tipLabel = {satilik:'SATILIK', kiralik:'KIRALIK', devren:'DEVREN'};
  var fiyatStr = Number(ilan.fiyat).toLocaleString('tr-TR');
  var fiyatEk = ilan.tip === 'kiralik' ? '/ay' : '';
  var sahip = ilan.profiles;

  // ── Galeri HTML ──

function krediEventleriEkle() { krediHesapla(); }

function krediToggle() {
  krediAcikMi = !krediAcikMi;
  var body = document.getElementById('krediBody');
  var arrow = document.getElementById('krediArrow');
  if (krediAcikMi) { body.classList.add('acik'); arrow.classList.add('acik'); krediHesapla(); }
  else { body.classList.remove('acik'); arrow.classList.remove('acik'); }
}

function bankaSeç(index) {
  seciliBankaIndex = index;
  bankalar.forEach(function(_, i) { var btn = document.getElementById('bankaBtn_' + i); if (btn) btn.classList.remove('secili'); });
  var secBtn = document.getElementById('bankaBtn_' + index);
  if (secBtn) secBtn.classList.add('secili');
  krediHesapla();
}

function vadeDegisti(val) {
  var ay = parseInt(val);
  var yilLabel = ay >= 12 ? ' (' + Math.round(ay/12) + ' yıl)' : '';
  var el = document.getElementById('vadeLabel');
  if (el) el.textContent = ay + ' ay' + yilLabel;
  krediHesapla();
}

function pesinatKontrol() {
  var minPesinat = Math.round(ilan.fiyat * 0.20);
  var input = document.getElementById('krediPesinat');
  if (!input) return;
  var girilenDeger = parseFloat(input.value) || 0;
  if (girilenDeger < minPesinat) {
    input.value = minPesinat;
    input.style.borderColor = 'var(--rust)';
    setTimeout(function() { input.style.borderColor = ''; }, 1500);
  }
  krediHesapla();
}

function krediHesapla() {
  var pesinatInput = document.getElementById('krediPesinat');
  var vadeInput = document.getElementById('vadeSlider');
  var sonucEl = document.getElementById('krediSonuc');
  if (!pesinatInput || !vadeInput || !sonucEl) return;

  var fiyat = parseFloat(ilan.fiyat) || 0;
  var pesinat = parseFloat(pesinatInput.value) || 0;
  var vade = parseInt(vadeInput.value) || 120;
  var faizOrani = bankalar[seciliBankaIndex] ? bankalar[seciliBankaIndex].faiz : 3.49;

  var krediTutar = fiyat - pesinat;
  if (krediTutar <= 0) { sonucEl.classList.remove('goster'); return; }

  var r = faizOrani / 100;
  var n = vade;
  var taksit;
  if (r === 0) { taksit = krediTutar / n; }
  else { taksit = krediTutar * r * Math.pow(1 + r, n) / (Math.pow(1 + r, n) - 1); }

  var toplamOdeme = taksit * n;
  var toplamFaiz = toplamOdeme - krediTutar;

  document.getElementById('sonucKrediTutar').textContent = Math.round(krediTutar).toLocaleString('tr-TR') + ' TL';
  document.getElementById('sonucFaiz').textContent = '%' + faizOrani.toFixed(2) + ' / ay';
  document.getElementById('sonucVade').textContent = vade + ' ay';
  document.getElementById('sonucTaksit').textContent = Math.round(taksit).toLocaleString('tr-TR') + ' TL';
  document.getElementById('sonucToplam').textContent = Math.round(toplamOdeme).toLocaleString('tr-TR') + ' TL';
  document.getElementById('sonucFaizMaliyet').textContent = Math.round(toplamFaiz).toLocaleString('tr-TR') + ' TL';

  sonucEl.classList.add('goster');
}

// ── LİGHTBOX ──
var lbAktifIndex = 0;
var lbTouchStartX = 0;
var lbTouchStartY = 0;
var lbSwiping = false;

function lightboxAc(index) {
  var galeri = document.getElementById('lightboxGaleri');
  galeri.innerHTML = tumFotolar.map(function(foto) {
    return '<div class="lightbox-item">' +
      '<img src="' + foto.url + '">' +
      (foto.ad ? '<div class="lightbox-oda-etiket">' + foto.em + ' ' + foto.ad + '</div>' : '') +
      '</div>';
  }).join('');

  lbAktifIndex = index;
  lbSayacGuncelle();
  document.getElementById('lightbox').classList.add('open');

  galeri.style.scrollSnapType = 'none';
  galeri.style.overflow = 'hidden';
  galeri.scrollLeft = index * window.innerWidth;

  galeri.ontouchstart = function(e) {
    lbTouchStartX = e.touches[0].clientX;
    lbTouchStartY = e.touches[0].clientY;
    lbSwiping = true;
  };
  galeri.ontouchend = function(e) {
    if (!lbSwiping) return;
    lbSwiping = false;
    var dx = lbTouchStartX - e.changedTouches[0].clientX;
    var dy = lbTouchStartY - e.changedTouches[0].clientY;
    if (Math.abs(dy) > Math.abs(dx) && Math.abs(dy) > 60) { lightboxKapat(); return; }
    if (Math.abs(dx) > 40) {
      if (dx > 0 && lbAktifIndex < tumFotolar.length - 1) lbAktifIndex++;
      else if (dx < 0 && lbAktifIndex > 0) lbAktifIndex--;
      lbGit(lbAktifIndex);
    }
  };
}

function lbGit(index) {
  lbAktifIndex = index;
  var galeri = document.getElementById('lightboxGaleri');
  galeri.scrollTo({ left: index * window.innerWidth, behavior: 'smooth' });
  lbSayacGuncelle();
}

function lbSayacGuncelle() {
  var f = tumFotolar[lbAktifIndex];
  var etiket = f && f.ad ? (f.em + ' ' + f.ad + ' · ') : '';
  document.getElementById('lightboxSayac').textContent = etiket + (lbAktifIndex + 1) + ' / ' + tumFotolar.length;
}

function lightboxKapat() { document.getElementById('lightbox').classList.remove('open'); }

var seciliSikayetSebep = null;
function sikayetAc() {
  if (!currentUser) { girisGerekli(); return; }

  document.querySelectorAll('.sikayet-sebep-btn').forEach(function(b) { b.classList.remove('selected'); });

function sikayetKapat() { document.getElementById('sikayetModal').classList.remove('open'); }
function sikayetSebepSec(el, sebep) {

  document.querySelectorAll('.sikayet-sebep-btn').forEach(function(b) { b.classList.remove('selected'); });

}
async function sikayetGonder() {
  if (!seciliSikayetSebep) { alert('Lütfen bir şikayet sebebi seçin!'); return; }
  await sb.from('sikayetler').insert({user_id: currentUser.id, tip: 'ilan', sebep: seciliSikayetSebep, hedef_id: ilanId, hedef_tip: 'ilan', aciklama: document.getElementById('sikayetAciklama').value.trim() || null, durum: 'bekliyor'});
  sikayetKapat(); alert('Şikayetiniz alındı.');
}

function paylas() {
  var kisaUrl = kisaKod
    ? window.location.origin + window.location.pathname.replace(/[^\/]*$/, '') + 'ilan-detay.html#' + kisaKod
    : window.location.href;
  if (navigator.share) {
    navigator.share({title: ilan ? ilan.baslik : 'GoTapu İlanı', text: ilan ? ilan.baslik + ' - ' + Number(ilan.fiyat).toLocaleString('tr-TR') + ' TL' : '', url: kisaUrl});
  } else {
    navigator.clipboard.writeText(kisaUrl);
    alert('Link kopyalandı!\n' + kisaUrl);
  }
}
