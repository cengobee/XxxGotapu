<script>
(function(){
  var k=localStorage.getItem('gotapu_tema');
  if(k==='light') document.body.classList.add('light');
  function ekle(){
    if(document.getElementById('themeToggleBtn')) return;
    var btn=document.createElement('button');
    btn.id='themeToggleBtn'; btn.className='theme-toggle-btn nav-icon-btn'; btn.style.cssText='flex-shrink:0;';
    btn.textContent=document.body.classList.contains('light')?'🌙':'☀️';
    btn.addEventListener('click',function(){
      var a=document.body.classList.toggle('light');
      localStorage.setItem('gotapu_tema',a?'light':'dark'); btn.textContent=a?'🌙':'☀️';
      btn.style.transform='scale(0.8) rotate(20deg)';
      setTimeout(function(){btn.style.transform='';},200);
    });
    var na=document.querySelector('.nav-actions');
    if(na) na.insertBefore(btn,na.firstChild);
  }
  if(document.readyState==='loading') document.addEventListener('DOMContentLoaded',ekle); else ekle();
})();
</script>

/* ── KREDİ ── */
function krediToggle(){
  krediAcikMi=!krediAcikMi;
  var body=document.getElementById('krediBody');
  var arrow=document.getElementById('krediArrow');
  if(krediAcikMi){body.classList.add('acik');arrow.classList.add('acik');krediHesapla();}
  else{body.classList.remove('acik');arrow.classList.remove('acik');}
}
function bankaSeç(i){
  seciliBankaIndex=i;
  bankalar.forEach(function(_,j){var b=document.getElementById('bankaBtn_'+j);if(b)b.classList.remove('secili');});
  var sb2=document.getElementById('bankaBtn_'+i);if(sb2)sb2.classList.add('secili');
  krediHesapla();
}
function vadeDegisti(val){
  var ay=parseInt(val);
  var el=document.getElementById('vadeLabel');
  if(el) el.textContent=ay+' ay'+(ay>=12?' ('+Math.round(ay/12)+' yıl)':'');
  krediHesapla();
}
function pesinatKontrol(){
  var min=Math.round(ilan.fiyat*0.20);
  var inp=document.getElementById('krediPesinat');
  if(!inp) return;
  if((parseFloat(inp.value)||0)<min){inp.value=min;inp.style.borderColor='var(--rust)';setTimeout(function(){inp.style.borderColor='';},1500);}
  krediHesapla();
}
function krediHesapla(){
  var pInp=document.getElementById('krediPesinat');
  var vInp=document.getElementById('vadeSlider');
  var sEl=document.getElementById('krediSonuc');
  if(!pInp||!vInp||!sEl) return;
  var fiyat=parseFloat(ilan.fiyat)||0;
  var pesinat=parseFloat(pInp.value)||0;
  var vade=parseInt(vInp.value)||120;
  var faiz=bankalar[seciliBankaIndex]?bankalar[seciliBankaIndex].faiz:3.49;
  var kredi=fiyat-pesinat;
  if(kredi<=0){sEl.style.display='none';return;}
  var r=faiz/100,n=vade;
  var taksit=r===0?kredi/n:kredi*r*Math.pow(1+r,n)/(Math.pow(1+r,n)-1);
  var toplam=taksit*n;
  var faizMaliyet=toplam-kredi;
  document.getElementById('sonucKrediTutar').textContent=Math.round(kredi).toLocaleString('tr-TR')+' ₺';
  document.getElementById('sonucFaiz').textContent='%'+faiz.toFixed(2)+' / ay';
  document.getElementById('sonucVade').textContent=vade+' ay';
  document.getElementById('sonucTaksit').textContent=Math.round(taksit).toLocaleString('tr-TR')+' ₺';
  document.getElementById('sonucToplam').textContent=Math.round(toplam).toLocaleString('tr-TR')+' ₺';
  document.getElementById('sonucFaizMaliyet').textContent=Math.round(faizMaliyet).toLocaleString('tr-TR')+' ₺';
  sEl.style.display='block';
}

/* ── LİGHTBOX ── */
var lbIdx=0,lbTX=0,lbTY=0,lbSwipe=false;
function lightboxAc(i){
  var g=document.getElementById('lightboxGaleri');
  g.innerHTML=tumFotolar.map(function(f){
    return '<div class="lightbox-item"><img src="'+f.url+'">'+(f.ad?'<div class="lightbox-oda-etiket">'+f.em+' '+f.ad+'</div>':'')+'</div>';
  }).join('');
  lbIdx=i; lbSayacGuncelle();
  document.getElementById('lightbox').classList.add('open');
  g.style.scrollSnapType='none'; g.style.overflow='hidden';
  g.scrollLeft=i*window.innerWidth;
  g.ontouchstart=function(e){lbTX=e.touches[0].clientX;lbTY=e.touches[0].clientY;lbSwipe=true;};
  g.ontouchend=function(e){
    if(!lbSwipe) return; lbSwipe=false;
    var dx=lbTX-e.changedTouches[0].clientX;
    var dy=lbTY-e.changedTouches[0].clientY;
    if(Math.abs(dy)>Math.abs(dx)&&Math.abs(dy)>60){lightboxKapat();return;}
    if(Math.abs(dx)>40){
      if(dx>0&&lbIdx<tumFotolar.length-1) lbIdx++;
      else if(dx<0&&lbIdx>0) lbIdx--;
      lbGit(lbIdx);
    }
  };
}
function lbGit(i){lbIdx=i;document.getElementById('lightboxGaleri').scrollTo({left:i*window.innerWidth,behavior:'smooth'});lbSayacGuncelle();}
function lbSayacGuncelle(){
  var f=tumFotolar[lbIdx];
  var et=f&&f.ad?f.em+' '+f.ad+' · ':'';
  document.getElementById('lightboxSayac').textContent=et+(lbIdx+1)+' / '+tumFotolar.length;
}
function lightboxKapat(){document.getElementById('lightbox').classList.remove('open');}

/* ── FAVORİ ── */
async function favoriToggle(){
  if(!currentUser){girisGerekli();return;}
  var btn=document.getElementById('favBtn');
  if(favori){
    await sb.from('favoriler').delete().eq('user_id',currentUser.id).eq('ilan_id',ilanId);
    favori=false; btn.textContent='🤍'; showToast('Favorilerden çıkarıldı');
  }else{
    await sb.from('favoriler').insert({user_id:currentUser.id,ilan_id:ilanId});
    favori=true; btn.textContent='❤️'; btn.style.transform='scale(1.3)';
    setTimeout(function(){btn.style.transform='';},300);
    showToast('Favorilere eklendi! <a href="favoriler.html" style="color:var(--gold);font-weight:800;text-decoration:none">Görüntüle</a>');
    if(ilan.user_id&&ilan.user_id!==currentUser.id){
      await sb.from('bildirimler').insert({user_id:ilan.user_id,tip:'favori',baslik:'İlanınız favorilere eklendi!',mesaj:'"'+ilan.baslik+'" ilanınız favorilere eklendi.',ilan_id:ilanId,okundu:false});
    }
  }
}
function showToast(msg){
  var t=document.getElementById('favToast');
  t.innerHTML=msg; t.classList.add('show');
  setTimeout(function(){t.classList.remove('show');},3000);
}

/* ── DİĞER ── */
function mesajGonder(){if(!ilan) return;if(!currentUser){girisGerekli();return;}window.location.href='mesajlar.html?ilan_id='+ilan.id+'&karsi_id='+ilan.user_id;}
function telefon(){if(!currentUser){girisGerekli();return;}var tel=ilan&&ilan.profiles&&ilan.profiles.phone?ilan.profiles.phone:null;if(tel)window.location.href='tel:'+tel;else alert('Bu ilanda telefon numarası bulunmuyor.');}
function haritaAc(){window.open('https://www.google.com/maps/search/'+encodeURIComponent(ilan?ilan.konum||'':''),'_blank');}
async function sokakGorunumuAc(){
  var konum=ilan?ilan.konum||'':'';
  if(!konum){alert('Konum bilgisi bulunamadı.');return;}
  try{
    // Nominatim ile koordinat al (ücretsiz, API key gerektirmez)
    var url='https://nominatim.openstreetmap.org/search?q='+encodeURIComponent(konum+', Türkiye')+'&format=json&limit=1';
    var res=await fetch(url,{headers:{'Accept-Language':'tr'}});
    var data=await res.json();
    if(data&&data.length>0){
      var lat=parseFloat(data[0].lat);
      var lon=parseFloat(data[0].lon);
      // Google Maps Street View — koordinatla açılınca direkt sokak içi görünümü gelir
      window.open('https://www.google.com/maps/@?api=1&map_action=pano&viewpoint='+lat+','+lon,'_blank');
    } else {
      // Koordinat bulunamazsa yine de dene, Google Maps kendisi bulsun
      window.open('https://www.google.com/maps/@?api=1&map_action=pano&query='+encodeURIComponent(konum),'_blank');
    }
  }catch(e){
    window.open('https://www.google.com/maps/@?api=1&map_action=pano&query='+encodeURIComponent(konum),'_blank');
  }
}

function sikayetAc(){if(!currentUser){girisGerekli();return;}seciliSikayetSebep=null;document.querySelectorAll('.sikayet-sebep-btn').forEach(function(b){b.classList.remove('selected');});document.getElementById('sikayetAciklama').value='';document.getElementById('sikayetModal').classList.add('open');}
function sikayetKapat(){document.getElementById('sikayetModal').classList.remove('open');}
function sikayetSebepSec(el,sebep){seciliSikayetSebep=sebep;document.querySelectorAll('.sikayet-sebep-btn').forEach(function(b){b.classList.remove('selected');});el.classList.add('selected');}
async function sikayetGonder(){if(!seciliSikayetSebep){alert('Lütfen bir şikayet sebebi seçin!');return;}await sb.from('sikayetler').insert({user_id:currentUser.id,tip:'ilan',sebep:seciliSikayetSebep,hedef_id:ilanId,hedef_tip:'ilan',aciklama:document.getElementById('sikayetAciklama').value.trim()||null,durum:'bekliyor'});sikayetKapat();alert('Şikayetiniz alındı.');}

function paylas(){
  var url=kisaKod?window.location.origin+window.location.pathname.replace(/[^\/]*$/,'')+'/ilan-detay.html#'+kisaKod:window.location.href;
  if(navigator.share) navigator.share({title:ilan?ilan.baslik:'GoTapu',text:ilan?ilan.baslik+' - '+Number(ilan.fiyat).toLocaleString('tr-TR')+' ₺':'',url:url});

}
