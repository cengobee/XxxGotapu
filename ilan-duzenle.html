<style>
  .form-group { margin-bottom: 16px; }
  .form-label { font-size: 13px; font-weight: 800; color: var(--text2); margin-bottom: 8px; display: block; }
  .bolum-baslik {
    font-size: 13px; font-weight: 900; color: var(--text3);
    letter-spacing: 1px; text-transform: uppercase;
    margin: 20px 0 12px; padding-bottom: 8px;
    border-bottom: 1px solid var(--border);
  }
  .type-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .type-btn {
    padding: 10px 14px; border-radius: var(--radius-sm);
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text2); font-family: 'Nunito',sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s;
  }
  .type-btn.active { background: rgba(245,200,66,0.1); border-color: var(--gold); color: var(--gold); }
  .sec-row { display: flex; gap: 8px; flex-wrap: wrap; }
  .sec-btn {
    padding: 8px 14px; border-radius: 50px;
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text2); font-family: 'Nunito',sans-serif;
    font-size: 13px; font-weight: 700; cursor: pointer; transition: all .2s; flex-shrink: 0;
  }
  .sec-btn.active { background: rgba(245,200,66,0.1); border-color: var(--gold); color: var(--gold); }
  .two-col { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
  .foto-mevcut { display: flex; gap: 8px; flex-wrap: wrap; margin-bottom: 10px; }
  .foto-thumb { position: relative; width: 80px; height: 80px; }
  .foto-thumb img { width: 80px; height: 80px; border-radius: 10px; object-fit: cover; border: 2px solid var(--border); }
  .foto-remove {
    position: absolute; top: -6px; right: -6px;
    width: 20px; height: 20px; border-radius: 50%;
    background: var(--rust); color: white; border: none;
    font-size: 12px; cursor: pointer; display: flex;
    align-items: center; justify-content: center; font-weight: 900;
  }
  .foto-add-btn {
    width: 80px; height: 80px; border-radius: 10px;
    background: var(--card); border: 2px dashed var(--border);
    display: flex; align-items: center; justify-content: center;
    font-size: 28px; cursor: pointer; flex-shrink: 0;
  }
  .one-cikan-bar {
    display: flex; align-items: center; justify-content: space-between;
    background: var(--card); border: 1px solid var(--border);
    border-radius: var(--radius-sm); padding: 14px 16px; margin-bottom: 16px;
  }
  .one-cikan-bar.aktif { border-color: rgba(245,200,66,0.4); background: rgba(245,200,66,0.05); }
  .toggle {
    width: 48px; height: 26px; border-radius: 13px;
    background: var(--border); position: relative;
    cursor: pointer; transition: background .2s; border: none; flex-shrink: 0;
  }
  .toggle.on { background: var(--gold); }
  .toggle::after {
    content: ''; position: absolute; top: 3px; left: 3px;
    width: 20px; height: 20px; border-radius: 50%;
    background: white; transition: left .2s;
  }
  .toggle.on::after { left: 25px; }
  .danger-zone {
    background: rgba(232,96,58,0.05); border: 1px solid rgba(232,96,58,0.2);
    border-radius: var(--radius); padding: 16px; margin-top: 20px;
  }
</style>

async function ilanYukle() {
  const { data, error } = await sb.from('ilanlar').select('*').eq('id', ilanId).single();

    document.getElementById('icerik').innerHTML = '<div class="empty"><div class="empty-icon">😕</div><div class="empty-title">İlan bulunamadı</div></div>';

    <div class="bolum-baslik">🏢 Dış Özellikler & Site</div>

    <div class="form-group">
      <div class="sec-row" id="disOzellikler">
        ${['🛗 Asansör','🅿️ Otopark (Kapalı)','🚗 Otopark (Açık)','🏊 Yüzme Havuzu','🏋️ Spor Salonu','👮 Güvenlik/Kapıcı','📷 Kamera Sistemi','🌳 Yeşil Alan','🏸 Tenis Kortu','⚽ Spor Alanı','🧒 Çocuk Parkı','🧹 Temizlik Hizmeti','🛁 Sauna/Hamam','🏪 Site İçi Market'].map(s=>`

function toggleOneCikan() {
  oneCikan = !oneCikan;
  document.getElementById('oneCikanToggle').classList.toggle('on', oneCikan);
  document.getElementById('oneCikanBar').classList.toggle('aktif', oneCikan);
  const yazi = document.getElementById('oneCikanAktifYazi');
  if (yazi) yazi.style.display = oneCikan ? 'block' : 'none';
}

function fotoGuncelle() {
  const container = document.getElementById('fotoContainer');
  if (!container) return;
  container.innerHTML =
    mevcutFotolar.map((url, i) => `
      <div class="foto-thumb">
        <img src="${url}">
        <button class="foto-remove" onclick="mevcutFotoSil(${i})">✕</button>
      </div>`).join('') +
    yeniFotolar.map((file, i) => {
      const objUrl = URL.createObjectURL(file);
      return `<div class="foto-thumb">
        <img src="${objUrl}">
        <button class="foto-remove" onclick="yeniFotoSil(${i})">✕</button>
      </div>`;
    }).join('') +
    `<div class="foto-add-btn" onclick="document.getElementById('yeniFotoInput').click()">+</div>`;
}

function mevcutFotoSil(i) { mevcutFotolar.splice(i,1); fotoGuncelle(); }
function yeniFotoSil(i)   { yeniFotolar.splice(i,1);   fotoGuncelle(); }
function yeniFotoEkle(input) {
  Array.from(input.files).forEach(f => { if (mevcutFotolar.length+yeniFotolar.length < 10) yeniFotolar.push(f); });
  input.value = ''; fotoGuncelle();
}

function secTip(el, tip) {
  document.querySelectorAll('.type-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active'); seciliTip = tip;
}
function secBtn(el, grupId) {
  document.getElementById(grupId).querySelectorAll('.sec-btn').forEach(b => b.classList.remove('active'));
  el.classList.add('active');
}
function secBtnCoklu(el) { el.classList.toggle('active'); }

function getSecim(grupId) {
  const el = document.getElementById(grupId);
  if (!el) return null;
  const a = el.querySelector('.sec-btn.active');
  return a ? a.textContent.trim() : null;
}
function getCokluSecim(grupId) {
  const el = document.getElementById(grupId);
  if (!el) return [];
  return Array.from(el.querySelectorAll('.sec-btn.active')).map(b => b.textContent.trim());
}

async function kaydet() {
  const baslik = document.getElementById('baslik').value.trim();
  const fiyat  = document.getElementById('fiyat').value;
  const konum  = document.getElementById('konum').value.trim();
  const errEl  = document.getElementById('ilanError');

  if (!baslik || !fiyat || !konum) {
    errEl.textContent = '⚠️ Başlık, fiyat ve konum zorunludur!';
    errEl.style.display = 'block'; return;
  }

  const btn = document.getElementById('kaydetBtn');
  btn.textContent = '⏳ Kaydediliyor...'; btn.disabled = true;

  for (let i = 0; i < yeniFotolar.length; i++) {
    const file = yeniFotolar[i];
    const fileName = `${currentUser.id}/${Date.now()}_${i}_${file.name}`;
    btn.textContent = `⏳ Fotoğraf yükleniyor ${i+1}/${yeniFotolar.length}...`;
    const { data: ud } = await sb.storage.from('ilan-fotograflar').upload(fileName, file);
    if (ud) {
      const { data: url } = sb.storage.from('ilan-fotograflar').getPublicUrl(fileName);
      mevcutFotolar.push(url.publicUrl);
    }
  }

  const kriterler = {
    emlak_tipi:      getSecim('emlakTipi'),
    oda_sayisi:      getSecim('odaSayisi'),
    banyo_sayisi:    getSecim('banyoSayisi'),
    kat:             document.getElementById('katSec').value || null,
    kat_sayisi:      document.getElementById('katSayisi').value || null,
    bina_yasi:       getSecim('binaYasi'),
    isitma:          getSecim('isitma'),
    cephe:           getCokluSecim('cephe'),
    kullanim_durumu: getSecim('kullanimDurumu'),
    tapu_durumu:     getSecim('tapuDurumu'),
    esya_durumu:     getSecim('esyaDurumu'),
    site_icinde:     getSecim('siteIcinde'),
    aidat:           getSecim('aidatDurumu'),
    ic_ozellikler:   getCokluSecim('icOzellikler'),
    dis_ozellikler:  getCokluSecim('disOzellikler'),
  };

  const { error } = await sb.from('ilanlar').update({
    baslik, fiyat: Number(fiyat), tip: seciliTip, konum,
    oda_sayisi:  getSecim('odaSayisi') || null,
    metrekare:   document.getElementById('m2net').value ? Number(document.getElementById('m2net').value) : null,
    aciklama:    document.getElementById('aciklama').value.trim() || null,
    foto_url:    mevcutFotolar[0] || null,
    foto_urls:   mevcutFotolar.length > 0 ? mevcutFotolar : null,
    one_cikan:   oneCikan,
    onay_durumu: 'bekliyor', // düzenlenince tekrar admin onayına gönder
    kriterler
  }).eq('id', ilanId).eq('user_id', currentUser.id);

  if (error) {
    errEl.textContent = 'Hata: ' + error.message;
    errEl.style.display = 'block';
    btn.textContent = '✅ Değişiklikleri Kaydet'; btn.disabled = false; return;
  }
  alert('✅ İlan güncellendi! Admin onayına gönderildi.');
  window.location.href = 'profil.html';
}

async function ilanSil() {
  if (!confirm('Bu ilanı kalıcı olarak silmek istediğinizden emin misiniz?')) return;
  await sb.from('ilanlar').delete().eq('id', ilanId).eq('user_id', currentUser.id);
  alert('İlan silindi!');
  window.location.href = 'profil.html';
}
