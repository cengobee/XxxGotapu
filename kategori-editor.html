<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>GoTapu — Kategori Editörü</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@400;600;700;800&display=swap');

  :root {
    --bg: #0f0f0f;
    --surface: #1a1a1a;
    --surface2: #242424;
    --border: #2e2e2e;
    --accent: #e8ff3c;
    --accent2: #ff6b35;
    --text: #f0f0f0;
    --text2: #888;
    --text3: #555;
    --red: #ff4444;
    --green: #44ff88;
    --blue: #4488ff;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Syne', sans-serif;
    min-height: 100vh;
    display: flex;
    flex-direction: column;
    overflow-x: hidden;
  }

  /* HEADER */
  header {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 12px 16px;
    display: flex;
    align-items: center;
    gap: 10px;
    position: sticky;
    top: 0;
    z-index: 100;
    flex-wrap: wrap;
  }
  .logo {
    font-size: 18px;
    font-weight: 800;
    color: var(--accent);
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .logo span { color: var(--text2); font-weight: 400; font-size: 12px; margin-left: 6px; }
  header .actions { margin-left: auto; display: flex; gap: 6px; flex-wrap: wrap; }

  /* BUTTONS */
  .btn {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 7px 12px;
    border: 1px solid var(--border);
    background: var(--surface2);
    color: var(--text);
    border-radius: 6px;
    cursor: pointer;
    transition: all 0.15s;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .btn:hover, .btn:active { border-color: var(--text2); background: #2e2e2e; }
  .btn.accent { background: var(--accent); color: #000; border-color: var(--accent); font-weight: 700; }
  .btn.accent:hover, .btn.accent:active { background: #d4eb00; }
  .btn.danger { border-color: var(--red); color: var(--red); }
  .btn.danger:hover, .btn.danger:active { background: var(--red); color: #000; }
  .btn.success { border-color: var(--green); color: var(--green); }
  .btn.success:hover, .btn.success:active { background: var(--green); color: #000; }
  .btn.small { padding: 5px 9px; font-size: 11px; }
  .btn.icon-btn { padding: 7px 10px; }

  /* MOBILE TAB BAR */
  .mobile-tabs {
    display: none;
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 0;
    position: sticky;
    top: 57px;
    z-index: 99;
  }
  .mobile-tabs button {
    flex: 1;
    padding: 11px 0;
    background: transparent;
    border: none;
    border-bottom: 2px solid transparent;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    cursor: pointer;
    transition: all 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .mobile-tabs button.active {
    color: var(--accent);
    border-bottom-color: var(--accent);
  }

  /* MAIN LAYOUT */
  .main {
    display: grid;
    grid-template-columns: 300px 1fr;
    flex: 1;
    height: calc(100vh - 57px);
    overflow: hidden;
  }

  /* LEFT PANEL — TREE */
  .tree-panel {
    background: var(--surface);
    border-right: 1px solid var(--border);
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .panel-header {
    padding: 10px 12px;
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-shrink: 0;
  }
  .panel-header .ph-actions { margin-left: auto; display: flex; gap: 6px; }

  .tree-scroll { flex: 1; overflow-y: auto; padding: 6px 0; -webkit-overflow-scrolling: touch; }
  .tree-scroll::-webkit-scrollbar { width: 3px; }
  .tree-scroll::-webkit-scrollbar-track { background: transparent; }
  .tree-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  /* SEARCH */
  .tree-search {
    padding: 8px 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .tree-search input {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 5px;
    color: var(--text);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    padding: 6px 8px;
    outline: none;
  }
  .tree-search input:focus { border-color: var(--accent); }

  /* TREE NODES */
  .tree-node { user-select: none; }
  .node-row {
    display: flex;
    align-items: center;
    padding: 0 8px;
    height: 38px;
    cursor: pointer;
    transition: background 0.1s;
    position: relative;
    -webkit-tap-highlight-color: transparent;
  }
  .node-row:hover, .node-row:active { background: var(--surface2); }
  .node-row.selected { background: #1e2a00; border-left: 2px solid var(--accent); }
  .node-row.selected .node-label { color: var(--accent); }

  .node-toggle {
    width: 18px;
    height: 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--text3);
    font-size: 10px;
    flex-shrink: 0;
    transition: transform 0.15s;
  }
  .node-toggle.open { transform: rotate(90deg); }
  .node-toggle.leaf { opacity: 0; pointer-events: none; }

  .node-label {
    font-size: 12px;
    color: var(--text);
    flex: 1;
    overflow: hidden;
    text-overflow: ellipsis;
    white-space: nowrap;
  }
  .node-label.level-0 { font-weight: 800; font-size: 13px; color: var(--accent2); }
  .node-label.level-1 { font-weight: 700; color: var(--text); }
  .node-label.level-2 { font-weight: 600; color: var(--text2); }
  .node-label.level-3 { font-weight: 400; color: var(--text3); font-size: 11px; }

  .node-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    color: var(--text3);
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 3px;
    padding: 1px 4px;
    flex-shrink: 0;
    margin-right: 4px;
  }
  .node-row:hover .node-actions, .node-row.selected .node-actions { display: flex; }
  .node-actions {
    display: none;
    gap: 3px;
    flex-shrink: 0;
  }
  .node-action-btn {
    width: 22px; height: 22px;
    background: transparent;
    border: 1px solid var(--border);
    border-radius: 3px;
    color: var(--text2);
    font-size: 11px;
    cursor: pointer;
    display: flex; align-items: center; justify-content: center;
    transition: all 0.1s;
    -webkit-tap-highlight-color: transparent;
  }
  .node-action-btn:hover, .node-action-btn:active { background: var(--surface2); color: var(--text); border-color: var(--text2); }
  .node-action-btn.del:hover, .node-action-btn.del:active { background: var(--red); color: #000; border-color: var(--red); }

  .tree-children { display: none; }
  .tree-children.open { display: block; }

  .highlight { background: #2a2a00; }

  /* RIGHT PANEL — EDITOR */
  .editor-panel {
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .editor-scroll {
    flex: 1;
    overflow-y: auto;
    padding: 20px;
    -webkit-overflow-scrolling: touch;
  }
  .editor-scroll::-webkit-scrollbar { width: 3px; }
  .editor-scroll::-webkit-scrollbar-track { background: transparent; }
  .editor-scroll::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .empty-state {
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    height: 100%;
    color: var(--text3);
    font-family: 'DM Mono', monospace;
    font-size: 12px;
    gap: 8px;
    text-align: center;
    padding: 20px;
  }
  .empty-state .big { font-size: 44px; }

  /* EDITOR SECTIONS */
  .ed-section {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px;
    margin-bottom: 14px;
    overflow: hidden;
  }
  .ed-section-title {
    padding: 9px 14px;
    background: var(--surface2);
    border-bottom: 1px solid var(--border);
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 1px;
    display: flex;
    align-items: center;
    gap: 8px;
    flex-wrap: wrap;
  }
  .ed-section-body { padding: 14px; }

  .form-row {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 10px;
  }
  .form-row.full { grid-template-columns: 1fr; }

  .form-group { display: flex; flex-direction: column; gap: 4px; }
  .form-group label {
    font-size: 10px;
    font-family: 'DM Mono', monospace;
    color: var(--text2);
    text-transform: uppercase;
    letter-spacing: 0.5px;
  }
  .form-group input,
  .form-group select,
  .form-group textarea {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 13px;
    padding: 8px 10px;
    transition: border-color 0.15s;
    outline: none;
    -webkit-appearance: none;
  }
  .form-group input:focus,
  .form-group select:focus,
  .form-group textarea:focus { border-color: var(--accent); }
  .form-group select option { background: var(--surface); }

  /* FIELDS EDITOR */
  .fields-list { display: flex; flex-direction: column; gap: 5px; }
  .field-item {
    display: flex;
    align-items: center;
    gap: 7px;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    padding: 8px 10px;
    transition: border-color 0.15s;
  }
  .field-item:hover { border-color: var(--text3); }
  .field-drag { cursor: grab; color: var(--text3); font-size: 13px; flex-shrink: 0; touch-action: none; }
  .field-item input {
    flex: 1;
    background: transparent;
    border: none;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    outline: none;
    min-width: 0;
  }
  .field-item input::placeholder { color: var(--text3); }
  .field-type-badge {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    padding: 2px 6px;
    border-radius: 3px;
    border: 1px solid;
    flex-shrink: 0;
    cursor: pointer;
    white-space: nowrap;
    -webkit-tap-highlight-color: transparent;
  }
  .field-type-badge.text { color: var(--blue); border-color: var(--blue); }
  .field-type-badge.select { color: var(--accent); border-color: var(--accent); }
  .field-type-badge.number { color: var(--accent2); border-color: var(--accent2); }
  .field-type-badge.bool { color: var(--green); border-color: var(--green); }
  .field-options-row {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--text3);
    padding: 3px 10px 6px 34px;
    border-left: 1px solid var(--border);
    margin-left: 10px;
    margin-top: -2px;
    margin-bottom: 2px;
  }
  .field-options-row input {
    background: transparent;
    border: none;
    border-bottom: 1px dashed var(--border);
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    width: 100%;
    outline: none;
    padding: 2px 0;
  }

  .add-field-row {
    display: flex;
    gap: 7px;
    margin-top: 8px;
    align-items: center;
    flex-wrap: wrap;
  }
  .add-field-row input {
    flex: 1;
    min-width: 120px;
    background: var(--bg);
    border: 1px dashed var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 12px;
    padding: 7px 10px;
    outline: none;
    transition: border-color 0.15s;
  }
  .add-field-row input:focus { border-color: var(--accent); border-style: solid; }
  .add-field-row select {
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 6px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 11px;
    padding: 7px 8px;
    outline: none;
    cursor: pointer;
    -webkit-appearance: none;
  }

  /* BREADCRUMB */
  .breadcrumb {
    padding: 10px 20px 0;
    display: flex;
    align-items: center;
    gap: 5px;
    flex-wrap: wrap;
    flex-shrink: 0;
  }
  .breadcrumb span {
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    color: var(--text3);
  }
  .breadcrumb span.crumb {
    color: var(--text2);
    cursor: pointer;
  }
  .breadcrumb span.crumb:hover { color: var(--text); }
  .breadcrumb span.sep { color: var(--text3); }
  .breadcrumb span.current { color: var(--accent); font-weight: 500; }

  /* MODAL */
  .modal-overlay {
    position: fixed; inset: 0;
    background: rgba(0,0,0,0.75);
    display: none;
    align-items: flex-end;
    justify-content: center;
    z-index: 999;
    backdrop-filter: blur(4px);
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 16px 16px 0 0;
    padding: 24px 20px;
    width: 100%;
    max-width: 480px;
    animation: slideUp 0.2s ease;
  }
  @keyframes slideUp {
    from { transform: translateY(100%); }
    to { transform: translateY(0); }
  }
  .modal-handle {
    width: 36px; height: 4px;
    background: var(--border);
    border-radius: 2px;
    margin: 0 auto 16px;
  }
  .modal h3 {
    font-size: 16px;
    font-weight: 700;
    margin-bottom: 4px;
  }
  .modal p {
    font-size: 11px;
    color: var(--text2);
    font-family: 'DM Mono', monospace;
    margin-bottom: 14px;
  }
  .modal input, .modal select {
    width: 100%;
    background: var(--bg);
    border: 1px solid var(--border);
    border-radius: 8px;
    color: var(--text);
    font-family: 'Syne', sans-serif;
    font-size: 14px;
    padding: 12px 14px;
    outline: none;
    margin-bottom: 12px;
    -webkit-appearance: none;
  }
  .modal input:focus, .modal select:focus { border-color: var(--accent); }
  .modal .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 4px; }

  /* JSON PANEL */
  .json-panel {
    position: fixed;
    bottom: 0; left: 0; right: 0;
    height: 0;
    background: var(--surface);
    border-top: 2px solid var(--accent);
    transition: height 0.25s cubic-bezier(0.4,0,0.2,1);
    z-index: 200;
    display: flex;
    flex-direction: column;
    overflow: hidden;
  }
  .json-panel.open { height: 60vh; }
  .json-panel-header {
    padding: 10px 14px;
    display: flex;
    align-items: center;
    gap: 10px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0;
  }
  .json-panel-title {
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    color: var(--accent);
    font-weight: 500;
  }
  .json-textarea {
    flex: 1;
    background: var(--bg);
    border: none;
    color: #7ec8e3;
    font-family: 'DM Mono', monospace;
    font-size: 10px;
    padding: 14px;
    resize: none;
    outline: none;
    line-height: 1.6;
    overflow-y: auto;
    -webkit-overflow-scrolling: touch;
  }

  /* TOAST */
  .toast {
    position: fixed;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%) translateY(80px);
    background: var(--accent);
    color: #000;
    font-family: 'DM Mono', monospace;
    font-size: 11px;
    font-weight: 500;
    padding: 10px 18px;
    border-radius: 20px;
    transition: transform 0.25s;
    z-index: 9999;
    pointer-events: none;
    white-space: nowrap;
  }
  .toast.show { transform: translateX(-50%) translateY(0); }

  .drag-over { background: #1a2200 !important; border-color: var(--accent) !important; }

  ::-webkit-scrollbar { width: 3px; height: 3px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 2px; }

  .path-tag {
    font-family: 'DM Mono', monospace;
    font-size: 9px;
    background: var(--surface2);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 2px 6px;
    color: var(--text3);
    margin-left: auto;
  }

  .required-toggle {
    width: 28px; height: 14px;
    background: var(--border);
    border-radius: 7px;
    cursor: pointer;
    position: relative;
    flex-shrink: 0;
    transition: background 0.15s;
    -webkit-tap-highlight-color: transparent;
  }
  .required-toggle.on { background: var(--accent); }
  .required-toggle::after {
    content: '';
    position: absolute;
    left: 2px; top: 2px;
    width: 10px; height: 10px;
    background: #fff;
    border-radius: 50%;
    transition: left 0.15s;
  }
  .required-toggle.on::after { left: 16px; }

  /* MOBILE RESPONSIVE */
  @media (max-width: 640px) {
    header { padding: 10px 14px; top: 0; }
    .logo { font-size: 16px; }
    .logo span { display: none; }
    header .actions .btn:not(.accent):not(.success) { display: none; }
    header .actions .btn.json-btn { display: flex; }

    .mobile-tabs { display: flex; top: 49px; }

    .main {
      grid-template-columns: 1fr;
      height: auto;
      min-height: calc(100vh - 93px);
      overflow: visible;
    }

    .tree-panel {
      height: calc(100vh - 93px);
      border-right: none;
      border-bottom: 1px solid var(--border);
      display: flex;
    }
    .tree-panel.mobile-hidden { display: none; }

    .editor-panel {
      height: auto;
      min-height: calc(100vh - 93px);
    }
    .editor-panel.mobile-hidden { display: none; }
    .editor-scroll { padding: 14px; overflow: visible; height: auto; }

    .breadcrumb { padding: 10px 14px 0; }

    .form-row { grid-template-columns: 1fr; }

    .json-panel.open { height: 70vh; }

    .modal-overlay { align-items: flex-end; }
    .modal { border-radius: 16px 16px 0 0; max-width: 100%; }

    .node-actions { display: flex !important; }
  }
</style>
</head>
<body>

<header>
  <div class="logo">GoTapu <span>Kategori Editörü</span></div>
  <div class="actions">
    <button class="btn json-btn" onclick="toggleJson()">{ } JSON</button>
    <button class="btn" onclick="importJson()">↑ Aktar</button>
    <button class="btn success" onclick="exportJson()">↓ İndir</button>
    <button class="btn accent" onclick="saveAll()">✓ Kaydet</button>
  </div>
</header>

<div class="mobile-tabs" id="mobileTabs">
  <button class="active" onclick="showMobilePanel('tree')" id="tabTree">🌳 Ağaç</button>
  <button onclick="showMobilePanel('editor')" id="tabEditor">✏️ Düzenle</button>
</div>

<div class="main">
  <!-- LEFT: TREE -->
  <div class="tree-panel" id="treePanel">
    <div class="panel-header">
      Kategori Ağacı
      <div class="ph-actions">
        <button class="btn small" onclick="openAddModal(null)">+ Ana</button>
      </div>
    </div>
    <div class="tree-search">
      <input type="text" id="searchInput" placeholder="Kategori ara..." oninput="filterTree(this.value)" />
    </div>
    <div class="tree-scroll" id="treeRoot"></div>
  </div>

  <!-- RIGHT: EDITOR -->
  <div class="editor-panel mobile-hidden" id="editorPanel">
    <div class="breadcrumb" id="breadcrumb"></div>
    <div class="editor-scroll" id="editorContent">
      <div class="empty-state">
        <div class="big">🗂</div>
        <div>Soldan bir kategori seç</div>
        <div style="color:#333; margin-top:4px; font-size:11px">veya + Ana'ya tıkla</div>
      </div>
    </div>
  </div>
</div>

<!-- JSON PANEL -->
<div class="json-panel" id="jsonPanel">
  <div class="json-panel-header">
    <span class="json-panel-title">JSON ÇIKTI</span>
    <button class="btn small" onclick="copyJson()">Kopyala</button>
    <button class="btn small danger" onclick="toggleJson()">✕</button>
  </div>
  <textarea class="json-textarea" id="jsonTextarea" readonly></textarea>
</div>

<!-- MODAL -->
<div class="modal-overlay" id="modalOverlay">
  <div class="modal">
    <div class="modal-handle"></div>
    <h3 id="modalTitle">Yeni Kategori</h3>
    <p id="modalDesc">Ana kategori ekle</p>
    <input type="text" id="modalInput" placeholder="Kategori adı..." />
    <div class="modal-actions">
      <button class="btn" onclick="closeModal()">İptal</button>
      <button class="btn accent" onclick="confirmModal()">Ekle</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast"></div>

<!-- IMPORT INPUT -->
<input type="file" id="importFile" accept=".json" style="display:none" onchange="handleImport(event)">

<script>
// ─── INITIAL DATA ─────────────────────────────────────────────────────────────
const INITIAL_DATA = {
  categories: [
    {
      id:"cat_emlak", name:"Emlak", _open:true, children:[
        {
          id:"cat_konut", name:"Konut", _open:true, children:[
            {
              id:"cat_satilik", name:"Satılık", _open:false, children:[

function showMobilePanel(panel) {
  const treePanel = document.getElementById('treePanel');
  const editorPanel = document.getElementById('editorPanel');
  const tabTree = document.getElementById('tabTree');
  const tabEditor = document.getElementById('tabEditor');

  if (panel === 'tree') {
    treePanel.classList.remove('mobile-hidden');
    editorPanel.classList.add('mobile-hidden');
    tabTree.classList.add('active');
    tabEditor.classList.remove('active');
  } else {
    treePanel.classList.add('mobile-hidden');
    editorPanel.classList.remove('mobile-hidden');
    tabTree.classList.remove('active');
    tabEditor.classList.add('active');
  }
}

// ─── UTILS ───────────────────────────────────────────────────────────────────
function uid() { return Math.random().toString(36).slice(2, 9); }

function findNode(id, nodes) {
  for (const n of nodes) {
    if (n.id === id) return n;
    if (n.children) { const f = findNode(id, n.children); if (f) return f; }
  }
  return null;
}

function findParent(id, nodes, parent = null) {
  for (const n of nodes) {
    if (n.id === id) return parent;
    if (n.children) { const f = findParent(id, n.children, n); if (f !== undefined) return f; }
  }
  return undefined;
}

function deleteNode(id, nodes) {
  for (let i = 0; i < nodes.length; i++) {
    if (nodes[i].id === id) { nodes.splice(i, 1); return true; }
    if (nodes[i].children && deleteNode(id, nodes[i].children)) return true;
  }
  return false;
}

function getPath(id, nodes, path = []) {
  for (const n of nodes) {
    if (n.id === id) return [...path, n];
    if (n.children) { const f = getPath(id, n.children, [...path, n]); if (f) return f; }
  }
  return null;
}

function getDepth(id, nodes, depth = 0) {
  for (const n of nodes) {
    if (n.id === id) return depth;
    if (n.children) { const d = getDepth(id, n.children, depth + 1); if (d !== -1) return d; }
  }
  return -1;
}

function countDescendants(node) {
  if (!node.children || !node.children.length) return 0;
  return node.children.reduce((s, c) => s + 1 + countDescendants(c), 0);
}

function matchesSearch(node, q) {
  if (!q) return true;
  const lq = q.toLowerCase();
  if (node.name.toLowerCase().includes(lq)) return true;
  if (node.children) return node.children.some(c => matchesSearch(c, q));
  return false;
}

// ─── SEARCH ──────────────────────────────────────────────────────────────────
function filterTree(q) {
  searchQuery = q;
  renderTree();
}

// ─── RENDER TREE ─────────────────────────────────────────────────────────────
function renderTree() {
  const root = document.getElementById('treeRoot');
  root.innerHTML = '';
  data.categories.forEach(n => {
    if (matchesSearch(n, searchQuery)) {
      root.appendChild(buildNode(n, 0));
    }
  });
}

function buildNode(node, level) {
  const wrapper = document.createElement('div');
  wrapper.className = 'tree-node';
  wrapper.dataset.id = node.id;

  const hasChildren = node.children && node.children.length > 0;
  const isOpen = node._open !== false || searchQuery;
  const isSelected = node.id === selectedId;

  const row = document.createElement('div');
  row.className = 'node-row' + (isSelected ? ' selected' : '');
  if (searchQuery && node.name.toLowerCase().includes(searchQuery.toLowerCase())) {
    row.classList.add('highlight');
  }
  row.style.paddingLeft = (8 + level * 14) + 'px';

  const toggle = document.createElement('div');
  toggle.className = 'node-toggle' + (hasChildren ? (isOpen ? ' open' : '') : ' leaf');
  toggle.innerHTML = '▶';
  toggle.onclick = (e) => { e.stopPropagation(); node._open = !isOpen; renderTree(); };

  const label = document.createElement('div');
  label.className = `node-label level-${Math.min(level, 3)}`;
  label.textContent = node.name;

  const desc = countDescendants(node);
  const badge = document.createElement('div');
  badge.className = 'node-badge';
  badge.textContent = desc > 0 ? `${desc}` : ((node.fields ? node.fields.length : 0) + 'f');

  const actions = document.createElement('div');
  actions.className = 'node-actions';

  const addBtn = document.createElement('button');
  addBtn.className = 'node-action-btn';
  addBtn.innerHTML = '+';
  addBtn.title = 'Alt kategori ekle';
  addBtn.onclick = (e) => { e.stopPropagation(); openAddModal(node.id); };

  const delBtn = document.createElement('button');
  delBtn.className = 'node-action-btn del';
  delBtn.innerHTML = '✕';
  delBtn.title = 'Sil';
  delBtn.onclick = (e) => { e.stopPropagation(); deleteNodeById(node.id); };

  actions.appendChild(addBtn);
  actions.appendChild(delBtn);

  row.appendChild(toggle);
  row.appendChild(label);
  row.appendChild(badge);
  row.appendChild(actions);

  row.onclick = () => {
    selectNode(node.id);
    if (window.innerWidth <= 640) showMobilePanel('editor');
  };

  row.draggable = true;
  row.ondragstart = (e) => { dragSrcId = node.id; e.dataTransfer.effectAllowed = 'move'; };
  row.ondragover = (e) => { e.preventDefault(); row.classList.add('drag-over'); };
  row.ondragleave = () => row.classList.remove('drag-over');
  row.ondrop = (e) => {
    e.preventDefault();
    row.classList.remove('drag-over');
    if (dragSrcId && dragSrcId !== node.id) moveNode(dragSrcId, node.id);
  };

  wrapper.appendChild(row);

  if (hasChildren && isOpen) {
    const children = document.createElement('div');
    children.className = 'tree-children open';
    node.children
      .filter(c => matchesSearch(c, searchQuery))
      .forEach(c => children.appendChild(buildNode(c, level + 1)));
    wrapper.appendChild(children);
  }

  return wrapper;
}

function moveNode(srcId, targetId) {
  const srcPath = getPath(srcId, data.categories);
  if (srcPath && srcPath.some(n => n.id === targetId)) return;
  const srcParent = findParent(srcId, data.categories);
  const srcList = srcParent ? srcParent.children : data.categories;
  const srcIdx = srcList.findIndex(n => n.id === srcId);
  const [srcNode] = srcList.splice(srcIdx, 1);
  const targetNode = findNode(targetId, data.categories);
  if (!targetNode.children) targetNode.children = [];
  targetNode.children.push(srcNode);
  targetNode._open = true;
  renderTree();
  showToast('Taşındı ✓');
}

// ─── SELECT NODE ─────────────────────────────────────────────────────────────
function selectNode(id) {
  selectedId = id;
  renderTree();
  renderEditor();
}

// ─── RENDER EDITOR ───────────────────────────────────────────────────────────
function renderEditor() {
  const panel = document.getElementById('editorContent');
  const bc = document.getElementById('breadcrumb');

  if (!selectedId) {
    panel.innerHTML = '<div class="empty-state"><div class="big">🗂</div><div>Soldan bir kategori seç</div></div>';
    bc.innerHTML = '';
    return;
  }

  const node = findNode(selectedId, data.categories);
  if (!node) return;

  const path = getPath(selectedId, data.categories) || [];
  bc.innerHTML = path.map((n, i) =>
    i < path.length - 1
      ? `<span class="crumb" onclick="selectNode('${n.id}')">${n.name}</span><span class="sep">›</span>`
      : `<span class="current">${n.name}</span>`
  ).join('');

  const depth = getDepth(selectedId, data.categories);

  panel.innerHTML = `
    <div style="padding-bottom:40px;">
      <div class="ed-section">
        <div class="ed-section-title">📁 Kategori Bilgisi <span class="path-tag">Derinlik: ${depth}</span></div>
        <div class="ed-section-body">
          <div class="form-row">
            <div class="form-group">
              <label>Kategori Adı</label>
              <input type="text" id="nodeName" value="${escHtml(node.name)}" oninput="updateNodeName(this.value)" />
            </div>
            <div class="form-group">
              <label>Kod</label>
              <input type="text" id="nodeCode" value="${escHtml(node.code || '')}" placeholder="IY-A, K-B..." oninput="updateNodeCode(this.value)" />
            </div>
          </div>
          <div class="form-row full">
            <div class="form-group">
              <label>Not / Açıklama</label>
              <textarea id="nodeNote" rows="2" style="resize:vertical" oninput="updateNodeNote(this.value)">${escHtml(node.note || '')}</textarea>
            </div>
          </div>
          <div style="display:flex; gap:7px; flex-wrap:wrap;">
            <button class="btn small" onclick="openAddModal('${node.id}')">+ Alt Kategori</button>
            <button class="btn danger small" onclick="deleteNodeById('${node.id}')">Sil</button>
          </div>
        </div>
      </div>

      <div class="ed-section">
        <div class="ed-section-title">📋 İlan Formu Alanları <span class="path-tag">${(node.fields || []).length} alan</span></div>
        <div class="ed-section-body">
          <div id="fieldsList" class="fields-list"></div>
          <div class="add-field-row">
            <input type="text" id="newFieldName" placeholder="Yeni alan adı..." onkeydown="if(event.key==='Enter') addField()" />
            <select id="newFieldType">
              <option value="text">Metin</option>
              <option value="number">Sayı</option>
              <option value="select">Seçenek</option>
              <option value="bool">Evet/Hayır</option>
            </select>
            <button class="btn accent small" onclick="addField()">+ Ekle</button>
          </div>
          <div style="margin-top:8px; font-family:'DM Mono',monospace; font-size:10px; color:var(--text3);">
            💡 Tipe tıkla değiştir · Sürükle sırala · Seçenek tipinde alt satırda seçenekleri gir
          </div>
        </div>
      </div>
    </div>
  `;

  renderFields(node);
}

function renderFields(node) {
  const list = document.getElementById('fieldsList');
  if (!list) return;
  list.innerHTML = '';
  (node.fields || []).forEach((fld, i) => {
    const item = document.createElement('div');
    item.innerHTML = `
      <div class="field-item" draggable="true" data-fi="${i}">
        <div class="field-drag">⠿</div>
        <input value="${escHtml(fld.name)}" placeholder="Alan adı" oninput="updateField(${i},'name',this.value)" />
        <div class="required-toggle ${fld.required ? 'on' : ''}" title="Zorunlu" onclick="toggleRequired(${i})"></div>
        <div class="field-type-badge ${fld.type}" onclick="cycleType(${i})">${typeLabel(fld.type)}</div>
        <button class="node-action-btn del" onclick="removeField(${i})">✕</button>
      </div>
      ${fld.type === 'select' ? `
      <div class="field-options-row">
        Seçenekler: <input value="${escHtml((fld.options||[]).join(', '))}" placeholder="Seçenek1, Seçenek2, ..." oninput="updateField(${i},'options',this.value.split(',').map(s=>s.trim()).filter(Boolean))" />
      </div>` : ''}
    `;
    const fi = item.querySelector('.field-item');
    let dragFiSrc = null;
    fi.ondragstart = () => dragFiSrc = i;
    fi.ondragover = (e) => { e.preventDefault(); fi.style.borderColor = 'var(--accent)'; };
    fi.ondragleave = () => fi.style.borderColor = '';
    fi.ondrop = (e) => {
      e.preventDefault();
      fi.style.borderColor = '';
      if (dragFiSrc !== null && dragFiSrc !== i) {
        const n = findNode(selectedId, data.categories);
        const moved = n.fields.splice(dragFiSrc, 1)[0];
        n.fields.splice(i, 0, moved);
        renderFields(n);
      }
    };
    list.appendChild(item);
  });
}

function typeLabel(t) {
  return { text:'METİN', number:'SAYI', select:'SEÇENEK', bool:'E/H' }[t] || t;
}

function cycleType(i) {
  const node = findNode(selectedId, data.categories);
  const types = ['text','number','select','bool'];
  const cur = types.indexOf(node.fields[i].type);
  node.fields[i].type = types[(cur + 1) % types.length];
  renderFields(node);
}

function updateField(i, key, val) {
  const node = findNode(selectedId, data.categories);
  node.fields[i][key] = val;
}

function removeField(i) {
  const node = findNode(selectedId, data.categories);
  node.fields.splice(i, 1);
  renderFields(node);
  showToast('Alan silindi');
}

function toggleRequired(i) {
  const node = findNode(selectedId, data.categories);
  node.fields[i].required = !node.fields[i].required;
  renderFields(node);
}

function addField() {
  const nameEl = document.getElementById('newFieldName');
  const typeEl = document.getElementById('newFieldType');
  const name = nameEl.value.trim();
  if (!name) return;
  const node = findNode(selectedId, data.categories);
  if (!node.fields) node.fields = [];
  node.fields.push({ id: uid(), name, type: typeEl.value, required: false });
  nameEl.value = '';
  renderFields(node);
  showToast(`"${name}" eklendi ✓`);
}

function updateNodeName(val) {
  const node = findNode(selectedId, data.categories);
  node.name = val;
  renderTree();
}
function updateNodeCode(val) { findNode(selectedId, data.categories).code = val; }
function updateNodeNote(val) { findNode(selectedId, data.categories).note = val; }

// ─── ADD / DELETE MODAL ──────────────────────────────────────────────────────
function openAddModal(parentId) {
  const overlay = document.getElementById('modalOverlay');
  document.getElementById('modalTitle').textContent = parentId ? 'Alt Kategori Ekle' : 'Ana Kategori Ekle';
  document.getElementById('modalDesc').textContent = parentId
    ? `"${findNode(parentId, data.categories)?.name}" altına ekle`
    : 'Kök seviyeye yeni kategori';
  document.getElementById('modalInput').value = '';
  overlay.classList.add('open');
  setTimeout(() => document.getElementById('modalInput').focus(), 200);
  modalCallback = (name) => {
    const newNode = { id: uid(), name, children: [], fields: [], _open: true };
    if (parentId) {
      const parent = findNode(parentId, data.categories);
      if (!parent.children) parent.children = [];
      parent.children.push(newNode);
      parent._open = true;
    } else {
      data.categories.push(newNode);
    }
    renderTree();
    selectNode(newNode.id);
    if (window.innerWidth <= 640) showMobilePanel('editor');
    showToast(`"${name}" oluşturuldu ✓`);
  };
}

function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
  modalCallback = null;
}

function confirmModal() {
  const val = document.getElementById('modalInput').value.trim();
  if (!val) return;
  closeModal();
  if (modalCallback) modalCallback(val);
}

document.getElementById('modalInput').addEventListener('keydown', (e) => {
  if (e.key === 'Enter') confirmModal();
  if (e.key === 'Escape') closeModal();
});
document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
});

function deleteNodeById(id) {
  if (!confirm('Bu kategori ve tüm alt kategorileri silinecek. Devam?')) return;
  if (selectedId === id) selectedId = null;
  deleteNode(id, data.categories);
  renderTree();
  renderEditor();
  showToast('Silindi');
}

// ─── JSON ────────────────────────────────────────────────────────────────────
function getCleanData() {
  function clean(nodes) {
    return nodes.map(n => {
      const r = { id: n.id, name: n.name };
      if (n.code) r.code = n.code;
      if (n.note) r.note = n.note;
      if (n.fields && n.fields.length) r.fields = n.fields;
      if (n.children && n.children.length) r.children = clean(n.children);
      return r;
    });
  }
  return { categories: clean(data.categories) };
}

function toggleJson() {
  const panel = document.getElementById('jsonPanel');
  if (!panel.classList.contains('open')) {
    document.getElementById('jsonTextarea').value = JSON.stringify(getCleanData(), null, 2);
  }
  panel.classList.toggle('open');
}

function copyJson() {
  navigator.clipboard.writeText(document.getElementById('jsonTextarea').value).then(() => showToast('JSON kopyalandı ✓'));
}

function exportJson() {
  const blob = new Blob([JSON.stringify(getCleanData(), null, 2)], { type: 'application/json' });
  const a = document.createElement('a');
  a.href = URL.createObjectURL(blob);
  a.download = 'gotapu-kategoriler.json';
  a.click();
  showToast('Dosya indirildi ✓');
}

function importJson() { document.getElementById('importFile').click(); }

function handleImport(e) {
  const file = e.target.files[0];
  if (!file) return;
  const r = new FileReader();
  r.onload = (ev) => {
    try {
      const imported = JSON.parse(ev.target.result);
      if (imported.categories) {
        data = imported;
        function ensureOpen(nodes) { nodes.forEach(n => { n._open = true; if (n.children) ensureOpen(n.children); }); }
        ensureOpen(data.categories);
        selectedId = null;
        renderTree(); renderEditor();
        showToast('JSON yüklendi ✓');
      } else showToast('⚠️ Geçersiz format');
    } catch { showToast('⚠️ JSON parse hatası'); }
  };
  r.readAsText(file);
  e.target.value = '';
}

function saveAll() {
  localStorage.setItem('gotapu_categories', JSON.stringify(getCleanData()));
  showToast('Kaydedildi ✓');
}

// ─── AUTO LOAD ────────────────────────────────────────────────────────────────
function loadSaved() {
  const saved = localStorage.getItem('gotapu_categories');
  if (saved) {
    try {
      data = JSON.parse(saved);
      function ensureOpen(nodes) { nodes.forEach(n => { if (n._open === undefined) n._open = true; if (n.children) ensureOpen(n.children); }); }
      ensureOpen(data.categories);
      return true;
    } catch {}
  }
  return false;
}

// ─── TOAST ───────────────────────────────────────────────────────────────────
let toastTimer;
function showToast(msg) {
  const el = document.getElementById('toast');
  el.textContent = msg;
  el.classList.add('show');
  clearTimeout(toastTimer);
  toastTimer = setTimeout(() => el.classList.remove('show'), 2200);
}

function escHtml(s) {
  return (s || '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}

// ─── INIT ────────────────────────────────────────────────────────────────────
if (!loadSaved()) {
  data = JSON.parse(JSON.stringify(INITIAL_DATA)); // deep copy
}

renderTree();
renderEditor();
</script>
</body>
