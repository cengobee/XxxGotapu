<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keşfet — GoTapu</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── ARAMA ── */
.arama-wrap{
  padding:10px 14px;
  background:var(--bg2);
  position:sticky;top:var(--nav-h,58px);z-index:90;
  border-bottom:1px solid var(--border);
}
.arama-input-wrap{
  display:flex;align-items:center;
  background:var(--card);border-radius:14px;
  padding:0 14px;gap:10px;
  border:1px solid var(--border);
}
.arama-input-wrap svg{color:var(--text3);flex-shrink:0}
.arama-input{
  background:transparent;border:none;outline:none;
  font-size:14px;font-weight:600;color:var(--text);
  font-family:'Nunito',sans-serif;padding:12px 0;width:100%;
}
.arama-input::placeholder{color:var(--text3)}

/* ── FİLTRE ── */
.filtre-bar{
  display:flex;gap:8px;overflow-x:auto;
  padding:10px 14px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.filtre-bar::-webkit-scrollbar{display:none}
.filtre-btn{
  flex-shrink:0;padding:7px 16px;border-radius:50px;
  border:1.5px solid var(--border2);
  background:var(--card);
  font-size:12px;font-weight:800;color:var(--text3);
  cursor:pointer;font-family:'Nunito',sans-serif;
  transition:all .18s;white-space:nowrap;
}
.filtre-btn.aktif{
  background:var(--rust);border-color:var(--rust);color:#fff;
}

/* ── TREND ── */
.trend-section{padding:16px 14px 0}
.section-baslik{
  font-size:11px;font-weight:900;color:var(--text3);
  letter-spacing:1.4px;text-transform:uppercase;margin-bottom:10px;
}
.trend-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.trend-chips::-webkit-scrollbar{display:none}
.trend-chip{
  flex-shrink:0;padding:6px 14px;border-radius:50px;
  background:var(--card);border:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text2);
  cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;
}
.trend-chip:active{border-color:var(--rust);color:var(--rust)}

/* ── KEŞFET GRİD ── */
.kesfet-grid{
  display:grid;
  grid-template-columns:1fr 1fr;
  gap:3px;padding:3px;margin-top:14px;
}
.kesfet-kart{
  position:relative;aspect-ratio:1/1;
  overflow:hidden;background:var(--card);
  cursor:pointer;border-radius:4px;
}
.kesfet-kart.buyuk{grid-column:span 2;aspect-ratio:16/9}
.kesfet-kart-bg{
  width:100%;height:100%;object-fit:cover;
  transition:transform .3s ease;display:block;
}
.kesfet-kart:active .kesfet-kart-bg{transform:scale(1.04)}
.kesfet-kart-overlay{
  position:absolute;inset:0;
  background:linear-gradient(to top,rgba(0,0,0,0.7) 0%,transparent 55%);
}
.kesfet-kart-tip{
  position:absolute;top:8px;left:8px;
  padding:3px 8px;border-radius:6px;
  font-size:10px;font-weight:900;font-family:'Nunito',sans-serif;
  backdrop-filter:blur(8px);
}
.tip-video{background:rgba(232,96,58,0.9);color:#fff}
.tip-foto{background:rgba(74,144,217,0.9);color:#fff}
.tip-yazi{background:rgba(46,204,113,0.9);color:#fff}
.kesfet-kart-bilgi{
  position:absolute;bottom:0;left:0;right:0;
  padding:10px 10px 8px;
  background:linear-gradient(to top,rgba(0,0,0,0.8),transparent);
}
.kesfet-kart-kullanici{font-size:11px;font-weight:800;color:#fff;font-family:'Nunito',sans-serif}
.kesfet-kart-stat{font-size:10px;color:rgba(255,255,255,0.7);font-family:'Nunito',sans-serif;margin-top:2px}
.video-play{
  position:absolute;top:50%;left:50%;transform:translate(-50%,-50%);
  width:36px;height:36px;border-radius:50%;
  background:rgba(0,0,0,0.5);backdrop-filter:blur(4px);
  display:flex;align-items:center;justify-content:center;pointer-events:none;
}
.kesfet-kart-yazi{
  width:100%;height:100%;padding:16px;
  display:flex;flex-direction:column;justify-content:space-between;
  background:var(--card2);
}
.kart-yazi-metin{
  font-size:13px;font-weight:700;color:var(--text2);
  line-height:1.45;font-family:'Nunito',sans-serif;
  overflow:hidden;display:-webkit-box;-webkit-line-clamp:5;-webkit-box-orient:vertical;
}
.kart-yazi-alt{display:flex;align-items:center;gap:6px;margin-top:8px}
.kart-yazi-avatar{
  width:22px;height:22px;border-radius:50%;
  background:var(--rust);display:flex;align-items:center;
  justify-content:center;font-size:10px;color:#fff;font-weight:900;flex-shrink:0;
}
.kart-yazi-isim{font-size:11px;font-weight:800;color:var(--text3);font-family:'Nunito',sans-serif}

/* ── BOŞ ── */
.bos-durum{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 24px;text-align:center}
.bos-emoji{font-size:54px;margin-bottom:14px;line-height:1}
.bos-baslik{font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px;font-family:'Nunito',sans-serif}
.bos-alt{font-size:13px;color:var(--text3);font-family:'Nunito',sans-serif;line-height:1.55}

/* Placeholder renkler */
.placeholder-1{background:linear-gradient(135deg,#1a2a4a,#2a4a6a)}
.placeholder-2{background:linear-gradient(135deg,#2a1a3a,#4a2a5a)}
.placeholder-3{background:linear-gradient(135deg,#1a3a2a,#2a5a3a)}
.placeholder-4{background:linear-gradient(135deg,#3a2a1a,#5a4a2a)}
.placeholder-5{background:linear-gradient(135deg,#3a1a1a,#5a2a2a)}
.placeholder-6{background:linear-gradient(135deg,#1a1a3a,#2a2a5a)}
.placeholder-7{background:linear-gradient(135deg,#2a3a1a,#3a5a2a)}
.placeholder-8{background:linear-gradient(135deg,#3a3a1a,#5a5a2a)}

@media(min-width:900px){
  .kesfet-grid{border-radius:12px;overflow:hidden}
}
</style>
</head>
<body data-page="kesfet" style="visibility:hidden">
<script>(function(){if(localStorage.getItem('gotapu_tema')==='light')document.body.classList.add('light')})();</script>

<!-- ARAMA -->
<div class="arama-wrap">
  <div class="arama-input-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="arama-input" type="text" placeholder="Kişi, konu veya içerik ara…" id="aramaInput">
  </div>
</div>

<!-- FİLTRE -->
<div class="filtre-bar" id="filtreTabs">
  <button class="filtre-btn aktif" onclick="filtreSec(this,'tumu')">Tümü</button>
  <button class="filtre-btn" onclick="filtreSec(this,'video')">🎬 Video</button>
  <button class="filtre-btn" onclick="filtreSec(this,'fotograf')">📷 Fotoğraf</button>
  <button class="filtre-btn" onclick="filtreSec(this,'yazi')">✏️ Yazı</button>
</div>

<!-- TREND -->
<div class="trend-section">
  <div class="section-baslik">Trend</div>
  <div class="trend-chips">
    <div class="trend-chip">#gayrimenkul</div>
    <div class="trend-chip">#ikinciel</div>
    <div class="trend-chip">#tasarim</div>
    <div class="trend-chip">#teknoloji</div>
    <div class="trend-chip">#dekorasyon</div>
    <div class="trend-chip">#urunler</div>
    <div class="trend-chip">#yasam</div>
  </div>
</div>

<!-- GRİD -->
<div class="kesfet-grid" id="kesfetGrid"></div>
<div class="bos-durum" id="bosDurum" style="display:none">
  <div class="bos-emoji">🔍</div>
  <div class="bos-baslik">İçerik bulunamadı</div>
  <div class="bos-alt">Farklı bir arama dene veya filtreyi değiştir</div>
</div>

<script>
const SUPABASE_URL='https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
window._sbClient=sb;

let aktifFiltre='tumu';
let tumIcerikler=[];

function filtreSec(btn,filtre){
  document.querySelectorAll('.filtre-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
  aktifFiltre=filtre;
  gridCiz(filtreUygula());
}
function filtreUygula(){
  if(aktifFiltre==='tumu')return tumIcerikler;
  return tumIcerikler.filter(i=>i.tip===aktifFiltre);
}

const PLACEHOLDER_ICERIKLER=[
  {id:1,tip:'video',renk:'placeholder-1',kullanici:'@ahmet_k',begeni:'1.2K',yorum:'48',buyuk:true,etiket:'#tasarim'},
  {id:2,tip:'fotograf',renk:'placeholder-2',kullanici:'@zeynep_m',begeni:'847',yorum:'23'},
  {id:3,tip:'fotograf',renk:'placeholder-3',kullanici:'@murat_y',begeni:'512',yorum:'17'},
  {id:4,tip:'yazi',kullanici:'@selin_a',metin:'İkinci el mobilya alırken dikkat etmeniz gereken 5 şey... Özellikle ahşap ürünlerde nem hasarına bakın.',begeni:'334',yorum:'61'},
  {id:5,tip:'video',renk:'placeholder-5',kullanici:'@can_b',begeni:'2.1K',yorum:'89',etiket:'#yasam'},
  {id:6,tip:'fotograf',renk:'placeholder-6',kullanici:'@ayse_d',begeni:'921',yorum:'34'},
  {id:7,tip:'fotograf',renk:'placeholder-7',kullanici:'@emre_s',begeni:'445',yorum:'12'},
  {id:8,tip:'yazi',kullanici:'@fatma_k',metin:'Evimi sıfırdan dekore ettim, toplam bütçem 8.500 TL. Detayları paylaşmak istiyorum...',begeni:'678',yorum:'102'},
  {id:9,tip:'video',renk:'placeholder-8',kullanici:'@burak_t',begeni:'3.4K',yorum:'156',etiket:'#dekorasyon'},
  {id:10,tip:'fotograf',renk:'placeholder-1',kullanici:'@naz_g',begeni:'289',yorum:'8'},
];

function gridCiz(icerikler){
  const grid=document.getElementById('kesfetGrid');
  const bos=document.getElementById('bosDurum');
  if(!icerikler.length){grid.innerHTML='';bos.style.display='flex';return;}
  bos.style.display='none';
  grid.innerHTML=icerikler.map((item,idx)=>{
    const buyukMu=item.buyuk||(idx%7===0);
    if(item.tip==='yazi'){return `
      <div class="kesfet-kart${buyukMu?' buyuk':''}" onclick="icerikAc(${item.id})">
        <div class="kesfet-kart-yazi">
          <div class="kart-yazi-metin">${item.metin}</div>
          <div class="kart-yazi-alt">
            <div class="kart-yazi-avatar">${item.kullanici.charAt(1).toUpperCase()}</div>
            <span class="kart-yazi-isim">${item.kullanici}</span>
            <span style="margin-left:auto;font-size:10px;color:var(--text3);font-family:'Nunito',sans-serif">❤️ ${item.begeni}</span>
          </div>
        </div>
        <div class="kesfet-kart-tip tip-yazi">Yazı</div>
      </div>`;}
    if(item.tip==='video'){return `
      <div class="kesfet-kart${buyukMu?' buyuk':''}" onclick="icerikAc(${item.id})">
        <div class="kesfet-kart-bg ${item.renk}" style="width:100%;height:100%"></div>
        <div class="kesfet-kart-overlay"></div>
        <div class="video-play"><svg width="14" height="14" viewBox="0 0 24 24" fill="white"><polygon points="5 3 19 12 5 21 5 3"/></svg></div>
        <div class="kesfet-kart-tip tip-video">Video</div>
        ${item.etiket?`<div style="position:absolute;bottom:8px;left:8px;font-size:10px;font-weight:800;color:rgba(255,255,255,0.8);font-family:'Nunito',sans-serif">${item.etiket}</div>`:''}
        <div class="kesfet-kart-bilgi">
          <div class="kesfet-kart-kullanici">${item.kullanici}</div>
          <div class="kesfet-kart-stat">▶ ${item.begeni} · 💬 ${item.yorum}</div>
        </div>
      </div>`;}
    return `
      <div class="kesfet-kart${buyukMu?' buyuk':''}" onclick="icerikAc(${item.id})">
        <div class="kesfet-kart-bg ${item.renk}" style="width:100%;height:100%"></div>
        <div class="kesfet-kart-overlay"></div>
        <div class="kesfet-kart-tip tip-foto">Fotoğraf</div>
        <div class="kesfet-kart-bilgi">
          <div class="kesfet-kart-kullanici">${item.kullanici}</div>
          <div class="kesfet-kart-stat">❤️ ${item.begeni} · 💬 ${item.yorum}</div>
        </div>
      </div>`;
  }).join('');
}

function icerikAc(id){console.log('İçerik:',id);}

document.getElementById('aramaInput').addEventListener('input',function(){
  const q=this.value.toLowerCase().trim();
  if(!q){gridCiz(filtreUygula());return;}
  const s=tumIcerikler.filter(i=>(i.kullanici||'').toLowerCase().includes(q)||(i.metin||'').toLowerCase().includes(q)||(i.etiket||'').toLowerCase().includes(q));
  gridCiz(s);
});

if(window.location.hash&&window.location.hash.includes('access_token')){
  const hp=new URLSearchParams(window.location.hash.substring(1));
  const at=hp.get('access_token'),rt=hp.get('refresh_token');
  if(at){sb.auth.setSession({access_token:at,refresh_token:rt}).then(({data,error})=>{if(error)window.location.replace('index.html');else{window.history.replaceState(null,'',window.location.pathname);init();}});}
  else init();
}else if(new URLSearchParams(window.location.search).get('code')){
  window.location.replace('index.html'+window.location.search);
}else{init();}

async function init(){
  const{data}=await sb.auth.getSession();
  if(!data.session){window.location.replace('index.html');return;}
  document.body.style.visibility='visible';
  tumIcerikler=PLACEHOLDER_ICERIKLER;
  gridCiz(tumIcerikler);
}
</script>

<script src="navbar.js"></script>
</body>
</html>
