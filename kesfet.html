<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Keşfet — GoTapu</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── ARAMA ── */
.arama-wrap{
  padding:10px 14px;
  background:var(--bg2);
  position:sticky;top:var(--nav-h,58px);z-index:90;
  border-bottom:1px solid var(--border);
}
.arama-input-wrap{
  display:flex;align-items:center;
  background:var(--card);border-radius:14px;
  padding:0 14px;gap:10px;
  border:1px solid var(--border);
}
.arama-input-wrap svg{color:var(--text3);flex-shrink:0}
.arama-input{
  background:transparent;border:none;outline:none;
  font-size:14px;font-weight:600;color:var(--text);
  font-family:'Nunito',sans-serif;padding:12px 0;width:100%;
}
.arama-input::placeholder{color:var(--text3)}

/* ── FİLTRE ── */
.filtre-bar{
  display:flex;gap:8px;overflow-x:auto;
  padding:10px 14px;
  background:var(--bg2);
  border-bottom:1px solid var(--border);
  scrollbar-width:none;
}
.filtre-bar::-webkit-scrollbar{display:none}
.filtre-btn{
  flex-shrink:0;padding:7px 16px;border-radius:50px;
  border:1.5px solid var(--border2);
  background:var(--card);
  font-size:12px;font-weight:800;color:var(--text3);
  cursor:pointer;font-family:'Nunito',sans-serif;
  transition:all .18s;white-space:nowrap;
}
.filtre-btn.aktif{
  background:var(--rust);border-color:var(--rust);color:#fff;
}

/* ── TREND ── */
.trend-section{padding:16px 14px 0}
.section-baslik{
  font-size:11px;font-weight:900;color:var(--text3);
  letter-spacing:1.4px;text-transform:uppercase;margin-bottom:10px;
}
.trend-chips{display:flex;gap:8px;overflow-x:auto;scrollbar-width:none;padding-bottom:4px}
.trend-chips::-webkit-scrollbar{display:none}
.trend-chip{
  flex-shrink:0;padding:6px 14px;border-radius:50px;
  background:var(--card);border:1px solid var(--border);
  font-size:12px;font-weight:700;color:var(--text2);
  cursor:pointer;transition:all .15s;font-family:'Nunito',sans-serif;
}
.trend-chip:active{border-color:var(--rust);color:var(--rust)}



/* ── BOŞ ── */
.bos-durum{display:flex;flex-direction:column;align-items:center;justify-content:center;padding:72px 24px;text-align:center}
.bos-emoji{font-size:54px;margin-bottom:14px;line-height:1}
.bos-baslik{font-size:17px;font-weight:800;color:var(--text);margin-bottom:8px;font-family:'Nunito',sans-serif}
.bos-alt{font-size:13px;color:var(--text3);font-family:'Nunito',sans-serif;line-height:1.55}



@media(min-width:900px){
  .kesfet-grid{border-radius:12px;overflow:hidden}
}
</style>
</head>
<body data-page="kesfet" style="visibility:hidden">
<script>(function(){if(localStorage.getItem('gotapu_tema')==='light')document.body.classList.add('light')})();</script>

<!-- ARAMA -->
<div class="arama-wrap">
  <div class="arama-input-wrap">
    <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><circle cx="11" cy="11" r="8"/><path d="m21 21-4.35-4.35"/></svg>
    <input class="arama-input" type="text" placeholder="Kişi, konu veya içerik ara…" id="aramaInput">
  </div>
</div>

<!-- FİLTRE -->
<div class="filtre-bar" id="filtreTabs">
  <button class="filtre-btn aktif" onclick="filtreSec(this,'tumu')">Tümü</button>
  <button class="filtre-btn" onclick="filtreSec(this,'video')">🎬 Video</button>
  <button class="filtre-btn" onclick="filtreSec(this,'fotograf')">📷 Fotoğraf</button>
  <button class="filtre-btn" onclick="filtreSec(this,'yazi')">✏️ Yazı</button>
</div>

<!-- TREND -->
<div class="trend-section">
  <div class="section-baslik">Trend</div>
  <div class="trend-chips">
    <div class="trend-chip">#gayrimenkul</div>
    <div class="trend-chip">#ikinciel</div>
    <div class="trend-chip">#tasarim</div>
    <div class="trend-chip">#teknoloji</div>
    <div class="trend-chip">#dekorasyon</div>
    <div class="trend-chip">#urunler</div>
    <div class="trend-chip">#yasam</div>
  </div>
</div>

<!-- GRİD -->
<div class="kesfet-grid" id="kesfetGrid" style="display:none"></div>
<div class="bos-durum" id="bosDurum">
  <div class="bos-emoji">🔍</div>
  <div class="bos-baslik">Keşfet yakında</div>
  <div class="bos-alt">İçerikler burada görünecek</div>
</div>

<script>
const SUPABASE_URL='https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
window._sbClient=sb;

function filtreSec(btn,filtre){
  document.querySelectorAll('.filtre-btn').forEach(b=>b.classList.remove('aktif'));
  btn.classList.add('aktif');
}

if(window.location.hash&&window.location.hash.includes('access_token')){
  const hp=new URLSearchParams(window.location.hash.substring(1));
  const at=hp.get('access_token'),rt=hp.get('refresh_token');
  if(at){sb.auth.setSession({access_token:at,refresh_token:rt}).then(({data,error})=>{if(error)window.location.replace('index.html');else{window.history.replaceState(null,'',window.location.pathname);init();}});}
  else init();
}else if(new URLSearchParams(window.location.search).get('code')){
  window.location.replace('index.html'+window.location.search);
}else{init();}

async function init(){
  const{data}=await sb.auth.getSession();
  if(!data.session){window.location.replace('index.html');return;}
  document.body.style.visibility='visible';
}
</script>

<script src="navbar.js"></script>
</body>
</html>
