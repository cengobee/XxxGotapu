<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gotapu — Mesajlar</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .chat-item {
    display: flex; gap: 12px; align-items: center;
    padding: 14px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer; transition: background .2s;
  }
  .chat-item:active { background: var(--card2); }
  .chat-avatar {
    width: 50px; height: 50px; border-radius: 50%;
    background: var(--card2); display: flex; align-items: center;
    justify-content: center; font-size: 24px; flex-shrink: 0;
  }
  .chat-info { flex: 1; min-width: 0; }
  .chat-name { font-size: 15px; font-weight: 800; }
  .chat-ilan { font-size: 11px; color: var(--gold); font-weight: 700; margin: 2px 0; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-preview { font-size: 13px; color: var(--text3); white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .chat-meta { text-align: right; flex-shrink: 0; }
  .chat-time { font-size: 11px; color: var(--text3); margin-bottom: 5px; }
  .chat-unread {
    background: var(--gold); color: var(--bg);
    width: 20px; height: 20px; border-radius: 50%;
    font-size: 11px; font-weight: 900;
    display: flex; align-items: center; justify-content: center; margin-left: auto;
  }

  .chat-screen {
    display: none;
    flex-direction: column;
    position: fixed;
    top: var(--nav-h);
    left: 0; right: 0; bottom: 0;
    background: var(--bg);
    z-index: 100;
    overflow: hidden;
  }
  .chat-screen.open { display: flex; }

  .chat-header {
    display: flex; align-items: center; gap: 12px;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .chat-header-avatar { width: 40px; height: 40px; border-radius: 50%; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 22px; }
  .chat-header-name { font-size: 16px; font-weight: 800; }
  .chat-header-ilan { font-size: 12px; color: var(--gold); }

  .chat-messages {
    flex: 1; overflow-y: auto;
    padding: 16px; display: flex;
    flex-direction: column; gap: 8px;
  }

  .msg { max-width: 75%; padding: 10px 14px; border-radius: 18px; font-size: 15px; line-height: 1.5; word-break: break-word; }
  .msg-them { background: var(--card); border-bottom-left-radius: 4px; align-self: flex-start; }
  .msg-me { background: var(--gold); color: var(--bg); border-bottom-right-radius: 4px; align-self: flex-end; font-weight: 700; }
  .msg-time { font-size: 10px; opacity: 0.6; margin-top: 4px; }

  .chat-input-row {
    display: flex; gap: 10px;
    padding: 12px 16px 20px;
    border-top: 1px solid var(--border);
    background: var(--bg2); flex-shrink: 0;
  }
  .chat-input-row input {
    flex: 1; background: var(--card); border: 1.5px solid var(--border);
    border-radius: 50px; padding: 12px 16px; color: var(--text);
    font-family: 'Nunito',sans-serif; font-size: 15px; outline: none;
  }
  .chat-input-row input::placeholder { color: var(--text3); }
  .send-btn {
    width: 46px; height: 46px; border-radius: 50%;
    background: var(--gold); border: none; cursor: pointer;
    font-size: 18px; display: flex; align-items: center; justify-content: center; flex-shrink: 0;
  }
  .sikayet-btn {
    width: 100%; padding: 14px 16px; border-radius: var(--radius-sm);
    background: var(--card); border: 1.5px solid var(--border);
    color: var(--text); font-family: 'Nunito', sans-serif;
    font-size: 14px; font-weight: 700; cursor: pointer; text-align: left;
  }
  .sikayet-btn.selected { border-color: var(--rust); background: rgba(232,96,58,0.08); color: var(--rust); }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-logo"><div class="logo-icon">🏠</div>GoTapu</a>
  <div class="nav-actions">
    <a href="ilan-ver.html" class="nav-btn">+ İlan Ver</a>
    <a href="profil.html" class="nav-icon-btn">👤</a>
  </div>
</nav>

<div class="page fade-up" id="chatList">
  <div class="section-head">
    <div class="section-title">Mesajlar</div>
    <span class="tag tag-rust" id="okunmamisSay" style="display:none">0 Okunmamış</span>
  </div>
  <div class="card" id="konusmalar">
    <div class="spinner"></div>
  </div>
</div>

<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <button onclick="kapat()" class="back-btn">←</button>
    <div class="chat-header-avatar">👤</div>
    <div style="flex:1">
      <div class="chat-header-name" id="chatName">Kullanıcı</div>
      <div class="chat-header-ilan" id="chatIlan"></div>
    </div>
    <button onclick="mesajSikayetAc()" style="background:none;border:none;font-size:20px;cursor:pointer">⚠️</button>
  </div>
  <div class="chat-messages" id="chatMessages"><div class="spinner"></div></div>
  <div class="chat-input-row">
    <input type="text" placeholder="Mesaj yazın..." id="msgInput" onkeydown="if(event.key==='Enter')gonder()">
    <button class="send-btn" onclick="gonder()">▶</button>
  </div>
</div>

<!-- Şikayet Modal -->
<div class="modal-overlay" id="sikayetModal" onclick="if(event.target===this)sikayetKapat()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 style="font-size:18px;font-weight:900;margin-bottom:6px">⚠️ Kullanıcıyı Şikayet Et</h3>
    <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Şikayet sebebini seçin</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Spam')">📧 Spam</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Dolandırıcılık')">💸 Dolandırıcılık</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Hakaret/Küfür')">🤬 Hakaret/Küfür</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Taciz')">🚫 Taciz</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Diğer')">📝 Diğer</button>
    </div>
    <textarea class="input" id="mSikayetAciklama" rows="3" placeholder="Ek açıklama (isteğe bağlı)..." style="resize:none;margin-bottom:12px"></textarea>
    <button style="width:100%;padding:16px;border-radius:50px;background:var(--rust);color:white;border:none;font-family:Nunito,sans-serif;font-size:15px;font-weight:800;cursor:pointer" onclick="mesajSikayetGonder()">⚠️ Şikayeti Gönder</button>
  </div>
</div>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item"><div class="bnav-icon">🏠</div>Ana Sayfa</a>
  <a href="eslesmeler.html" class="bnav-item"><div class="bnav-icon">✨</div>Eşleşmeler</a>
  <a href="ilan-ver.html" class="bnav-center">+</a>
  <a href="mesajlar.html" class="bnav-item active"><div class="bnav-icon">💬</div>Mesajlar</a>
  <a href="profil.html" class="bnav-item"><div class="bnav-icon">👤</div>Profil</a>
</nav>

<script>
const SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;
let aktifIlanId = null;
let aktifKarsiId = null;
let mesajKanal = null;

const params = new URLSearchParams(window.location.search);
const urlIlanId = params.get('ilan_id');
const urlKarsiId = params.get('karsi_id');

sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'auth.html'; return; }
  currentUser = data.session.user;
  konusmalariYukle();
  if (urlIlanId && urlKarsiId) {
    ilanBilgisiAl(urlIlanId, urlKarsiId);
  }
});

async function ilanBilgisiAl(ilanId, karsiId) {
  const { data: ilan } = await sb.from('ilanlar').select('baslik').eq('id', ilanId).single();
  const { data: profil } = await sb.from('profiles').select('full_name').eq('id', karsiId).single();
  acKonusma(karsiId, ilanId, profil?.full_name || 'Kullanıcı', ilan?.baslik || 'İlan');
}

async function konusmalariYukle() {
  const { data } = await sb.from('mesajlar')
    .select('*')
    .or(`gonderen_id.eq.${currentUser.id},alici_id.eq.${currentUser.id}`)
    .order('created_at', { ascending: false });

  const el = document.getElementById('konusmalar');

  if (!data || data.length === 0) {
    el.innerHTML = `<div class="empty"><div class="empty-icon">💬</div><div class="empty-title">Henüz mesajınız yok</div><div class="empty-desc">İlan sahipleriyle iletişime geçin</div></div>`;
    return;
  }

  const konusmalar = {};
  data.forEach(m => {
    const karsId = m.gonderen_id === currentUser.id ? m.alici_id : m.gonderen_id;
    const key = `${karsId}_${m.ilan_id}`;
    if (!konusmalar[key]) konusmalar[key] = { ...m, karsId, okunmamis: 0 };
    if (!m.okundu && m.alici_id === currentUser.id) konusmalar[key].okunmamis++;
  });

  const liste = Object.values(konusmalar);
  const toplamOkunmamis = liste.reduce((s, k) => s + k.okunmamis, 0);
  if (toplamOkunmamis > 0) {
    const b = document.getElementById('okunmamisSay');
    b.textContent = `${toplamOkunmamis} Okunmamış`;
    b.style.display = 'inline-flex';
  }

  const ilanIds = [...new Set(liste.map(k => k.ilan_id).filter(Boolean))];
  const karsiIds = [...new Set(liste.map(k => k.karsId).filter(Boolean))];

  const [ilanlar, profiller] = await Promise.all([
    ilanIds.length ? sb.from('ilanlar').select('id,baslik').in('id', ilanIds) : { data: [] },
    karsiIds.length ? sb.from('profiles').select('id,full_name').in('id', karsiIds) : { data: [] }
  ]);

  const ilanMap = {};
  (ilanlar.data || []).forEach(i => ilanMap[i.id] = i);
  const profilMap = {};
  (profiller.data || []).forEach(p => profilMap[p.id] = p);

  el.innerHTML = liste.map(k => {
    const isim = profilMap[k.karsId]?.full_name || 'Kullanıcı';
    const ilanBaslik = ilanMap[k.ilan_id]?.baslik || 'İlan';
    const zaman = new Date(k.created_at).toLocaleDateString('tr-TR');
    return `<div class="chat-item" onclick="acKonusma('${k.karsId}','${k.ilan_id}','${isim}','${ilanBaslik}')">
      <div class="chat-avatar">👤</div>
      <div class="chat-info">
        <div class="chat-name">${isim}</div>
        <div class="chat-ilan">🏠 ${ilanBaslik}</div>
        <div class="chat-preview">${k.icerik}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${zaman}</div>
        ${k.okunmamis > 0 ? `<div class="chat-unread">${k.okunmamis}</div>` : ''}
      </div>
    </div>`;
  }).join('');
}

async function acKonusma(karsId, ilanId, isim, ilanBaslik) {
  aktifKarsiId = karsId;
  aktifIlanId = ilanId;
  document.getElementById('chatName').textContent = isim;
  document.getElementById('chatIlan').textContent = '🏠 ' + ilanBaslik;
  document.getElementById('chatScreen').classList.add('open');
  mesajlariYukle();

  if (mesajKanal) sb.removeChannel(mesajKanal);
  mesajKanal = sb.channel('mesaj_' + ilanId).on('postgres_changes',
    { event: 'INSERT', schema: 'public', table: 'mesajlar' },
    payload => {
      if (payload.new.gonderen_id !== currentUser.id) mesajEkle(payload.new, true);
    }
  ).subscribe();
}

async function mesajlariYukle() {
  const el = document.getElementById('chatMessages');
  el.innerHTML = '<div class="spinner"></div>';

  const { data } = await sb.from('mesajlar')
    .select('*')
    .eq('ilan_id', aktifIlanId)
    .or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${aktifKarsiId}),and(gonderen_id.eq.${aktifKarsiId},alici_id.eq.${currentUser.id})`)
    .order('created_at', { ascending: true });

  el.innerHTML = '';
  if (data) data.forEach(m => mesajEkle(m, false));
  el.scrollTop = el.scrollHeight;

  await sb.from('mesajlar').update({ okundu: true })
    .eq('alici_id', currentUser.id).eq('gonderen_id', aktifKarsiId);
}

function mesajEkle(m, scroll = true) {
  const el = document.getElementById('chatMessages');
  const benMi = m.gonderen_id === currentUser.id;
  const div = document.createElement('div');
  div.className = `msg ${benMi ? 'msg-me' : 'msg-them'}`;
  div.innerHTML = `${m.icerik}<div class="msg-time">${new Date(m.created_at).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>`;
  el.appendChild(div);
  if (scroll) el.scrollTop = el.scrollHeight;
}

async function gonder() {
  const inp = document.getElementById('msgInput');
  const icerik = inp.value.trim();
  if (!icerik || !aktifKarsiId) return;
  inp.value = '';

  const yeniMesaj = {
    gonderen_id: currentUser.id,
    alici_id: aktifKarsiId,
    ilan_id: aktifIlanId,
    icerik,
    okundu: false,
    created_at: new Date().toISOString()
  };

  mesajEkle(yeniMesaj);
  await sb.from('mesajlar').insert(yeniMesaj);
}

let seciliMSikayet = null;

function mesajSikayetAc() {
  seciliMSikayet = null;
  document.querySelectorAll('.sikayet-btn').forEach(b => b.classList.remove('selected'));
  document.getElementById('mSikayetAciklama').value = '';
  document.getElementById('sikayetModal').classList.add('open');
}

function sikayetKapat() {
  document.getElementById('sikayetModal').classList.remove('open');
}

function mSikayetSec(el, sebep) {
  seciliMSikayet = sebep;
  document.querySelectorAll('.sikayet-btn').forEach(b => b.classList.remove('selected'));
  el.classList.add('selected');
}

async function mesajSikayetGonder() {
  if (!seciliMSikayet) { alert('Lütfen bir şikayet sebebi seçin!'); return; }
  const aciklama = document.getElementById('mSikayetAciklama').value.trim();
  await sb.from('sikayetler').insert({
    user_id: currentUser.id,
    tip: 'mesaj',
    sebep: seciliMSikayet,
    hedef_id: aktifKarsiId,
    hedef_tip: 'kullanici',
    aciklama: aciklama || null,
    durum: 'bekliyor'
  });
  sikayetKapat();
  alert('✅ Şikayetiniz alındı. En kısa sürede incelenecektir.');
}

function kapat() {
  document.getElementById('chatScreen').classList.remove('open');
  if (mesajKanal) sb.removeChannel(mesajKanal);
  konusmalariYukle();
  window.history.replaceState({}, '', 'mesajlar.html');
}
</script>
</body>
</html>
