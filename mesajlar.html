<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, interactive-widget=resizes-content">
<title>Mesajlar — GoTapu</title>
<link rel="icon" type="image/png" sizes="192x192" href="/icon-192.png">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800;900&display=swap">
<link rel="stylesheet" href="style.css">
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0a0d14">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
*{box-sizing:border-box;-webkit-tap-highlight-color:transparent}

/* ── SOHBET LİSTESİ ── */
.chat-item{
  display:flex;gap:12px;align-items:center;
  padding:14px 16px;
  border-bottom:1px solid var(--border);
  cursor:pointer;transition:background .15s;
}
.chat-item:active{background:var(--card2)}
.chat-avatar{
  width:50px;height:50px;border-radius:50%;
  background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  font-size:22px;flex-shrink:0;overflow:hidden;
  border:2px solid var(--border);
}
.chat-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-info{flex:1;min-width:0}
.chat-name{font-size:15px;font-weight:800;color:var(--text)}
.chat-ilan{font-size:11px;color:var(--rust);font-weight:700;margin:2px 0;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-preview{font-size:13px;color:var(--text3);white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.chat-meta{text-align:right;flex-shrink:0}
.chat-time{font-size:11px;color:var(--text3);margin-bottom:5px}
.chat-unread{
  background:var(--rust);color:#fff;
  width:20px;height:20px;border-radius:50%;
  font-size:11px;font-weight:900;
  display:flex;align-items:center;justify-content:center;margin-left:auto;
}

/* ── SOHBET EKRANI ── */
.chat-screen{
  display:none;flex-direction:column;
  position:fixed;top:var(--nav-h,58px);
  left:0;right:0;bottom:0;
  background:var(--bg);z-index:250;overflow:hidden;
}
.chat-screen.open{display:flex}
.chat-header{
  display:flex;align-items:center;gap:12px;
  padding:12px 16px;
  border-bottom:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
  backdrop-filter:blur(12px);
}
.chat-back-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--card);border:1px solid var(--border);
  display:flex;align-items:center;justify-content:center;
  font-size:18px;cursor:pointer;color:var(--text);flex-shrink:0;
}
.chat-header-avatar{
  width:40px;height:40px;border-radius:50%;
  background:var(--card2);
  display:flex;align-items:center;justify-content:center;
  font-size:20px;overflow:hidden;cursor:pointer;flex-shrink:0;
  border:2px solid var(--border);
}
.chat-header-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}
.chat-header-info{flex:1;cursor:pointer;min-width:0}
.chat-header-name{font-size:16px;font-weight:800;color:var(--text)}
.chat-header-ilan{font-size:12px;color:var(--rust);font-weight:700;white-space:nowrap;overflow:hidden;text-overflow:ellipsis}
.header-actions{display:flex;gap:4px;align-items:center;flex-shrink:0}
.header-icon-btn{
  width:36px;height:36px;border-radius:50%;
  background:var(--card);border:none;
  font-size:17px;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
}

/* ── MESAJLAR ── */
.chat-messages{
  flex:1;overflow-y:auto;
  padding:16px;display:flex;
  flex-direction:column;gap:8px;
  padding-bottom:8px;
}
.chat-messages::-webkit-scrollbar{display:none}
.msg-row{display:flex;align-items:flex-end;gap:8px}
.msg-row.me{flex-direction:row-reverse}
.msg-bubble-wrap{display:flex;flex-direction:column;max-width:75%}
.msg-row.me .msg-bubble-wrap{align-items:flex-end}
.msg-row.them .msg-bubble-wrap{align-items:flex-start}
.msg{padding:10px 14px;border-radius:18px;font-size:15px;line-height:1.5;word-break:break-word}
.msg-them{background:var(--card);border-bottom-left-radius:4px}
.msg-me{background:var(--rust);color:#fff;border-bottom-right-radius:4px;font-weight:700}
.msg-time{font-size:10px;opacity:.6;margin-top:4px}
.msg-mini-avatar{
  width:28px;height:28px;border-radius:50%;
  background:var(--card2);display:flex;align-items:center;
  justify-content:center;font-size:13px;flex-shrink:0;overflow:hidden;
}
.msg-mini-avatar img{width:100%;height:100%;object-fit:cover;border-radius:50%}

/* ── GİRİŞ ── */
.chat-input-row{
  display:flex;gap:10px;
  padding:12px 16px;
  padding-bottom:calc(12px + env(safe-area-inset-bottom,0px));
  border-top:1px solid var(--border);
  background:var(--bg2);flex-shrink:0;
}
.chat-input-row input{
  flex:1;background:var(--card);
  border:1.5px solid var(--border);
  border-radius:50px;padding:12px 16px;
  color:var(--text);font-family:'Nunito',sans-serif;
  font-size:15px;outline:none;
  transition:border-color .2s;
}
.chat-input-row input:focus{border-color:var(--rust)}
.chat-input-row input::placeholder{color:var(--text3)}
.send-btn{
  width:46px;height:46px;border-radius:50%;
  background:var(--rust);border:none;cursor:pointer;
  display:flex;align-items:center;justify-content:center;
  color:#fff;font-size:18px;flex-shrink:0;
  box-shadow:0 3px 12px rgba(232,96,58,0.4);
}

/* ── ŞİKAYET ── */
.sikayet-btn{
  width:100%;padding:14px 16px;border-radius:var(--radius-sm,10px);
  background:var(--card);border:1.5px solid var(--border);
  color:var(--text);font-family:'Nunito',sans-serif;
  font-size:14px;font-weight:700;cursor:pointer;text-align:left;
  transition:all .15s;
}
.sikayet-btn.selected{border-color:var(--rust);background:rgba(232,96,58,0.08);color:var(--rust)}
</style>
</head>
<body data-page="mesajlar" style="visibility:hidden">
<script>(function(){if(localStorage.getItem('gotapu_tema')==='light')document.body.classList.add('light')})();</script>

<!-- MESAJLAR LİSTESİ -->
<div class="page fade-up" id="chatList">
  <div class="section-head" style="padding:16px 16px 8px">
    <div class="section-title">Mesajlar</div>
    <span class="tag tag-rust" id="okunmamisSay" style="display:none">0 Okunmamış</span>
  </div>
  <div class="card" id="konusmalar" style="border-radius:0;border-left:none;border-right:none">
    <div class="spinner"></div>
  </div>
</div>

<!-- SOHBET EKRANI -->
<div class="chat-screen" id="chatScreen">
  <div class="chat-header">
    <button class="chat-back-btn" onclick="kapat()">←</button>
    <div class="chat-header-avatar" id="chatHeaderAvatar" onclick="profileGit()">👤</div>
    <div class="chat-header-info" onclick="profileGit()">
      <div class="chat-header-name" id="chatName">Kullanıcı</div>
      <div class="chat-header-ilan" id="chatIlan"></div>
    </div>
    <div class="header-actions">
      <button class="header-icon-btn" onclick="silModuToggle()" title="Sil">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><polyline points="3 6 5 6 21 6"/><path d="m19 6-1 14a2 2 0 0 1-2 2H8a2 2 0 0 1-2-2L5 6"/><path d="M10 11v6"/><path d="M14 11v6"/><path d="M9 6V4h6v2"/></svg>
      </button>
      <button class="header-icon-btn" onclick="mesajSikayetAc()" title="Şikayet">
        <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round"><path d="M10.29 3.86L1.82 18a2 2 0 0 0 1.71 3h16.94a2 2 0 0 0 1.71-3L13.71 3.86a2 2 0 0 0-3.42 0z"/><line x1="12" y1="9" x2="12" y2="13"/><line x1="12" y1="17" x2="12.01" y2="17"/></svg>
      </button>
    </div>
  </div>
  <div class="chat-messages" id="chatMessages"><div class="spinner"></div></div>
  <div class="chat-input-row">
    <input type="text" placeholder="Mesaj yazın…" id="msgInput" onkeydown="if(event.key==='Enter')gonder()">
    <button class="send-btn" onclick="gonder()">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round"><line x1="22" y1="2" x2="11" y2="13"/><polygon points="22 2 15 22 11 13 2 9 22 2"/></svg>
    </button>
  </div>
</div>

<!-- ŞİKAYET MODAL -->
<div class="modal-overlay" id="sikayetModal" onclick="if(event.target===this)sikayetKapat()">
  <div class="modal-sheet">
    <div class="modal-handle"></div>
    <h3 style="font-size:18px;font-weight:900;margin-bottom:6px">Kullanıcıyı Şikayet Et</h3>
    <p style="font-size:13px;color:var(--text3);margin-bottom:16px">Şikayet sebebini seçin</p>
    <div style="display:flex;flex-direction:column;gap:8px;margin-bottom:16px">
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Spam')">📧 Spam</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Dolandırıcılık')">💸 Dolandırıcılık</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Hakaret/Küfür')">🤬 Hakaret/Küfür</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Taciz')">🚫 Taciz</button>
      <button class="sikayet-btn" onclick="mSikayetSec(this,'Diğer')">📝 Diğer</button>
    </div>
    <textarea class="input" id="mSikayetAciklama" rows="3" placeholder="Ek açıklama (isteğe bağlı)…" style="resize:none;margin-bottom:12px"></textarea>
    <button class="btn btn-rust btn-lg" onclick="mesajSikayetGonder()">Şikayeti Gönder</button>
  </div>
</div>

<script>
const SUPABASE_URL='https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY='eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const{createClient}=supabase;
const sb=createClient(SUPABASE_URL,SUPABASE_KEY);
window._sbClient=sb;

let currentUser=null,aktifIlanId=null,aktifKarsiId=null,mesajKanal=null,karsiAvatarUrl=null;

const params=new URLSearchParams(window.location.search);
const urlIlanId=params.get('ilan_id');
const urlKarsiId=params.get('karsi_id');

sb.auth.getSession().then(({data})=>{
  if(!data.session){window.location.href='index.html';return;}
  currentUser=data.session.user;
  konusmalariYukle();
  if(urlKarsiId){
    history.pushState({chat:true},'',location.href);
    if(urlIlanId)ilanBilgisiAl(urlIlanId,urlKarsiId);
    else adminMesajAc(urlKarsiId);
  }
  document.body.style.visibility='visible';
});

window.addEventListener('popstate',()=>{
  if(document.getElementById('chatScreen').classList.contains('open'))kapatSessiz();
});

async function adminMesajAc(karsiId){
  const{data:profil}=await sb.from('profiles').select('full_name,avatar_url').eq('id',karsiId).single();
  acKonusma(karsiId,null,profil?.full_name||'Kullanıcı','GoTapu Mesajı',profil?.avatar_url||null);
}
async function ilanBilgisiAl(ilanId,karsiId){
  const{data:ilan}=await sb.from('ilanlar').select('baslik').eq('id',ilanId).single();
  const{data:profil}=await sb.from('profiles').select('full_name,avatar_url').eq('id',karsiId).single();
  acKonusma(karsiId,ilanId,profil?.full_name||'Kullanıcı',ilan?.baslik||'İlan',profil?.avatar_url||null);
}

async function konusmalariYukle(){
  const{data}=await sb.from('mesajlar').select('*').or(`gonderen_id.eq.${currentUser.id},alici_id.eq.${currentUser.id}`).order('created_at',{ascending:false});
  const el=document.getElementById('konusmalar');
  if(!data||!data.length){
    el.innerHTML=`<div class="empty"><div class="empty-icon">💬</div><div class="empty-title">Henüz mesajınız yok</div><div class="empty-desc">İlan sahipleriyle iletişime geçin</div></div>`;
    return;
  }
  const konusmalar={};
  data.forEach(m=>{
    const karsId=m.gonderen_id===currentUser.id?m.alici_id:m.gonderen_id;
    const key=`${karsId}_${m.ilan_id||'direct'}`;
    if(!konusmalar[key])konusmalar[key]={...m,karsId,okunmamis:0};
    if(!m.okundu&&m.alici_id===currentUser.id)konusmalar[key].okunmamis++;
  });
  const liste=Object.values(konusmalar);
  const toplamOkunmamis=liste.reduce((s,k)=>s+k.okunmamis,0);
  if(toplamOkunmamis>0){const b=document.getElementById('okunmamisSay');b.textContent=`${toplamOkunmamis} Okunmamış`;b.style.display='inline-flex';}
  const ilanIds=[...new Set(liste.map(k=>k.ilan_id).filter(Boolean))];
  const karsiIds=[...new Set(liste.map(k=>k.karsId).filter(Boolean))];
  const[ilanlar,profiller]=await Promise.all([
    ilanIds.length?sb.from('ilanlar').select('id,baslik').in('id',ilanIds):{data:[]},
    karsiIds.length?sb.from('profiles').select('id,full_name,avatar_url').in('id',karsiIds):{data:[]}
  ]);
  const ilanMap={};(ilanlar.data||[]).forEach(i=>ilanMap[i.id]=i);
  const profilMap={};(profiller.data||[]).forEach(p=>profilMap[p.id]=p);
  el.innerHTML=liste.map(k=>{
    const isim=profilMap[k.karsId]?.full_name||'Kullanıcı';
    const avatarUrl=profilMap[k.karsId]?.avatar_url||'';
    const avatarHtml=avatarUrl?`<img src="${avatarUrl}" alt="${isim}" onerror="this.parentElement.innerHTML='👤'">`:(isim==='GoTapu'?'🏠':'👤');
    const ilanBaslik=k.ilan_id?(ilanMap[k.ilan_id]?.baslik||'İlan'):'GoTapu Mesajı';
    const zaman=new Date(k.created_at).toLocaleDateString('tr-TR');
    const isimEsc=isim.replace(/'/g,"\\'");
    const ilanEsc=ilanBaslik.replace(/'/g,"\\'");
    const avatarEsc=avatarUrl.replace(/'/g,"\\'");
    return `<div class="chat-item" onclick="acKonusma('${k.karsId}','${k.ilan_id||''}','${isimEsc}','${ilanEsc}','${avatarEsc}')">
      <div class="chat-avatar">${avatarHtml}</div>
      <div class="chat-info">
        <div class="chat-name">${isim}</div>
        <div class="chat-ilan">${k.ilan_id?'🏠':'📢'} ${ilanBaslik}</div>
        <div class="chat-preview">${k.icerik}</div>
      </div>
      <div class="chat-meta">
        <div class="chat-time">${zaman}</div>
        ${k.okunmamis>0?`<div class="chat-unread">${k.okunmamis}</div>`:''}
      </div>
    </div>`;
  }).join('');
}

async function acKonusma(karsId,ilanId,isim,ilanBaslik,avatarUrl){
  aktifKarsiId=karsId;aktifIlanId=ilanId||null;karsiAvatarUrl=avatarUrl||null;
  document.getElementById('chatName').textContent=isim;
  document.getElementById('chatIlan').textContent=ilanId?'🏠 '+ilanBaslik:'📢 '+ilanBaslik;
  const avatarEl=document.getElementById('chatHeaderAvatar');
  if(avatarUrl)avatarEl.innerHTML=`<img src="${avatarUrl}" alt="${isim}" onerror="this.parentElement.innerHTML='👤'">`;
  else avatarEl.innerHTML=isim==='GoTapu'?'🏠':'👤';
  document.getElementById('chatScreen').classList.add('open');
  history.pushState({chat:true},'',location.href);
  mesajlariYukle();
  if(mesajKanal)sb.removeChannel(mesajKanal);
  const kanalAd='mesaj_'+(ilanId||karsId);
  mesajKanal=sb.channel(kanalAd).on('postgres_changes',{event:'INSERT',schema:'public',table:'mesajlar'},payload=>{
    if(payload.new.gonderen_id!==currentUser.id&&(payload.new.gonderen_id===aktifKarsiId||payload.new.alici_id===aktifKarsiId))mesajEkle(payload.new,true);
  }).subscribe();
}

function profileGit(){if(aktifKarsiId)window.location.href=`profil.html?id=${aktifKarsiId}`;}

async function mesajlariYukle(){
  const el=document.getElementById('chatMessages');
  el.innerHTML='<div class="spinner"></div>';
  let query=sb.from('mesajlar').select('*');
  if(aktifIlanId){query=query.eq('ilan_id',aktifIlanId).or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${aktifKarsiId}),and(gonderen_id.eq.${aktifKarsiId},alici_id.eq.${currentUser.id})`);}
  else{query=query.or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${aktifKarsiId}),and(gonderen_id.eq.${aktifKarsiId},alici_id.eq.${currentUser.id})`);}
  const{data}=await query.order('created_at',{ascending:true});
  el.innerHTML='';if(data)data.forEach(m=>mesajEkle(m,false));
  el.scrollTop=el.scrollHeight;
  await sb.from('mesajlar').update({okundu:true}).eq('alici_id',currentUser.id).eq('gonderen_id',aktifKarsiId);
}

function mesajEkle(m,scroll=true){
  const el=document.getElementById('chatMessages');
  const benMi=m.gonderen_id===currentUser.id;
  const row=document.createElement('div');
  row.className=`msg-row ${benMi?'me':'them'}`;
  row.dataset.id=m.id||'';
  if(!benMi){
    const miniAv=document.createElement('div');
    miniAv.className='msg-mini-avatar';
    miniAv.innerHTML=karsiAvatarUrl?`<img src="${karsiAvatarUrl}" onerror="this.parentElement.innerHTML='👤'">`:'👤';
    row.appendChild(miniAv);
  }
  const wrap=document.createElement('div');
  wrap.className='msg-bubble-wrap';
  const div=document.createElement('div');
  div.className=`msg ${benMi?'msg-me':'msg-them'}`;
  div.innerHTML=`${m.icerik}<div class="msg-time">${new Date(m.created_at).toLocaleTimeString('tr-TR',{hour:'2-digit',minute:'2-digit'})}</div>`;
  wrap.appendChild(div);row.appendChild(wrap);el.appendChild(row);
  if(scroll)el.scrollTop=el.scrollHeight;
}

async function silModuToggle(){
  if(!confirm('Bu konuşmayı tamamen silmek istiyor musunuz?'))return;
  let query=sb.from('mesajlar').delete().or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${aktifKarsiId}),and(gonderen_id.eq.${aktifKarsiId},alici_id.eq.${currentUser.id})`);
  if(aktifIlanId){query=sb.from('mesajlar').delete().eq('ilan_id',aktifIlanId).or(`and(gonderen_id.eq.${currentUser.id},alici_id.eq.${aktifKarsiId}),and(gonderen_id.eq.${aktifKarsiId},alici_id.eq.${currentUser.id})`);}
  const{error}=await query;
  if(!error)kapat();else alert('Konuşma silinemedi!');
}

async function gonder(){
  const inp=document.getElementById('msgInput');
  const icerik=inp.value.trim();
  if(!icerik||!aktifKarsiId)return;
  inp.value='';
  const yeniMesaj={gonderen_id:currentUser.id,alici_id:aktifKarsiId,ilan_id:aktifIlanId||null,icerik,okundu:false,created_at:new Date().toISOString()};
  const{data}=await sb.from('mesajlar').insert(yeniMesaj).select().single();
  mesajEkle(data||yeniMesaj);
}

let seciliMSikayet=null;
function mesajSikayetAc(){seciliMSikayet=null;document.querySelectorAll('.sikayet-btn').forEach(b=>b.classList.remove('selected'));document.getElementById('mSikayetAciklama').value='';document.getElementById('sikayetModal').classList.add('open');}
function sikayetKapat(){document.getElementById('sikayetModal').classList.remove('open');}
function mSikayetSec(el,sebep){seciliMSikayet=sebep;document.querySelectorAll('.sikayet-btn').forEach(b=>b.classList.remove('selected'));el.classList.add('selected');}
async function mesajSikayetGonder(){
  if(!seciliMSikayet){alert('Lütfen bir şikayet sebebi seçin!');return;}
  const aciklama=document.getElementById('mSikayetAciklama').value.trim();
  await sb.from('sikayetler').insert({user_id:currentUser.id,tip:'mesaj',sebep:seciliMSikayet,hedef_id:aktifKarsiId,hedef_tip:'kullanici',aciklama:aciklama||null,durum:'bekliyor'});
  sikayetKapat();alert('✅ Şikayetiniz alındı.');
}

function kapatSessiz(){document.getElementById('chatScreen').classList.remove('open');if(mesajKanal)sb.removeChannel(mesajKanal);konusmalariYukle();}
function kapat(){history.back();}
</script>

<script src="navbar.js"></script>
<script>if("serviceWorker"in navigator)navigator.serviceWorker.register("/XxxGotapu/sw.js",{scope:"/XxxGotapu/"}).catch(e=>console.log("SW error:",e));</script>
