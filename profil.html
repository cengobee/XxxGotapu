<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<title>Gotapu — Profil</title>
<link rel="stylesheet" href="style.css">
<script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
<style>
  .profile-header { text-align: center; padding: 20px 0; }
  .avatar {
    width: 88px; height: 88px; border-radius: 50%;
    background: var(--card2); border: 3px solid var(--gold);
    display: flex; align-items: center; justify-content: center;
    font-size: 44px; margin: 0 auto 12px; overflow: hidden; position: relative;
    cursor: pointer;
  }
  .avatar img { width: 100%; height: 100%; object-fit: cover; }
  .avatar-edit {
    position: absolute; bottom: 0; right: 0;
    background: var(--gold); border-radius: 50%;
    width: 24px; height: 24px; display: flex; align-items: center; justify-content: center;
    font-size: 12px; z-index: 2;
  }
  .profile-name { font-size: 20px; font-weight: 900; }
  .profile-email { font-size: 13px; color: var(--text3); margin-top: 3px; }
  .verified { display: inline-flex; align-items: center; gap: 5px; background: rgba(46,204,113,0.1); color: var(--green); border-radius: 50px; padding: 4px 12px; font-size: 12px; font-weight: 700; margin-top: 8px; }

  .menu-section { margin-bottom: 20px; }
  .menu-label { font-size: 12px; font-weight: 800; color: var(--text3); letter-spacing: 1px; text-transform: uppercase; margin-bottom: 10px; padding: 0 4px; }
  .menu-item {
    display: flex; align-items: center; gap: 14px;
    padding: 14px 16px; background: var(--card);
    border-bottom: 1px solid var(--border); cursor: pointer;
    transition: background .2s; text-decoration: none; color: var(--text);
  }
  .menu-item:first-of-type { border-radius: var(--radius) var(--radius) 0 0; }
  .menu-item:last-of-type { border-radius: 0 0 var(--radius) var(--radius); border-bottom: none; }
  .menu-item:active { background: var(--card2); }
  .menu-icon { font-size: 20px; width: 28px; text-align: center; }
  .menu-text { flex: 1; font-size: 15px; font-weight: 700; }
  .menu-arrow { color: var(--text3); }

  .ilanim-item {
    display: flex; gap: 12px; align-items: center;
    padding: 12px 16px; border-bottom: 1px solid var(--border);
    cursor: pointer;
  }
  .ilanim-item:last-child { border-bottom: none; }
  .ilanim-thumb { width: 60px; height: 60px; border-radius: 10px; background: var(--card2); display: flex; align-items: center; justify-content: center; font-size: 28px; flex-shrink: 0; overflow: hidden; }
  .ilanim-thumb img { width: 100%; height: 100%; object-fit: cover; }
  .ilanim-price { font-size: 15px; font-weight: 900; color: var(--gold); }
  .ilanim-title { font-size: 13px; font-weight: 700; }
  .ilanim-loc { font-size: 12px; color: var(--text3); }
</style>
</head>
<body>

<nav class="top-nav">
  <a href="index.html" class="nav-logo"><div class="logo-icon">🏠</div>GoTapu</a>
  <div class="nav-actions">
    <a href="ilan-ver.html" class="nav-btn">+ İlan Ver</a>
  </div>
</nav>

<input type="file" id="avatarInput" accept="image/*" style="display:none" onchange="avatarDegistir(this)">

<div class="page fade-up">

  <!-- Profil Başlık -->
  <div class="profile-header">
    <div class="avatar" onclick="document.getElementById('avatarInput').click()">
      <span id="avatarEmoji">👤</span>
      <img id="avatarImg" style="display:none">
      <div class="avatar-edit">✏️</div>
    </div>
    <div class="profile-name" id="profilAd">Yükleniyor...</div>
    <div class="profile-email" id="profilEmail"></div>
    <div class="profile-email" id="profilTel"></div>
    <div class="verified" id="verifiedBadge" style="display:none">✓ Doğrulanmış Üye</div>
  </div>

  <!-- İstatistikler -->
  <div class="stat-row" style="margin-bottom:24px">
    <div class="stat-box"><div class="stat-num" id="ilanSayisi">0</div><div class="stat-lbl">İlan</div></div>
    <div class="stat-box"><div class="stat-num" id="goruntulenmeSayisi">0</div><div class="stat-lbl">Görüntülenme</div></div>
    <div class="stat-box"><div class="stat-num" id="mesajSayisi">0</div><div class="stat-lbl">Mesaj</div></div>
  </div>

  <!-- İlanlarım -->
  <div class="menu-section">
    <div class="menu-label">İlanlarım</div>
    <div class="card" id="ilanlarimCard">
      <div class="spinner"></div>
    </div>
  </div>

  <!-- Hizmetler -->
  <div class="menu-section">
    <div class="menu-label">🏠 Ev Hizmetleri</div>
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:10px">
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🔨</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Tadilat</div></div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🧹</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Temizlik</div></div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🎨</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Boya</div></div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🚚</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Nakliye</div></div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🛋️</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Dekorasyon</div></div>
      <div style="background:var(--card);border-radius:var(--radius-sm);padding:16px 8px;text-align:center;cursor:pointer"><div style="font-size:26px;margin-bottom:6px">🛡️</div><div style="font-size:11px;font-weight:700;color:var(--text2)">Sigorta</div></div>
    </div>
  </div>

  <!-- Hesap Menüsü -->
  <div class="menu-section">
    <div class="menu-label">Hesap</div>
    <a href="site-yonetimi.html" class="menu-item"><div class="menu-icon">🏢</div><div class="menu-text">Site Yönetimi</div><div class="menu-arrow">›</div></a>
    <a href="eslesmeler.html" class="menu-item"><div class="menu-icon">✨</div><div class="menu-text">Eşleşmelerim</div><div class="menu-arrow">›</div></a>
    <div class="menu-item" onclick="profilDuzenle()"><div class="menu-icon">⚙️</div><div class="menu-text">Profili Düzenle</div><div class="menu-arrow">›</div></div>
    <div class="menu-item" onclick="cikisYap()" style="color:var(--rust)"><div class="menu-icon">🚪</div><div class="menu-text" style="color:var(--rust)">Çıkış Yap</div><div class="menu-arrow">›</div></div>
  </div>

</div>

<nav class="bottom-nav">
  <a href="index.html" class="bnav-item"><div class="bnav-icon">🏠</div>Ana Sayfa</a>
  <a href="eslesmeler.html" class="bnav-item"><div class="bnav-icon">✨</div>Eşleşmeler</a>
  <a href="ilan-ver.html" class="bnav-center">+</a>
  <a href="mesajlar.html" class="bnav-item"><div class="bnav-icon">💬</div>Mesajlar</a>
  <a href="profil.html" class="bnav-item active"><div class="bnav-icon">👤</div>Profil</a>
</nav>

<script>
const SUPABASE_URL = 'https://ncmzfaszaowiynzjdefb.supabase.co';
const SUPABASE_KEY = 'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im5jbXpmYXN6YW93aXluempkZWZiIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzM4NDEwOTQsImV4cCI6MjA4OTQxNzA5NH0.Kw1JQ65KQFPU0r6mIT9buFkMrolnH14_jRvLY7o63tY';
const { createClient } = supabase;
const sb = createClient(SUPABASE_URL, SUPABASE_KEY);

let currentUser = null;

sb.auth.getSession().then(({ data }) => {
  if (!data.session) { window.location.href = 'auth.html'; return; }
  currentUser = data.session.user;
  profilYukle();
});

async function profilYukle() {
  const { data: profil } = await sb.from('profiles').select('*').eq('id', currentUser.id).single();
  if (profil) {
    document.getElementById('profilAd').textContent = profil.full_name || 'İsimsiz';
    document.getElementById('profilEmail').textContent = profil.email || currentUser.email;
    if (profil.phone) document.getElementById('profilTel').textContent = '📞 ' + profil.phone;
    if (profil.verified) document.getElementById('verifiedBadge').style.display = 'inline-flex';
    if (profil.avatar_url) {
      document.getElementById('avatarEmoji').style.display = 'none';
      const img = document.getElementById('avatarImg');
      img.src = profil.avatar_url;
      img.style.display = 'block';
    }
  } else {
    document.getElementById('profilAd').textContent = currentUser.email;
  }

  const { data: ilanlar } = await sb.from('ilanlar').select('*').eq('user_id', currentUser.id).order('created_at', { ascending: false });
  document.getElementById('ilanSayisi').textContent = ilanlar?.length || 0;

  const kart = document.getElementById('ilanlarimCard');
  if (!ilanlar || ilanlar.length === 0) {
    kart.innerHTML = `<div class="empty" style="padding:30px"><div class="empty-icon">🏠</div><div class="empty-title">Henüz ilan yok</div></div>`;
  } else {
    kart.innerHTML = ilanlar.map(i => `
      <div class="ilanim-item">
        <div class="ilanim-thumb">${i.foto_url ? `<img src="${i.foto_url}">` : (i.tip === 'kiralik' ? '🏘️' : i.tip === 'devren' ? '🏪' : '🏙️')}</div>
        <div style="flex:1;min-width:0">
          <div class="ilanim-price">${Number(i.fiyat).toLocaleString('tr-TR')} ₺${i.tip==='kiralik'?'/ay':''}</div>
          <div class="ilanim-title">${i.baslik}</div>
          <div class="ilanim-loc">📍 ${i.konum || ''}</div>
          <div style="display:flex;gap:8px;margin-top:8px">
            <a href="ilan-duzenle.html?id=${i.id}" style="flex:1;background:var(--card2);border:1px solid var(--border);border-radius:8px;padding:6px;font-size:12px;font-weight:800;color:var(--text);text-align:center;text-decoration:none">✏️ Düzenle</a>
            <button onclick="ilanSil('${i.id}')" style="flex:1;background:rgba(232,96,58,0.1);border:1px solid rgba(232,96,58,0.3);border-radius:8px;padding:6px;font-size:12px;font-weight:800;color:var(--rust);cursor:pointer;font-family:Nunito,sans-serif">🗑️ Sil</button>
          </div>
        </div>
      </div>`).join('');
  }

  const { count } = await sb.from('mesajlar').select('*', { count: 'exact', head: true }).or(`gonderen_id.eq.${currentUser.id},alici_id.eq.${currentUser.id}`);
  document.getElementById('mesajSayisi').textContent = count || 0;
}

async function avatarDegistir(input) {
  const file = input.files[0];
  if (!file) return;
  const fileName = `avatars/${currentUser.id}`;
  const { error: uploadError } = await sb.storage.from('avatarlar').upload(fileName, file, { upsert: true });
  if (uploadError) {
    alert('Fotoğraf yüklenemedi: ' + uploadError.message);
    return;
  }
  const { data } = sb.storage.from('avatarlar').getPublicUrl(fileName);
  const avatarUrlWithTime = data.publicUrl + '?t=' + Date.now();
  await sb.from('profiles').update({ avatar_url: avatarUrlWithTime }).eq('id', currentUser.id);
  document.getElementById('avatarEmoji').style.display = 'none';
  const img = document.getElementById('avatarImg');
  img.src = data.publicUrl + '?t=' + Date.now();
  img.style.display = 'block';
  alert('✅ Profil fotoğrafı güncellendi!');
}

async function profilDuzenle() {
  const yeniAd = prompt('Adınız:', document.getElementById('profilAd').textContent);
  if (yeniAd) {
    const { error } = await sb.from('profiles').update({ full_name: yeniAd }).eq('id', currentUser.id);
    if (error) { alert('Hata: ' + error.message); return; }
    document.getElementById('profilAd').textContent = yeniAd;
  }
}

async function ilanSil(ilanId) {
  if (!confirm('Bu ilanı silmek istediğinizden emin misiniz?')) return;
  const { error } = await sb.from('ilanlar').delete().eq('id', ilanId).eq('user_id', currentUser.id);
  if (error) { alert('Hata: ' + error.message); return; }
  profilYukle();
}

async function cikisYap() {
  await sb.auth.signOut();
  window.location.href = 'auth.html';
}
</script>
</body>
</html>
