<!DOCTYPE html>
<html lang="tr">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Taksi — GoTapu</title>
  <link rel="stylesheet" href="style.css"/>
  <style>
    body { background: var(--bg); }

    .harita-mock {
      width: 100%; height: 260px;
      background: linear-gradient(135deg, #0d1f0d 0%, #0a1a2e 50%, #0d1f0d 100%);
      position: relative; overflow: hidden;
      display: flex; align-items: center; justify-content: center;
    }
    .harita-grid {
      position: absolute; inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
    }
    .harita-yol-y {
      position: absolute; top: 0; bottom: 0; left: 50%;
      width: 50px; background: rgba(255,255,255,0.08);
      transform: translateX(-50%);
    }
    .harita-yol-x {
      position: absolute; left: 0; right: 0; top: 55%;
      height: 40px; background: rgba(255,255,255,0.08);
    }
    .harita-pin {
      position: absolute; top: 50%; left: 50%;
      transform: translate(-50%, -60%);
      display: flex; flex-direction: column; align-items: center; z-index: 2;
    }
    .harita-pin-dot {
      width: 20px; height: 20px; border-radius: 50%;
      background: var(--rust); box-shadow: 0 0 0 6px rgba(232,96,58,0.25);
    }
    .harita-pin-line {
      width: 2px; height: 12px; background: var(--rust);
    }
    .taksi-nokta {
      position: absolute; font-size: 24px;
      animation: surucuHareket 4s infinite ease-in-out;
    }
    .taksi-1 { top: 30%; left: 20%; }
    .taksi-2 { top: 60%; left: 65%; animation-delay: -2s; }
    .taksi-3 { top: 45%; left: 78%; animation-delay: -1s; }
    @keyframes surucuHareket {
      0%, 100% { transform: translate(0, 0); }
      50% { transform: translate(12px, 6px); }
    }
    .yakinlik-badge {
      position: absolute; top: 12px; right: 12px;
      background: rgba(0,0,0,0.7); backdrop-filter: blur(10px);
      border-radius: 12px; padding: 8px 12px;
      font-size: 12px; font-weight: 700; color: #fff;
      border: 1px solid rgba(255,255,255,0.15);
    }
    .gps-btn {
      position: absolute; bottom: 12px; right: 12px;
      width: 40px; height: 40px; border-radius: 12px;
      background: var(--card); border: 1px solid var(--border2);
      display: flex; align-items: center; justify-content: center;
      font-size: 18px; cursor: pointer;
    }

    .form-panel {
      background: var(--bg2); border-radius: 24px 24px 0 0;
      margin-top: -20px; padding: 20px 16px 0;
      position: relative; z-index: 2;
    }
    .panel-handle {
      width: 36px; height: 4px; border-radius: 2px;
      background: var(--border2); margin: 0 auto 18px;
    }

    .lokasyon-input-wrap {
      background: var(--card); border-radius: 16px;
      border: 1.5px solid var(--border2); overflow: hidden;
      margin-bottom: 12px;
    }
    .lokasyon-satir {
      display: flex; align-items: center; gap: 12px;
      padding: 13px 14px; position: relative;
    }
    .lokasyon-satir + .lokasyon-satir {
      border-top: 1px solid var(--border);
    }
    .lokasyon-ikon { font-size: 16px; flex-shrink: 0; }
    .lokasyon-input {
      background: transparent; border: none; outline: none;
      color: var(--text); font-family: 'Nunito', sans-serif;
      font-size: 14px; font-weight: 700; flex: 1;
    }
    .lokasyon-input::placeholder { color: var(--text3); font-weight: 600; }
    .lokasyon-degistir {
      font-size: 20px; cursor: pointer; color: var(--text3);
      flex-shrink: 0; background: none; border: none; padding: 0;
    }

    .arac-tipi-baslik {
      font-size: 15px; font-weight: 900; margin-bottom: 10px;
    }
    .arac-grid {
      display: grid; grid-template-columns: 1fr 1fr 1fr;
      gap: 8px; margin-bottom: 14px;
    }
    .arac-kart {
      background: var(--card); border-radius: 14px;
      border: 2px solid var(--border); padding: 12px 8px;
      display: flex; flex-direction: column; align-items: center;
      gap: 6px; cursor: pointer; transition: all .2s; text-align: center;
    }
    .arac-kart.aktif {
      border-color: var(--rust);
      background: rgba(232,96,58,0.08);
    }
    .arac-ikon { font-size: 32px; }
    .arac-ad { font-size: 12px; font-weight: 800; color: var(--text2); }
    .arac-sure { font-size: 10px; color: var(--text3); font-weight: 700; }
    .arac-fiyat { font-size: 13px; font-weight: 900; color: var(--rust); }

    .odeme-satir {
      display: flex; align-items: center; justify-content: space-between;
      background: var(--card); border-radius: 14px;
      border: 1.5px solid var(--border2); padding: 12px 14px;
      margin-bottom: 12px; cursor: pointer;
    }
    .odeme-sol { display: flex; align-items: center; gap: 10px; }
    .odeme-ikon { font-size: 20px; }
    .odeme-metin { font-size: 14px; font-weight: 800; color: var(--text); }
    .odeme-ok { font-size: 16px; color: var(--text3); }

    .cagir-btn {
      width: 100%; background: linear-gradient(135deg, var(--rust), #ff8557);
      border: none; border-radius: 16px; padding: 18px;
      font-size: 17px; font-weight: 900; color: #fff;
      cursor: pointer; font-family: 'Nunito', sans-serif;
      display: flex; align-items: center; justify-content: center; gap: 10px;
      box-shadow: 0 6px 24px rgba(232,96,58,0.4);
      margin-bottom: 16px;
    }
    .cagir-btn:active { transform: scale(0.98); }

    .yakin-surucu {
      display: flex; align-items: center; gap: 12px;
      background: var(--card); border-radius: 14px;
      border: 1px solid var(--border); padding: 12px 14px;
      margin-bottom: 10px;
    }
    .surucu-avatar {
      width: 44px; height: 44px; border-radius: 50%;
      background: linear-gradient(135deg, #E8603A, #ff8557);
      display: flex; align-items: center; justify-content: center;
      font-size: 20px; flex-shrink: 0;
    }
    .surucu-bilgi { flex: 1; }
    .surucu-ad { font-size: 14px; font-weight: 800; color: var(--text); }
    .surucu-meta { display: flex; gap: 8px; align-items: center; margin-top: 2px; }
    .surucu-puan { font-size: 12px; color: var(--gold); font-weight: 700; }
    .surucu-plaka {
      font-size: 11px; color: var(--text3); font-weight: 700;
      background: var(--card2); padding: 2px 8px; border-radius: 6px;
    }
    .surucu-sure { font-size: 12px; color: var(--rust); font-weight: 800; }

    .bolum-baslik-s {
      font-size: 15px; font-weight: 900; margin-bottom: 10px;
    }
  </style>
</head>
<body data-page="home">

<!-- Harita Mock -->
<div class="harita-mock">
  <div class="harita-grid"></div>
  <div class="harita-yol-y"></div>
  <div class="harita-yol-x"></div>
  <div class="harita-pin">
    <div class="harita-pin-dot"></div>
    <div class="harita-pin-line"></div>
  </div>
  <div class="taksi-nokta taksi-1">🚕</div>
  <div class="taksi-nokta taksi-2">🚕</div>
  <div class="taksi-nokta taksi-3">🚖</div>
  <div class="yakinlik-badge">🚕 3 araç yakında</div>
  <button class="gps-btn">📍</button>
</div>

<!-- Form Panel -->
<div class="form-panel">
  <div class="panel-handle"></div>

  <!-- Lokasyon -->
  <div class="lokasyon-input-wrap">
    <div class="lokasyon-satir">
      <span class="lokasyon-ikon" style="color:var(--green)">●</span>
      <input class="lokasyon-input" value="Çankaya, Ankara" placeholder="Nereden?"/>
    </div>
    <div class="lokasyon-satir">
      <span class="lokasyon-ikon" style="color:var(--rust)">●</span>
      <input class="lokasyon-input" placeholder="Nereye?"/>
      <button class="lokasyon-degistir">⇅</button>
    </div>
  </div>

  <!-- Araç Tipi -->
  <div class="arac-tipi-baslik">🚗 Araç Türü</div>
  <div class="arac-grid">
    <div class="arac-kart aktif" onclick="aracSec(this)">
      <div class="arac-ikon">🚕</div>
      <div class="arac-ad">Taksi</div>
      <div class="arac-sure">~3 dk</div>
      <div class="arac-fiyat">₺45+</div>
    </div>
    <div class="arac-kart" onclick="aracSec(this)">
      <div class="arac-ikon">🚙</div>
      <div class="arac-ad">Konfor</div>
      <div class="arac-sure">~5 dk</div>
      <div class="arac-fiyat">₺65+</div>
    </div>
    <div class="arac-kart" onclick="aracSec(this)">
      <div class="arac-ikon">🚐</div>
      <div class="arac-ad">Minibüs</div>
      <div class="arac-sure">~7 dk</div>
      <div class="arac-fiyat">₺90+</div>
    </div>
  </div>

  <!-- Ödeme -->
  <div class="odeme-satir">
    <div class="odeme-sol">
      <div class="odeme-ikon">💳</div>
      <div class="odeme-metin">GoTapu Cüzdan</div>
    </div>
    <div class="odeme-ok">›</div>
  </div>

  <!-- Yakın Sürücüler -->
  <div class="bolum-baslik-s">📍 Yakındaki Sürücüler</div>
  <div class="yakin-surucu">
    <div class="surucu-avatar">👨</div>
    <div class="surucu-bilgi">
      <div class="surucu-ad">Mehmet Y.</div>
      <div class="surucu-meta">
        <span class="surucu-puan">★ 4.9</span>
        <span class="surucu-plaka">06 AKR 42</span>
      </div>
    </div>
    <div class="surucu-sure">2 dk</div>
  </div>
  <div class="yakin-surucu">
    <div class="surucu-avatar">👩</div>
    <div class="surucu-bilgi">
      <div class="surucu-ad">Fatma K.</div>
      <div class="surucu-meta">
        <span class="surucu-puan">★ 4.8</span>
        <span class="surucu-plaka">06 BKT 17</span>
      </div>
    </div>
    <div class="surucu-sure">4 dk</div>
  </div>

  <!-- Çağır Butonu -->
  <button class="cagir-btn" onclick="taksiCagir()">
    🚕 Taksi Çağır
  </button>
</div>

<script>
  function aracSec(el) {
    document.querySelectorAll('.arac-kart').forEach(k => k.classList.remove('aktif'));
    el.classList.add('aktif');
  }
  function taksiCagir() {
    const btn = document.querySelector('.cagir-btn');
    const orig = btn.innerHTML;
    btn.innerHTML = '⏳ Sürücü Aranıyor…';
    btn.style.background = 'var(--card2)';
    btn.style.color = 'var(--text3)';
    setTimeout(() => {
      btn.innerHTML = '✅ Sürücü Bulundu! Mehmet Y. — 2 dk';
      btn.style.background = 'linear-gradient(135deg, #2ECC71, #27ae60)';
      btn.style.color = '#fff';
      btn.style.boxShadow = '0 6px 24px rgba(46,204,113,0.4)';
    }, 2000);
  }
</script>

<script src="navbar.js"></script>
</body>
</html>
